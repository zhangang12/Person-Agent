<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>BocomHermes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:280px;height:280px;background:transparent;overflow:hidden;user-select:none}

.stage{width:280px;height:280px;display:flex;align-items:center;justify-content:center;position:relative}

/* ── SPHERE ── */
.sphere{
  width:88px;height:88px;border-radius:50%;
  position:relative;z-index:10;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(circle at 42% 30%,rgba(100,140,220,.1) 0%,transparent 45%),
    radial-gradient(circle at 50% 50%,#0a0a14 0%,#060610 45%,#020208 80%,#000002 100%);
  box-shadow:
    -16px 2px 32px rgba(0,230,255,.62),-7px 0 14px rgba(0,230,255,.38),
    18px -2px 32px rgba(60,80,255,.58),7px 0 14px rgba(80,60,255,.32),
    0 -14px 22px rgba(140,60,255,.28),0 10px 18px rgba(0,140,160,.18),
    inset -9px 0 22px rgba(0,200,255,.1),inset 9px 0 22px rgba(60,60,255,.08),
    0 0 70px rgba(0,160,255,.06);
}
.sphere::before{content:'';position:absolute;top:12%;left:18%;width:26%;height:13%;background:rgba(200,230,255,.18);border-radius:50%;transform:rotate(-25deg);pointer-events:none}
.sphere::after{content:'';position:absolute;inset:-4px;border-radius:50%;background:radial-gradient(ellipse 80% 100% at 0% 50%,rgba(0,230,255,.28) 0%,transparent 55%),radial-gradient(ellipse 80% 100% at 100% 50%,rgba(80,60,255,.25) 0%,transparent 55%),radial-gradient(ellipse 100% 55% at 50% 0%,rgba(140,60,255,.16) 0%,transparent 50%);filter:blur(5px);pointer-events:none}

.eyes{display:flex;gap:13px;position:relative;z-index:2;pointer-events:none}
.eye{width:11px;height:18px;border-radius:5.5px;background:#fff;box-shadow:0 0 9px rgba(255,255,255,.9);transition:all .35s cubic-bezier(.34,1.56,.64,1)}

/* ── STATES ── */
@keyframes blink{0%,88%,100%{transform:scaleY(1)}94%{transform:scaleY(.08)}}
@keyframes breathe{
  0%,100%{box-shadow:-16px 2px 32px rgba(0,230,255,.62),-7px 0 14px rgba(0,230,255,.38),18px -2px 32px rgba(60,80,255,.58),7px 0 14px rgba(80,60,255,.32),0 -14px 22px rgba(140,60,255,.28),0 10px 18px rgba(0,140,160,.18),inset -9px 0 22px rgba(0,200,255,.1),inset 9px 0 22px rgba(60,60,255,.08),0 0 70px rgba(0,160,255,.06)}
  50%{box-shadow:-22px 2px 44px rgba(0,230,255,.85),-9px 0 18px rgba(0,230,255,.55),24px -2px 44px rgba(60,80,255,.78),9px 0 18px rgba(80,60,255,.48),0 -18px 30px rgba(140,60,255,.42),0 14px 24px rgba(0,140,160,.28),inset -11px 0 28px rgba(0,200,255,.16),inset 11px 0 28px rgba(60,60,255,.12),0 0 100px rgba(0,160,255,.12)}
}
.state-idle .sphere{animation:breathe 3.5s ease-in-out infinite}
.wake .sphere{animation:wakeFlash 1.2s ease-out 3 !important;transform-origin:center}
@keyframes wakeFlash{
  0%,100%{box-shadow:0 0 0 rgba(140,200,255,0);transform:scale(1)}
  50%{box-shadow:0 0 60px 22px rgba(140,200,255,.85),0 0 24px 8px rgba(255,255,255,.5);transform:scale(1.18)}
}
.state-idle .eye{animation:blink 4s ease-in-out infinite}
.state-idle .eye:nth-child(2){animation-delay:.07s}

@keyframes spin-rim{
  0%  {box-shadow:-18px 0 36px rgba(0,230,255,.9),-7px 0 14px rgba(0,230,255,.5),18px 0 36px rgba(60,80,255,.3),0 -14px 22px rgba(140,60,255,.2)}
  33% {box-shadow:10px -14px 36px rgba(0,230,255,.9),-5px 12px 36px rgba(60,80,255,.5),12px 8px 22px rgba(0,200,180,.3),0 -10px 18px rgba(140,60,255,.2)}
  66% {box-shadow:16px 5px 36px rgba(60,80,255,.9),-16px -5px 36px rgba(0,230,255,.4),-5px 12px 22px rgba(160,80,255,.4)}
  100%{box-shadow:-18px 0 36px rgba(0,230,255,.9),-7px 0 14px rgba(0,230,255,.5),18px 0 36px rgba(60,80,255,.3),0 -14px 22px rgba(140,60,255,.2)}
}
@keyframes think-eye{0%,100%{width:11px;height:18px;border-radius:5.5px}50%{width:17px;height:4px;border-radius:2px;background:rgba(0,220,255,.9)}}
.state-thinking .sphere{animation:spin-rim 1.2s linear infinite}
.state-thinking .eye{animation:think-eye .75s ease-in-out infinite;background:rgba(0,220,255,.9);box-shadow:0 0 8px rgba(0,220,255,.8)}
.state-thinking .eye:nth-child(2){animation-delay:.1s}

@keyframes err-flash{0%,100%{box-shadow:0 0 0 rgba(255,80,80,0)}50%{box-shadow:0 0 40px 14px rgba(255,80,80,.7),0 0 18px 6px rgba(255,100,100,.5)}}
.sphere.err-flash{animation:err-flash .55s ease-out 2!important}
@keyframes info-flash{0%,100%{box-shadow:0 0 0 rgba(0,255,140,0)}50%{box-shadow:0 0 40px 14px rgba(0,255,140,.65),0 0 18px 6px rgba(120,255,170,.45)}}
.sphere.info-flash{animation:info-flash .55s ease-out 2!important}
@keyframes done-rim{0%,100%{box-shadow:0 0 28px rgba(0,255,140,.45),0 0 10px rgba(0,200,100,.2)}50%{box-shadow:0 0 42px rgba(0,255,140,.75),0 0 16px rgba(0,200,100,.4)}}
@keyframes done-pulse{0%,100%{opacity:.85}50%{opacity:1}}
.state-done .sphere{animation:done-rim 1.6s ease-in-out infinite}
.state-done .eye{width:16px;height:3.5px;border-radius:2px;background:#00ff8c;box-shadow:0 0 8px rgba(0,255,140,.85);animation:done-pulse 1.6s ease-in-out infinite}
.state-done .eye:nth-child(2){animation-delay:.8s}

.stage.open .sphere{
  animation:none!important;transform:scale(1.06);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
  box-shadow:-24px 2px 48px rgba(0,230,255,.92),-9px 0 20px rgba(0,230,255,.6),26px -2px 48px rgba(60,80,255,.85),9px 0 20px rgba(80,60,255,.55),0 -20px 32px rgba(140,60,255,.5),0 0 110px rgba(0,160,255,.18),inset -13px 0 30px rgba(0,200,255,.2),inset 13px 0 30px rgba(60,60,255,.15);
}

/* ── 竖向列表面板（从球体一侧生长出来）── */
.panel{
  position:absolute;top:50%;right:calc(50% + 48px);
  transform:translateY(-50%) scale(.9);transform-origin:right center;
  display:flex;flex-direction:column;gap:1px;
  width:92px;padding:6px;
  border-radius:16px;
  background:rgba(10,12,26,.82);
  border:.5px solid rgba(255,255,255,.13);
  box-shadow:0 10px 30px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06);
  opacity:0;pointer-events:none;z-index:20;
  transition:opacity .18s,transform .24s cubic-bezier(.34,1.56,.64,1);
}
/* 球在屏幕左半边时，面板朝右开（始终朝屏幕内侧）*/
.stage.flip-right .panel{right:auto;left:calc(50% + 48px);transform-origin:left center}
.stage.open .panel{opacity:1;transform:translateY(-50%) scale(1);pointer-events:all}

.ri{
  display:flex;flex-direction:row;align-items:center;gap:8px;
  width:100%;padding:6px 7px;border-radius:10px;
  position:relative;cursor:pointer;
  opacity:0;transform:translateY(4px);
  transition:opacity .18s,transform .18s,background .13s;
}
.stage.open .ri{opacity:1;transform:none}
.stage.open .ri:nth-child(1){transition-delay:.03s}
.stage.open .ri:nth-child(2){transition-delay:.05s}
.stage.open .ri:nth-child(3){transition-delay:.07s}
.stage.open .ri:nth-child(4){transition-delay:.09s}
.stage.open .ri:nth-child(5){transition-delay:.11s}
.stage.open .ri:nth-child(6){transition-delay:.13s}
.stage.open .ri:nth-child(7){transition-delay:.15s}
.stage.open .ri:nth-child(8){transition-delay:.17s}

.ri svg{
  width:16px;height:16px;flex:0 0 auto;fill:none;
  stroke:rgba(255,255,255,.78);stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;
}
.ri-lbl{
  font-size:11px;color:rgba(255,255,255,.66);white-space:nowrap;
  letter-spacing:.02em;font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* hover：整行提亮 */
.ri:hover{background:rgba(40,54,108,.72)}
.ri:hover svg{stroke:rgba(255,255,255,.98)}
.ri:hover .ri-lbl{color:rgba(255,255,255,.95)}

/* 点击反馈：按下回弹 + 涟漪脉冲 */
.ri svg,.ri .ri-lbl{transition:transform .13s cubic-bezier(.34,1.56,.64,1),color .13s,stroke .13s}
.ri:active{background:rgba(34,58,128,.96)}
.ri:active svg{transform:scale(.82)}
.ri:active .ri-lbl{color:rgba(255,255,255,.98)}
.ri::after{content:'';position:absolute;inset:0;border-radius:10px;pointer-events:none;opacity:0}
.ri.tap::after{animation:riTap .45s ease-out}
@keyframes riTap{
  0%{opacity:.75;box-shadow:0 0 0 0 rgba(90,180,255,.6),inset 0 0 14px rgba(90,180,255,.55)}
  100%{opacity:0;box-shadow:0 0 0 15px rgba(90,180,255,0),inset 0 0 14px rgba(90,180,255,0)}
}
</style>
</head>
<body>
<div class="stage state-idle" id="stage">

 <div class="panel" id="panel">

  <!-- 功能模块 1: 对话(新对话 + 历史会话 合一;并行已并入 Agent 自主升格) -->
  <div class="ri" id="ri-chat" title="对话：开新会话 / 续接历史；复杂任务 Agent 会自主拉起动态工作流">
    <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span class="ri-lbl">对话</span>
  </div>

  <!-- 功能模块 2: 调试工作台（左 Agent + 右内嵌浏览器）-->
  <div class="ri" id="ri-workspace" title="调试工作台：左侧 Agent + 右侧内嵌浏览器">
    <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 9h20"/><path d="M11 9v11"/></svg>
    <span class="ri-lbl">浏览器</span>
  </div>

  <!-- 功能模块 3: 邮件 -->
  <div class="ri" id="ri-email">
    <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
    <span class="ri-lbl">邮件</span>
  </div>

  <!-- 功能模块 6: 设置 -->
  <div class="ri" id="ri-settings">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    <span class="ri-lbl">设置</span>
  </div>

  <!-- 功能模块 8: 需求分析（Word → 多Agent 对抗 → 三类清单）-->
  <div class="ri" id="ri-reqdoc" title="需求分析：拖入 Word 需求文档，多Agent 对抗读出明确/不明确/矛盾">
    <svg viewBox="0 0 24 24"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h5"/></svg>
    <span class="ri-lbl">需求分析</span>
  </div>

 </div><!-- /panel -->

  <!-- 球体 -->
  <div class="sphere" id="sphere">
    <div class="eyes">
      <div class="eye"></div>
      <div class="eye"></div>
    </div>
  </div>
</div>

<script>
const H = window.BocomHermes
const stage = document.getElementById('stage')
const sphere = document.getElementById('sphere')

// ── 透明区域点击穿透 + 菜单开/合(同信号控制,避免 CSS :hover 被 passthrough 卡住)──
// 关闭加 350ms 缓冲:菜单已开时,鼠标从球→外圈图标之间必经一段透明区,
// 那段路上 elementFromPoint=BODY → over=false。立即关菜单会让用户够不到图标。
// forward:true 在 main 侧已配,passthrough 时仍能收 mousemove → 缓冲期内鼠标回到球/图标可取消关闭。
let closeTimer = null
// 面板始终朝屏幕内侧开：球心在屏幕右半边→朝左开；在左半边→朝右开(.flip-right)
function updateSide() {
  const availW = (window.screen && window.screen.availWidth) || screen.width || 1920
  const centerX = window.screenX + 140   // 球心屏幕 x（窗口 280，球居中）
  stage.classList.toggle('flip-right', centerX < availW / 2)
}
document.addEventListener('mousemove', e => {
  const el = document.elementFromPoint(e.clientX, e.clientY)
  const over = el && el.tagName !== 'HTML' && el.tagName !== 'BODY' && el !== stage   // 球 / 图标 — 真交互
  if (over) {
    if (closeTimer) { clearTimeout(closeTimer); closeTimer = null }
    H.setOrbMousePassthrough(false)
    if (!stage.classList.contains('open')) updateSide()
    stage.classList.add('open')
  } else if (stage.classList.contains('open')) {
    // 已开但当前不在交互元素上 — 给 350ms 让鼠标走到外圈图标
    // 期间保持非 passthrough,鼠标回到球/图标立即取消计时
    if (!closeTimer) closeTimer = setTimeout(() => {
      stage.classList.remove('open')
      H.setOrbMousePassthrough(true)
      closeTimer = null
    }, 350)
  } else {
    // 完全空闲(菜单已关 + 不在球上)→ 开 passthrough 让桌面正常接收点击
    H.setOrbMousePassthrough(true)
  }
})
document.addEventListener('mouseleave', () => {
  if (closeTimer) { clearTimeout(closeTimer); closeTimer = null }
  H.setOrbMousePassthrough(true); stage.classList.remove('open')
})

// ── 拖拽（在桌面内自由移动）──
let dragging = false, moved = false, downX = 0, downY = 0, lastX = 0, lastY = 0
sphere.addEventListener('mousedown', e => {
  if (e.button !== 0) return
  dragging = true; moved = false; downX = lastX = e.screenX; downY = lastY = e.screenY
  e.preventDefault()
})
document.addEventListener('mousemove', e => {
  if (!dragging) return
  const dx = e.screenX - lastX, dy = e.screenY - lastY; lastX = e.screenX; lastY = e.screenY
  if (Math.abs(e.screenX - downX) + Math.abs(e.screenY - downY) > 3) moved = true
  if (moved) H.dragOrb(dx, dy)
})
document.addEventListener('mouseup', () => {
  if (!dragging) return
  const wasMoved = moved
  dragging = false; moved = false
  if (wasMoved) H.snapOrbToCorner()
  else H.toggleOrbInput()
})

// ── 功能模块 ──
document.getElementById('ri-chat').addEventListener('click', () => H.openDock())
document.getElementById('ri-workspace').addEventListener('click', () => H.openBrowser())
function flashSphere(cls) {
  sphere.classList.remove('err-flash', 'info-flash')
  void sphere.offsetWidth
  sphere.classList.add(cls)
  setTimeout(() => sphere.classList.remove(cls), 1200)
}
document.getElementById('ri-email').addEventListener('click', () => { H.openMailCenter() })
document.getElementById('ri-settings').addEventListener('click', () => H.openSettings())
document.getElementById('ri-reqdoc').addEventListener('click', () => H.openReqAnalysis())

// 点击反馈：按下即播放涟漪脉冲（解决"点了没反应、生硬"）
document.querySelectorAll('.ri').forEach(el => {
  el.addEventListener('pointerdown', () => {
    el.classList.remove('tap'); void el.offsetWidth; el.classList.add('tap')
    setTimeout(() => el.classList.remove('tap'), 450)
  })
})

// ── 状态变化 ──
H.onOrbState(state => {
  stage.className = 'stage state-' + state
  if (state === 'done') setTimeout(() => { stage.className = 'stage state-idle' }, 2200)
})

// 关掉浏览器/工作台等窗口后，主进程会发 'orb-wake' —— 球闪一下提醒"agent 还在"
H.onOrbWake && H.onOrbWake(() => {
  stage.classList.add('wake')
  setTimeout(() => stage.classList.remove('wake'), 3500)
})
</script>
</body>
</html>
