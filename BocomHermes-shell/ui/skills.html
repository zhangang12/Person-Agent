<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>录制与回放</title>
<!-- 启动即套用智能体当前主题(浅磨砂/墨玻璃/曜黑/纸白),避免首帧闪深色 -->
<script>try { document.documentElement.dataset.theme = window.BocomHermes.getTheme() || 'dark' } catch (e) { document.documentElement.dataset.theme = 'dark' }</script>
<link rel="stylesheet" href="glass.css">
<style>
/* 「🎬 录制与回放」中心 —— Codex Record & Replay 式一条流:录一遍 → 自动整理成技能 → 一键复用/批量跑。
   颜色全部消费 glass.css 的设计令牌 → 跟随智能体主题四套皮肤切换;语义色(录制红/成功/警告)按需保持稳定。 */
:root{
  --bg:var(--glass-bg); --panel:var(--composer-bg); --float:var(--ai-bg);
  --line:var(--glass-border); --line2:var(--composer-border);
  --ink:var(--txt); --ink2:var(--txt2); --ink3:var(--txt3);
  --accent-dim:var(--orb-bg); --accent-fg:var(--send-fg);
  --hover:color-mix(in srgb, var(--txt) 8%, transparent);
  --field:var(--composer-bg);
  --rec:#ff4d52; --rec-dim:color-mix(in srgb,#ff4d52 14%,transparent);
  --good:var(--green); --good-dim:color-mix(in srgb,var(--green) 16%,transparent);
  --warn:#d99a2b; --warn-dim:color-mix(in srgb,#d99a2b 16%,transparent);
  --crit:#e2545e; --crit-dim:color-mix(in srgb,#e2545e 15%,transparent);
}
body{padding:0!important}   /* 覆盖 glass.css 的 body{padding:24px}(我们要满铺) */
html,body{margin:0;height:100%;background:transparent;overflow:hidden;
  font-family:var(--font);font-size:13px;color:var(--ink);-webkit-font-smoothing:antialiased;user-select:none}
.app{height:100%;display:flex;flex-direction:column;background:var(--bg);
  border:1px solid var(--line);border-radius:14px;overflow:hidden;backdrop-filter:blur(24px)}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
button{font-family:inherit}
button:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

/* ── 标题栏 ── */
.tbar{height:42px;flex:none;display:flex;align-items:center;gap:9px;padding:0 8px 0 16px;
  border-bottom:1px solid var(--line);-webkit-app-region:drag}
.tbar .logo{font-size:15px}
.tbar .tt{font-weight:700;font-size:13.5px}
.tbar .sub{color:var(--ink3);font-size:11.5px}
.tbar .sp{flex:1}
.wbtn{-webkit-app-region:no-drag;border:none;background:transparent;color:var(--ink3);cursor:pointer;
  width:34px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.wbtn:hover{background:var(--hover);color:var(--ink)}
.wbtn.x:hover{background:var(--crit-dim);color:var(--crit)}

/* ── 录制英雄区:一屏一主 action ── */
.hero{flex:none;margin:14px 16px 0;border:1px solid var(--line);border-radius:12px;padding:14px 16px;background:var(--panel)}
.hero .hl{font-size:15.5px;font-weight:700;margin-bottom:2px}
.hero .hs{color:var(--ink2);font-size:12px;margin-bottom:11px}
.hero .row{display:flex;gap:9px}
.hero input{flex:1;background:var(--field);border:1px solid var(--line);border-radius:9px;padding:9px 12px;
  color:var(--ink);font-size:12.5px;font-family:var(--mono);outline:none}
.hero input::placeholder{color:var(--ink3);font-family:inherit}
.hero input:focus{border-color:var(--accent)}
.btn-rec{flex:none;display:flex;align-items:center;gap:8px;background:var(--rec);border:none;color:#fff;
  font-weight:700;font-size:13px;border-radius:9px;padding:0 18px;cursor:pointer}
.btn-rec:hover{filter:brightness(1.08)}
.btn-rec .dot{width:9px;height:9px;border-radius:50%;background:#fff}
/* 录制中实况条 */
.hero.live{border-color:rgba(255,82,87,.45);background:var(--rec-dim)}
.hero.live .hl{display:flex;align-items:center;gap:9px}
.live-dot{width:10px;height:10px;border-radius:50%;background:var(--rec);animation:pulse 1.1s ease-in-out infinite}
@keyframes pulse{50%{opacity:.25}}
.btn-stop{background:transparent;border:1.5px solid var(--rec);color:var(--rec);font-weight:700;font-size:12.5px;
  border-radius:9px;padding:8px 16px;cursor:pointer}
.btn-stop:hover{background:var(--rec);color:#fff}

/* ── 工具行 ── */
.tools{flex:none;display:flex;align-items:center;gap:10px;padding:12px 16px 8px}
.search{flex:1;display:flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--line);
  border-radius:9px;padding:6px 11px;color:var(--ink3)}
.search input{flex:1;background:transparent;border:none;outline:none;color:var(--ink);font-size:12.5px;font-family:inherit}
.search input::placeholder{color:var(--ink3)}
.tools .cnt{color:var(--ink3);font-size:11.5px;white-space:nowrap}
.ghost{background:transparent;border:1px solid var(--line);color:var(--ink2);border-radius:8px;
  padding:6px 12px;cursor:pointer;font-size:12px;white-space:nowrap}
.ghost:hover{border-color:var(--line2);color:var(--ink)}

/* ── 列表 ── */
.list{flex:1;overflow-y:auto;padding:6px 16px 90px}
.list::-webkit-scrollbar{width:9px}
.list::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:5px;border:2px solid transparent;background-clip:content-box}
.sk{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.sk:hover{border-color:var(--line2)}
.sk .r1{display:flex;align-items:center;gap:8px}
.star{background:transparent;border:none;cursor:pointer;font-size:14px;color:var(--ink3);padding:0 2px;flex:none}
.star.on{color:#ffd55a}
.sk .name{flex:1;min-width:80px;background:transparent;border:none;outline:none;color:var(--ink);
  font-size:14px;font-weight:650;font-family:inherit;padding:1px 2px;border-radius:5px}
.sk .name:hover,.sk .name:focus{background:var(--hover)}
.chip{flex:none;font-family:var(--mono);font-size:10.5px;padding:2px 8px;border-radius:999px;
  border:1px solid var(--line);color:var(--ink2);white-space:nowrap}
.chip.gate{color:var(--warn);border-color:color-mix(in srgb,var(--warn) 45%,transparent);background:var(--warn-dim)}
.sk .desc{color:var(--ink2);font-size:12px;margin:5px 0 0 24px;line-height:1.5}
.sk .r3{display:flex;align-items:center;gap:8px;margin:9px 0 0 24px}
.last{font-family:var(--mono);font-size:11px;color:var(--ink3)}
.last .ok{color:var(--good)} .last .bad{color:var(--crit)}
.sk .sp{flex:1}
.btn-run{display:flex;align-items:center;gap:6px;background:var(--accent);border:none;color:var(--accent-fg);
  font-weight:700;font-size:12.5px;border-radius:8px;padding:7px 16px;cursor:pointer;flex:none}
.btn-run:hover{filter:brightness(1.1)}
.btn-run:disabled{opacity:.45;cursor:default}
.btn-sec{background:transparent;border:1px solid var(--line);color:var(--ink2);border-radius:8px;
  padding:6.5px 12px;cursor:pointer;font-size:12px;flex:none}
.btn-sec:hover{border-color:color-mix(in srgb,var(--accent) 50%,transparent);color:var(--accent)}
.btn-more{background:transparent;border:1px solid var(--line);color:var(--ink3);border-radius:8px;
  width:32px;height:31px;cursor:pointer;font-size:15px;line-height:1;flex:none}
.btn-more:hover{color:var(--ink);border-color:var(--line2)}
/* ⋯ 弹出菜单 */
.pop{position:fixed;z-index:60;background:var(--float);border:1px solid var(--line2);border-radius:10px;
  padding:5px;min-width:150px;box-shadow:0 14px 40px rgba(0,0,0,.5)}
.pop button{display:flex;width:100%;align-items:center;gap:8px;background:transparent;border:none;
  color:var(--ink2);font-size:12.5px;padding:8px 11px;border-radius:7px;cursor:pointer;text-align:left}
.pop button:hover{background:var(--hover);color:var(--ink)}
.pop button.danger:hover{background:var(--crit-dim);color:var(--crit)}

/* 原始录制(未整理)折叠区 */
details.raws{margin-top:16px}
details.raws summary{cursor:pointer;color:var(--ink3);font-size:12px;padding:4px 2px;list-style:none;display:flex;align-items:center;gap:7px}
details.raws summary::before{content:'▸';font-size:10px;transition:transform .15s}
details.raws[open] summary::before{transform:rotate(90deg)}
.raw{display:flex;align-items:center;gap:10px;background:transparent;border:1px dashed var(--line);
  border-radius:10px;padding:9px 13px;margin-top:8px}
.raw .nm{flex:1;color:var(--ink2);font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.raw .meta{font-family:var(--mono);font-size:10.5px;color:var(--ink3);white-space:nowrap}

/* 空状态:三步上手 */
.empty{margin:34px auto 0;max-width:400px;text-align:center;color:var(--ink2)}
.empty .big{font-size:32px;margin-bottom:10px}
.empty h3{color:var(--ink);font-size:15px;margin:0 0 16px;font-weight:700}
.empty ol{text-align:left;margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:11px}
.empty li{display:grid;grid-template-columns:24px 1fr;gap:10px;font-size:12.5px;line-height:1.55}
.empty li .n{font-family:var(--mono);color:var(--accent);font-weight:700}
.empty li b{color:var(--ink)}

/* ── 底部:实况条 + 教学页脚 ── */
.dock{position:absolute;left:0;right:0;bottom:0;padding:10px 16px 12px;display:flex;flex-direction:column;gap:8px;
  background:linear-gradient(180deg,transparent,var(--float) 45%);pointer-events:none}
.status{pointer-events:auto;display:none;align-items:center;gap:10px;background:var(--float);border:1px solid var(--line2);
  border-radius:10px;padding:9px 14px;font-size:12.5px;box-shadow:0 10px 30px rgba(0,0,0,.4)}
.status.show{display:flex}
.status .ic{flex:none}
.status .tx{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status.pause{border-color:var(--warn)}
.status.err{border-color:var(--crit)}
.status .go{pointer-events:auto;background:transparent;border:1px solid var(--line);color:var(--ink2);
  border-radius:7px;padding:4px 10px;cursor:pointer;font-size:11.5px;white-space:nowrap}
.status .go:hover{color:var(--ink);border-color:var(--line2)}
.edu{color:var(--ink3);font-size:11px;text-align:center;line-height:1.5}
.edu b{color:var(--ink2);font-weight:600}

/* ── 弹层(填参 / 批量 / 文档)── */
.ovl{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center}
.ovl.show{display:flex}
.sheet{width:min(560px,calc(100vw - 60px));max-height:calc(100vh - 90px);display:flex;flex-direction:column;
  background:var(--float);border:1px solid var(--line2);border-radius:14px;box-shadow:0 24px 70px rgba(0,0,0,.55)}
.sheet .sh{flex:none;display:flex;align-items:center;gap:9px;padding:13px 16px;border-bottom:1px solid var(--line)}
.sheet .sh .t{flex:1;font-weight:700;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sheet .sh .x{background:transparent;border:none;color:var(--ink3);cursor:pointer;font-size:17px;line-height:1}
.sheet .sh .x:hover{color:var(--ink)}
.sheet .sb{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:11px}
.sheet .sf{flex:none;display:flex;gap:9px;justify-content:flex-end;padding:12px 16px;border-top:1px solid var(--line)}
.fld label{display:block;color:var(--ink2);font-size:11.5px;margin-bottom:4px}
.fld input,.fld textarea{width:100%;background:var(--field);border:1px solid var(--line);border-radius:8px;
  padding:8px 11px;color:var(--ink);font-size:12.5px;font-family:var(--mono);outline:none}
.fld input:focus,.fld textarea:focus{border-color:var(--accent)}
.fld textarea{min-height:130px;resize:vertical;line-height:1.55}
.hint{color:var(--ink3);font-size:11.5px;line-height:1.5}
.map{font-family:var(--mono);font-size:11.5px;line-height:1.7;background:var(--field);border:1px solid var(--line);
  border-radius:8px;padding:8px 11px;color:var(--ink2)}
.map .y{color:var(--good)} .map .n{color:var(--warn)}
.ck{display:flex;align-items:center;gap:7px;color:var(--ink2);font-size:12px;cursor:pointer}
pre.doc{margin:0;font-family:var(--mono);font-size:11.5px;line-height:1.65;white-space:pre-wrap;color:var(--ink2);user-select:text}
.bp{font-family:var(--mono);font-size:11.5px;line-height:1.8;max-height:260px;overflow-y:auto}
.bp .y{color:var(--good)} .bp .n{color:var(--crit)}

/* toast */
#toast{position:fixed;left:50%;bottom:64px;transform:translateX(-50%);z-index:70;background:var(--float);
  border:1px solid var(--line2);border-radius:10px;padding:8px 16px;font-size:12.5px;box-shadow:0 12px 34px rgba(0,0,0,.5);
  display:none;max-width:76vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#toast .ok{color:var(--good)} #toast .err{color:var(--crit)}
</style>
</head>
<body>
<div class="app">

  <div class="tbar">
    <span class="logo">🎬</span>
    <span class="tt">录制与回放</span>
    <span class="sub">浏览器技能 · 录一遍,复用一辈子</span>
    <span class="sp"></span>
    <button class="wbtn" id="wmin" title="最小化">─</button>
    <button class="wbtn x" id="wclose" title="关闭">✕</button>
  </div>

  <!-- 录制英雄区:唯一主 action -->
  <div class="hero" id="hero">
    <div class="hl" id="heroTitle">录一遍,变成可复用的技能</div>
    <div class="hs" id="heroSub">输入要操作的系统网址(可留空,在浏览器里再打开也行)→ 开始录制 → 把操作走一遍 → 停止后起个名字,Agent 会自动整理</div>
    <div class="row" id="heroIdle">
      <input id="recUrl" placeholder="http://…(内网系统地址,可留空)" spellcheck="false">
      <button class="btn-rec" id="btnRec"><span class="dot"></span>开始录制</button>
    </div>
    <div class="row" id="heroLive" hidden>
      <div style="flex:1;display:flex;align-items:center;gap:10px">
        <span class="live-dot"></span>
        <span style="font-weight:700">录制中 · 已录 <b class="mono" id="recN">0</b> 步</span>
        <span style="color:var(--ink2);font-size:12px">— 去内嵌浏览器把操作走完</span>
      </div>
      <button class="btn-stop" id="btnStop">■ 停止并保存</button>
    </div>
  </div>

  <div class="tools">
    <div class="search">🔎<input id="q" placeholder="搜技能名 / 说明…"></div>
    <span class="cnt" id="cnt"></span>
    <button class="ghost" id="btnImport" title="导入同事分享的技能 JSON">导入</button>
  </div>

  <div class="list" id="list"></div>

  <div class="dock">
    <div class="status" id="status">
      <span class="ic" id="stIc">▶</span><span class="tx" id="stTx"></span>
      <button class="go" id="stGo" hidden>去浏览器窗口</button>
    </div>
    <div class="edu">💡 这些技能 <b>Agent 也会用</b>:在对话里说「用〈技能名〉跑一遍」或「按物料表批量跑」;回放遇到<b>验证码会自动暂停</b>,等你在页面输入后继续。</div>
  </div>

</div>

<!-- 填参弹层 -->
<div class="ovl" id="ovlParams"><div class="sheet">
  <div class="sh"><span class="t" id="pTitle">运行技能</span><button class="x" data-x="ovlParams">✕</button></div>
  <div class="sb" id="pBody"></div>
  <div class="sf"><button class="ghost" data-x="ovlParams">取消</button><button class="btn-run" id="pGo">▶ 运行</button></div>
</div></div>

<!-- 批量弹层 -->
<div class="ovl" id="ovlBatch"><div class="sheet">
  <div class="sh"><span class="t" id="bTitle">批量运行</span><button class="x" data-x="ovlBatch">✕</button></div>
  <div class="sb" id="bBody">
    <div class="hint">从 Excel 直接<b>整块复制、粘贴到下面</b>:第一行是表头,<b>表头 = 参数名</b>;每行数据独立跑一遍技能。</div>
    <div class="fld"><textarea id="bData" placeholder="客户手机号	金额&#10;13800001111	8000&#10;13900002222	12000" spellcheck="false"></textarea></div>
    <div class="map" id="bMap">粘贴后这里显示:解析多少行、每列对到哪个参数</div>
    <label class="ck"><input type="checkbox" id="bStop">某一行失败就中止(默认:跳过失败行继续)</label>
  </div>
  <div class="sf"><button class="ghost" data-x="ovlBatch">取消</button><button class="btn-run" id="bGo">▶ 开始批量运行</button></div>
</div></div>

<!-- 文档弹层 -->
<div class="ovl" id="ovlDoc"><div class="sheet">
  <div class="sh"><span class="t" id="dTitle">📄 技能文档</span><button class="ghost" id="dCopy" style="padding:4px 10px;font-size:11.5px">复制</button><button class="x" data-x="ovlDoc">✕</button></div>
  <div class="sb"><pre class="doc" id="dBody"></pre></div>
</div></div>

<div id="toast"></div>

<script>
const H = window.BocomHermes
const $ = (id) => document.getElementById(id)
// 跟随智能体主题实时切换(浅磨砂/墨玻璃/曜黑/纸白)
H.onTheme && H.onTheme((t) => { document.documentElement.dataset.theme = t })
const esc = (s) => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
let toastT = null
function toast(html){ const t = $('toast'); t.innerHTML = html; t.style.display = 'block'; clearTimeout(toastT); toastT = setTimeout(() => t.style.display = 'none', 3800) }

// 窗口控制
$('wmin').addEventListener('click', () => H.minimizeSelf())
$('wclose').addEventListener('click', () => window.close())
document.querySelectorAll('[data-x]').forEach((b) => b.addEventListener('click', () => $(b.dataset.x).classList.remove('show')))
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') document.querySelectorAll('.ovl.show').forEach((o) => o.classList.remove('show')) })

// ── 录制:一条流的起点 ────────────────────────────────────────────────────────
function setRec(on, n){
  $('heroIdle').hidden = on; $('heroLive').hidden = !on
  $('hero').classList.toggle('live', on)
  $('heroTitle').textContent = on ? '' : '录一遍,变成可复用的技能'
  $('heroTitle').style.display = on ? 'none' : ''
  $('heroSub').style.display = on ? 'none' : ''
  if (n != null) $('recN').textContent = n
}
$('btnRec').addEventListener('click', async () => {
  $('btnRec').disabled = true
  toast('正在打开内嵌浏览器并启动录制…')
  try{
    const r = await H.skillsRecord($('recUrl').value.trim())
    if (r && r.ok) { setRec(true, 1); toast('<span class="ok">●</span> 录制中 — 去浏览器把操作走一遍,回来点「停止并保存」') }
    else toast('<span class="err">⚠</span> ' + ((r && r.error) || '录制启动失败'))
  } catch(e){ toast('<span class="err">⚠</span> ' + e.message) }
  $('btnRec').disabled = false
})
$('recUrl').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('btnRec').click() })
$('btnStop').addEventListener('click', async () => {
  const r = await H.skillsStopRec()
  setRec(false)
  if (r && r.via === 'browser') toast('<span class="ok">✓</span> 已停止 — 在浏览器窗口给技能起个名字保存')
  else toast('<span class="ok">✓</span> 已停止')
})
// 录制计数实况(无论从哪个窗口发起的录制,这里都同步)
H.onBrowserRecCount && H.onBrowserRecCount(({ n, done }) => { if (done) { setRec(false); load() } else setRec(true, n) })

// ── 列表 ────────────────────────────────────────────────────────────────────
let items = [], runningId = null
const fmtT = (ts) => { const d = new Date(ts); return (d.getMonth()+1+'').padStart(2,'0') + '-' + (d.getDate()+'').padStart(2,'0') + ' ' + (d.getHours()+'').padStart(2,'0') + ':' + (d.getMinutes()+'').padStart(2,'0') }
async function load(){
  try { items = await H.browserRecList() || [] } catch { items = [] }
  render()
}
function render(){
  const q = $('q').value.trim().toLowerCase()
  const match = (it) => !q || (it.title || it.id).toLowerCase().includes(q) || (it.description || '').toLowerCase().includes(q)
  const skills = items.filter((it) => it.skill && match(it))
  const raws = items.filter((it) => !it.skill && match(it))
  $('cnt').textContent = skills.length + ' 个技能'
  const L = $('list'); L.innerHTML = ''
  if (!skills.length && !raws.length && !q){
    L.innerHTML = `<div class="empty"><div class="big">🎬</div><h3>还没有技能 — 三步上手</h3><ol>
      <li><span class="n">①</span><span>点上方「<b>● 开始录制</b>」,在打开的浏览器里把一次操作<b>完整走一遍</b>(登录、查询、导出…都行)</span></li>
      <li><span class="n">②</span><span>回来点「■ 停止并保存」,给技能<b>起个名字</b> — Agent 会自动整理:步骤命名、识别参数、补成功判据</span></li>
      <li><span class="n">③</span><span>以后在这里<b>一键运行</b>;要跑一批数据就点「批量」,把 Excel 粘进来</span></li></ol></div>`
    return
  }
  for (const it of skills) L.appendChild(skillCard(it))
  if (raws.length){
    const d = document.createElement('details'); d.className = 'raws'
    d.innerHTML = `<summary>原始录制(未整理成技能) · ${raws.length} 条</summary>`
    for (const it of raws){
      const r = document.createElement('div'); r.className = 'raw'
      r.innerHTML = `<span class="nm">${esc(it.title || it.id)}</span><span class="meta">${it.eventCount} 步 · ${fmtT(it.mtime)}</span>
        <button class="btn-sec" data-a="mk">⚙ 整理成技能</button><button class="btn-more" data-a="del" title="删除">🗑</button>`
      r.querySelector('[data-a="mk"]').addEventListener('click', async () => {
        const rr = await H.skillsMakeSkill(it.id)
        toast(rr && rr.ok ? '已在浏览器窗口弹出保存卡 — 去起个名字' : '<span class="err">⚠</span> ' + ((rr && rr.error) || '失败'))
      })
      r.querySelector('[data-a="del"]').addEventListener('click', async () => {
        if (!confirm('删除录制 "' + (it.title || it.id) + '"?')) return
        if (await H.browserRecDelete(it.id)) { toast('已删除'); load() }
      })
      d.appendChild(r)
    }
    L.appendChild(d)
  }
}
function skillCard(it){
  const el = document.createElement('div'); el.className = 'sk'
  const lr = it.lastRun
  const lastHtml = lr ? (lr.ok ? `<span class="ok">✓ 上次成功</span> · ${fmtT(lr.at)}` : `<span class="bad">✗ 上次 ${lr.fails} 步失败</span> · ${fmtT(lr.at)}`) : '还没运行过'
  el.innerHTML = `
    <div class="r1">
      <button class="star ${it.starred ? 'on' : ''}" title="收藏置顶">${it.starred ? '⭐' : '☆'}</button>
      <input class="name" value="${esc(it.title || it.id)}" spellcheck="false" title="点击改名">
      <span class="chip">${it.eventCount} 步</span>
      ${it.paramCount ? `<span class="chip">参数 ${it.paramCount}</span>` : ''}
      ${it.gates ? `<span class="chip gate" title="回放到这步会暂停,等你现场输入(如验证码)">⏸ 人工 ${it.gates}</span>` : ''}
    </div>
    ${it.description ? `<div class="desc">${esc(it.description)}</div>` : ''}
    <div class="r3">
      <span class="last">${lastHtml}</span><span class="sp"></span>
      <button class="btn-run" data-a="run">▶ 运行</button>
      <button class="btn-sec" data-a="batch" title="粘贴 Excel 数据,每行独立跑一遍">批量</button>
      <button class="btn-more" data-a="more" title="更多">⋯</button>
    </div>`
  el.querySelector('.star').addEventListener('click', async (e) => {
    const nv = !it.starred; await H.browserRecUpdate(it.id, { starred: nv }); it.starred = nv
    e.currentTarget.textContent = nv ? '⭐' : '☆'; e.currentTarget.classList.toggle('on', nv)
  })
  el.querySelector('.name').addEventListener('blur', async (e) => {
    const nv = e.target.value.trim()
    if (nv && nv !== (it.title || it.id)) { await H.browserRecUpdate(it.id, { title: nv }); it.title = nv; toast('<span class="ok">✓</span> 已重命名') }
  })
  el.querySelector('[data-a="run"]').addEventListener('click', () => (it.params && it.params.length) ? openParams(it) : runSkill(it, null, null, el))
  el.querySelector('[data-a="batch"]').addEventListener('click', () => openBatch(it))
  el.querySelector('[data-a="more"]').addEventListener('click', (e) => openMore(e.currentTarget, it))
  return el
}
$('q').addEventListener('input', render)
$('btnImport').addEventListener('click', async () => {
  const r = await H.browserRecImport()
  if (r && r.canceled) return
  toast(r && r.ok ? '<span class="ok">✓</span> 已导入「' + esc(r.title) + '」' : '<span class="err">⚠</span> 导入失败: ' + ((r && r.error) || ''))
  if (r && r.ok) load()
})

// ⋯ 菜单
let popEl = null
function closePop(){ if (popEl) { popEl.remove(); popEl = null } }
document.addEventListener('click', (e) => { if (popEl && !popEl.contains(e.target)) closePop() }, true)
function openMore(anchor, it){
  closePop()
  const r = anchor.getBoundingClientRect()
  popEl = document.createElement('div'); popEl.className = 'pop'
  popEl.innerHTML = `
    <button data-m="doc">📄 查看技能文档</button>
    <button data-m="exp">📤 导出分享</button>
    <button data-m="del" class="danger">🗑 删除技能</button>`
  document.body.appendChild(popEl)
  const pw = popEl.offsetWidth
  popEl.style.left = Math.max(8, Math.min(window.innerWidth - pw - 8, r.right - pw)) + 'px'
  popEl.style.top = Math.min(window.innerHeight - popEl.offsetHeight - 8, r.bottom + 6) + 'px'
  popEl.querySelector('[data-m="doc"]').addEventListener('click', async () => {
    closePop()
    const md = await H.browserRecSkillMd(it.id)
    if (!md) { toast('<span class="err">⚠</span> 生成文档失败'); return }
    $('dTitle').textContent = '📄 ' + (it.title || it.id)
    $('dBody').textContent = md
    $('dCopy').onclick = () => { navigator.clipboard.writeText(md).catch(() => {}); toast('<span class="ok">✓</span> 已复制') }
    $('ovlDoc').classList.add('show')
  })
  popEl.querySelector('[data-m="exp"]').addEventListener('click', async () => {
    closePop()
    const r2 = await H.browserRecExport(it.id)
    toast(r2 && r2.ok ? '<span class="ok">✓</span> 已导出到 下载/' + esc(String(r2.path || '').split(/[\\/]/).pop()) : '<span class="err">⚠</span> 导出失败')
  })
  popEl.querySelector('[data-m="del"]').addEventListener('click', async () => {
    closePop()
    if (!confirm('删除技能 "' + (it.title || it.id) + '"?')) return
    if (await H.browserRecDelete(it.id)) { toast('已删除'); load() }
  })
}

// ── 运行(单次)─────────────────────────────────────────────────────────────
function openParams(it){
  $('pTitle').textContent = '▶ 运行 · ' + (it.title || it.id)
  const B = $('pBody'); B.innerHTML = ''
  for (const p of it.params){
    const f = document.createElement('div'); f.className = 'fld'
    f.innerHTML = `<label>${esc(p.label)}${p.secret ? '(密码,必填)' : ''}</label>
      <input data-k="${esc(p.key)}" type="${p.secret ? 'password' : 'text'}" value="${p.secret ? '' : esc(p.default)}" spellcheck="false">`
    B.appendChild(f)
  }
  const env = document.createElement('div'); env.className = 'fld'
  env.innerHTML = `<label>环境地址(可选,留空=录制环境;切环境需先在浏览器登录目标环境)</label>
    <input id="pBase" placeholder="https://uat.example.com" spellcheck="false">`
  B.appendChild(env)
  $('ovlParams').classList.add('show')
  $('pGo').onclick = () => {
    const values = {}
    B.querySelectorAll('input[data-k]').forEach((i) => { values[i.dataset.k] = i.value })
    const baseUrl = $('pBase').value.trim() || undefined
    $('ovlParams').classList.remove('show')
    runSkill(it, values, baseUrl, null)
  }
  const first = B.querySelector('input'); if (first) setTimeout(() => first.focus(), 60)
}
async function runSkill(it, values, baseUrl){
  runningId = it.id
  showStatus('run', '▶ 正在启动「' + (it.title || it.id) + '」…')
  try{
    const r = await H.skillsRun({ id: it.id, params: values || undefined, baseUrl })
    if (r && r.error) showStatus('err', '⚠ ' + r.error, true)
    else if (r && r.ok) showStatus('done', '✓ 「' + (it.title || it.id) + '」运行成功', true)
    else showStatus('err', '⚠ 运行完成但有失败 — ' + String((r && r.report) || '').split('\n')[0], true)
  } catch(e){ showStatus('err', '⚠ ' + e.message, true) }
  runningId = null
  load()
}

// ── 批量 ────────────────────────────────────────────────────────────────────
let batchIt = null
function parseTable(txt){
  const lines = String(txt || '').replace(/\r/g, '').split('\n').filter((l) => l.trim())
  if (lines.length < 2) return { headers: [], rows: [] }
  const sep = lines[0].includes('\t') ? '\t' : ','
  const headers = lines[0].split(sep).map((s) => s.trim())
  const rows = lines.slice(1).map((l) => { const cs = l.split(sep); const o = {}; headers.forEach((h, i) => { if (h) o[h] = (cs[i] || '').trim() }); return o })
  return { headers, rows }
}
function previewMap(){
  if (!batchIt) return
  const { headers, rows } = parseTable($('bData').value)
  if (!rows.length) { $('bMap').innerHTML = '粘贴后这里显示:解析多少行、每列对到哪个参数'; return }
  const labels = (batchIt.params || []).map((p) => p.label)
  const parts = headers.filter(Boolean).map((h) => {
    const hit = (batchIt.params || []).some((p) => p.label === h || p.key === h || (p.label && (h.includes(p.label) || p.label.includes(h))))
    return hit ? `<span class="y">${esc(h)} ✓</span>` : `<span class="n">${esc(h)} ⚠未匹配</span>`
  })
  $('bMap').innerHTML = `解析 <b>${rows.length}</b> 行 · 列映射:${parts.join('  ')}${labels.length ? `<br>技能参数:${labels.map(esc).join('、')}` : '<br>该技能没有参数 — 每行会按原录制值跑'}`
}
$('bData').addEventListener('input', previewMap)
function openBatch(it){
  batchIt = it
  $('bTitle').textContent = '批量运行 · ' + (it.title || it.id)
  $('bData').value = ''; $('bStop').checked = false; previewMap()
  $('ovlBatch').classList.add('show')
  setTimeout(() => $('bData').focus(), 60)
}
$('bGo').addEventListener('click', async () => {
  if (!batchIt) return
  const { rows } = parseTable($('bData').value)
  if (!rows.length) { toast('<span class="err">⚠</span> 先粘贴数据(第一行=表头)'); return }
  if (rows.length > 200) { toast('<span class="err">⚠</span> 一次最多 200 行,请分批'); return }
  const it = batchIt
  $('ovlBatch').classList.remove('show')
  showStatus('run', '📊 批量「' + (it.title || it.id) + '」 0/' + rows.length + ' …')
  try{
    const r = await H.skillsRunBatch({ id: it.id, dataset: rows, onError: $('bStop').checked ? 'stop' : 'skip' })
    if (r && r.error) showStatus('err', '⚠ ' + r.error, true)
    else showStatus(r.fail ? 'err' : 'done', `📊 批量完成:✓ ${r.pass} / ✗ ${r.fail}`, true)
    if (r && r.report) { $('dTitle').textContent = '📊 批量报告 · ' + (it.title || it.id); $('dBody').textContent = r.report; $('dCopy').onclick = () => { navigator.clipboard.writeText(r.report).catch(() => {}); toast('<span class="ok">✓</span> 已复制') }; $('ovlDoc').classList.add('show') }
  } catch(e){ showStatus('err', '⚠ ' + e.message, true) }
  load()
})
H.onSkillBatchProgress && H.onSkillBatchProgress((d) => {
  showStatus(d.ok ? 'run' : 'err', `📊 批量 行 ${d.row}/${d.total} · ✓ ${d.pass} / ✗ ${d.fail}${d.ok ? '' : ' · ' + (d.firstErr || '')}`)
})

// ── 实况条:回放进度 / 人机断点 / 完成(任何窗口发起的回放都在这里可见)──────────
let stT = null
function showStatus(kind, text, autohide){
  const s = $('status')
  s.className = 'status show' + (kind === 'pause' ? ' pause' : kind === 'err' ? ' err' : '')
  $('stIc').textContent = kind === 'pause' ? '⏸' : kind === 'done' ? '✓' : kind === 'err' ? '⚠' : '▶'
  $('stTx').textContent = text
  $('stGo').hidden = kind !== 'pause'
  clearTimeout(stT)
  if (autohide) stT = setTimeout(() => s.classList.remove('show'), 6000)
}
$('stGo').addEventListener('click', () => toast('切到「BocomHermes · 浏览器」窗口完成该步 — 填完会自动继续'))
H.onBrowserReplayProgress && H.onBrowserReplayProgress((d) => {
  if (d.start) { showStatus('run', '▶ ' + (d.title || '回放') + ' 0/' + d.total); return }
  if (d.pause) { showStatus('pause', (d.heal ? '🔧 ' : '⏸ ') + (d.hint || '需人工操作') + (d.agent ? ' · 已通知 Agent' : '') + ' — 请到浏览器窗口完成'); return }
  if (d.resume) { showStatus('run', '▶ 已续跑…'); return }
  if (d.done) { showStatus(d.fails ? 'err' : 'done', d.fails ? '⚠ 完成,' + d.fails + ' 步失败' : '✓ 回放完成 ' + d.total + ' 步', true); load(); return }
  showStatus(d.ok === false ? 'err' : 'run', '▶ 步 ' + d.i + '/' + d.total + ' · ' + d.act + (d.ok === false ? ' ✗ ' + (d.err || '') : ''))
})

// Agent 自动整理完成
H.onBrowserSkillRefined && H.onBrowserSkillRefined((d) => {
  toast('🛠 「' + esc(d.title) + '」已由 Agent 整理:' + esc((d.applied || []).join('、')))
  load()
})
H.onSkillsChanged && H.onSkillsChanged(() => load())
window.addEventListener('focus', () => load())

load()
</script>
</body>
</html>
