<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>卡坞 · BocomHermes</title>
<script>try { document.documentElement.dataset.theme = window.BocomHermes.getTheme() || 'light' } catch (e) { document.documentElement.dataset.theme = 'light' }</script>
<script>(function(){try{var p=new URLSearchParams(location.search),d=document.documentElement.style;['gox','goy','gfx','gfy'].forEach(function(k){var v=p.get(k);if(v)d.setProperty('--'+k,v)})}catch(e){}})()</script>
<link rel="stylesheet" href="glass.css" />
<style>
  .dock { display: flex; flex-direction: column; height: 100%; padding: 13px 14px 12px; gap: 11px; }
  .hd { display: flex; align-items: center; gap: 8px; flex: none; }
  .hd .ttl { flex: 1; font-size: 14px; font-weight: 600; }
  .hd .sub { font-size: 11px; color: var(--txt3); font-family: var(--mono); }
  .hbtn { border: none; background: transparent; color: var(--txt3); cursor: pointer; padding: 4px; border-radius: 7px; display: flex; }
  .hbtn:hover { color: var(--txt); background: var(--composer-bg); }
  .list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 7px; padding-right: 2px; }
  .list::-webkit-scrollbar { width: 6px; } .list::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 3px; }
  .item { text-align: left; background: var(--composer-bg); border: .5px solid var(--composer-border); border-radius: 11px; padding: 9px 11px; cursor: pointer; display: flex; flex-direction: column; gap: 5px; }
  .item:hover { border-color: var(--accent); }
  .item .t { font-size: 12.5px; color: var(--txt); font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item .meta { display: flex; align-items: center; gap: 7px; font-size: 10.5px; color: var(--txt3); }
  .item .proj { font-family: var(--mono); background: var(--orb-bg); border: .5px solid var(--orb-border); border-radius: 999px; padding: 1px 7px; max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--txt3); font-size: 12.5px; text-align: center; padding: 0 20px; line-height: 1.6; }
  .ft { flex: none; display: flex; align-items: center; gap: 9px; }
  .ft .msg { flex: 1; font-size: 11px; color: var(--txt3); }
  .btn-ghost { font-size: 12px; color: var(--txt2); background: transparent; border: 1px solid var(--composer-border); border-radius: 9px; padding: 6px 13px; cursor: pointer; }
  .btn-ghost:hover { color: var(--txt); }
  .btn-ghost.danger:hover { color: var(--diff-del); border-color: var(--diff-del); }
  /* 开新会话(原"新对话"并入) */
  .newrow { display: flex; gap: 7px; align-items: flex-end; flex: none; }
  .newrow textarea { flex: 1; resize: none; background: var(--composer-bg); border: 1px solid var(--composer-border); border-radius: 10px; padding: 8px 11px; color: var(--txt); font-family: var(--font); font-size: 12.5px; line-height: 1.4; outline: none; max-height: 96px; }
  .newrow textarea:focus { border-color: var(--accent); }
  .newrow .go { flex: none; border: none; background: var(--brand); color: var(--send-fg); border-radius: 9px; padding: 0 13px; height: 36px; cursor: pointer; display: flex; align-items: center; }
  .newrow .go:hover { opacity: .88; }
  .newrow .go svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
  .seclbl { flex: none; font-size: 10.5px; color: var(--txt3); letter-spacing: .04em; padding: 2px 2px 0; }
</style>
</head>
<body>
<div class="glass">
  <span class="hl"></span>
  <div class="dock">
    <div class="hd">
      <span class="ttl">对话</span>
      <span id="count" class="sub"></span>
      <button id="x" class="hbtn nodrag" title="关闭" aria-label="关闭"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </div>
    <div class="newrow nodrag">
      <textarea id="goal" rows="1" placeholder="想让 Agent 做什么？复杂任务它会自主拉起动态工作流" spellcheck="false"></textarea>
      <button id="go" class="go" title="开始（Enter）" aria-label="开始"><svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg></button>
    </div>
    <div class="seclbl">最近会话 · 点一条续接</div>
    <div id="list" class="list nodrag"></div>
    <div class="ft nodrag">
      <span id="msg" class="msg">点一条续接对话；引擎重启后旧会话可能已不在，会自动为你新开一段。</span>
      <button id="clear" class="btn-ghost danger">清空</button>
    </div>
  </div>
</div>
<script>
  const $ = (id) => document.getElementById(id)
  const list = $('list')
  const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
  function rel(ts) {
    const d = Date.now() - ts, m = 60000, h = 3600000, day = 86400000
    if (d < m) return '刚刚'
    if (d < h) return Math.floor(d / m) + ' 分钟前'
    if (d < day) return Math.floor(d / h) + ' 小时前'
    if (d < 2 * day) return '昨天'
    const dt = new Date(ts); return (dt.getMonth() + 1) + '月' + dt.getDate() + '日'
  }
  function render() {
    let items = []
    try { items = (window.BocomHermes.getHistory() || []).slice() } catch (e) {}
    items.sort((a, b) => (b.ts || 0) - (a.ts || 0))
    $('count').textContent = items.length ? items.length + ' 段' : ''
    if (!items.length) {
      list.innerHTML = '<div class="empty">还没有对话历史。<br>从输入框开一张卡，关闭后会留在这里，随时续接。</div>'
      return
    }
    list.innerHTML = ''
    for (const it of items) {
      const el = document.createElement('button'); el.className = 'item'
      el.innerHTML = '<span class="t">' + esc(it.title || '对话') + '</span>'
        + '<span class="meta"><span class="proj">' + esc(it.project || '未选目录') + '</span><span>' + rel(it.ts || it.created || Date.now()) + '</span></span>'
      el.title = '续接：' + (it.title || '') + (it.dir ? '\n' + it.dir : '')
      el.addEventListener('click', async () => { try { await window.BocomHermes.openHistory(it.id, it.title || '续接对话') } catch (e) {} window.BocomHermes.closeSelf() })
      list.appendChild(el)
    }
  }
  render()
  try { window.BocomHermes.onTheme((t) => { document.documentElement.dataset.theme = t }) } catch (e) {}
  $('x').addEventListener('click', () => window.BocomHermes.closeSelf())
  $('clear').addEventListener('click', async () => { try { await window.BocomHermes.clearHistory() } catch (e) {} render() })
  // 开新会话:并入原"新对话"——开一张对话卡(卡里 Agent 可自主升格为动态工作流)
  const goalEl = $('goal')
  function go() {
    const v = goalEl.value.trim(); if (!v) return
    try { window.BocomHermes.spawnCard(v) } catch (e) {}
    window.BocomHermes.closeSelf()
  }
  $('go').addEventListener('click', go)
  goalEl.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); go() } })
  setTimeout(() => { try { goalEl.focus() } catch (e) {} }, 60)
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') window.BocomHermes.closeSelf() })
</script>
</body>
</html>
