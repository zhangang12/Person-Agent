<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>对话 · BocomHermes</title>
<script>try { document.documentElement.dataset.theme = window.BocomHermes.getTheme() || 'light' } catch (e) { document.documentElement.dataset.theme = 'light' }</script>
<script>(function(){try{var p=new URLSearchParams(location.search),d=document.documentElement.style;['gox','goy','gfx','gfy'].forEach(function(k){var v=p.get(k);if(v)d.setProperty('--'+k,v)})}catch(e){}})()</script>
<link rel="stylesheet" href="glass.css" />
<style>
  /* 整张卡 JS 拖动:关掉 app-region,靠鼠标事件移动窗口(同需求分析卡) */
  .glass, .card { -webkit-app-region: no-drag; }
  .card { display: flex; flex-direction: column; height: 100%; padding: 12px 14px 14px; gap: 11px; }
  .hd { display: flex; align-items: center; gap: 8px; flex: none; cursor: grab; }
  .hd:active { cursor: grabbing; }
  .orb { width: 11px; height: 11px; border-radius: 50%; background: var(--brand); flex: none; }
  .ttl { flex: 1; font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ttl .sub { font-size: 11px; font-weight: 400; color: var(--txt3); margin-left: 6px; font-family: var(--mono); }
  .hbtn { border: none; background: transparent; color: var(--txt3); cursor: pointer; padding: 4px; border-radius: 7px; display: flex; }
  .hbtn:hover { color: var(--txt); background: var(--composer-bg); }

  /* 工作目录 + 模式 控制行 */
  .ctlrow { display: flex; align-items: center; gap: 8px; flex: none; }
  .proj-chip { display: inline-flex; align-items: center; gap: 5px; max-width: 250px; font-size: 11.5px; color: var(--txt2); background: var(--composer-bg); border: 1px solid var(--composer-border); border-radius: 999px; padding: 4px 11px; cursor: pointer; }
  .proj-chip:hover { color: var(--txt); border-color: var(--accent); }
  .proj-chip.empty { color: var(--accent); border-color: var(--accent); }
  .proj-chip svg { width: 12px; height: 12px; flex: none; opacity: .8; }
  .proj-chip #projn { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sp { flex: 1; }
  .seg { display: inline-flex; background: var(--composer-bg); border: 1px solid var(--composer-border); border-radius: 999px; padding: 2px; gap: 2px; flex: none; }
  .seg button { border: none; background: transparent; color: var(--txt3); font-size: 11px; padding: 3px 11px; border-radius: 999px; cursor: pointer; font-family: var(--font); white-space: nowrap; }
  .seg button.on { background: var(--brand); color: var(--send-fg); font-weight: 600; }
  #modelName { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 116px; }
  .model-menu { position: fixed; z-index: 100; min-width: 210px; max-width: 300px; max-height: 360px; overflow-y: auto; background: var(--glass-bg); -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px); border: 1px solid var(--composer-border); border-radius: 12px; padding: 5px; box-shadow: 0 10px 34px rgba(0,0,0,.28); }
  .model-menu::-webkit-scrollbar { width: 6px; } .model-menu::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 3px; }
  .model-menu .mi { padding: 7px 10px; border-radius: 8px; cursor: pointer; display: flex; flex-direction: column; gap: 1px; }
  .model-menu .mi:hover, .model-menu .mi.on { background: var(--composer-bg); }
  .model-menu .mi .mn { font-size: 13px; color: var(--txt); }
  .model-menu .mi .mp { font-size: 10.5px; color: var(--txt3); }
  .model-menu .mhint { padding: 8px 10px; font-size: 12px; color: var(--txt3); }

  /* 开新会话 */
  .newrow { display: flex; gap: 8px; align-items: flex-end; flex: none; }
  .newrow textarea { flex: 1; resize: none; background: var(--composer-bg); border: 1px solid var(--composer-border); border-radius: 12px; padding: 10px 12px; color: var(--txt); font-family: var(--font); font-size: 13px; line-height: 1.5; outline: none; min-height: 62px; max-height: 168px; }
  .newrow textarea:focus { border-color: var(--accent); }
  .newrow textarea::placeholder { color: var(--txt3); }
  .newrow .go { flex: none; border: none; background: var(--brand); color: var(--send-fg); border-radius: 11px; width: 44px; height: 44px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity .15s; }
  .newrow .go:hover { opacity: .88; }
  .newrow .go svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
  .hint2 { flex: none; font-size: 11px; color: var(--txt3); line-height: 1.4; display: flex; align-items: center; gap: 5px; margin-top: -4px; }
  .hint2 svg { flex: none; opacity: .8; }

  .seclbl { flex: none; font-size: 11px; font-weight: 600; color: var(--txt3); letter-spacing: .03em; padding: 4px 2px 0; display: flex; align-items: center; }
  .seclbl .sp { flex: 1; }
  .seclbl .clr { font-size: 11px; font-weight: 400; color: var(--txt3); background: none; border: none; cursor: pointer; padding: 2px 4px; border-radius: 5px; }
  .seclbl .clr:hover { color: var(--diff-del); }

  .list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 7px; padding-right: 2px; }
  .list::-webkit-scrollbar { width: 7px; } .list::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 3px; }
  .item { text-align: left; background: var(--composer-bg); border: .5px solid var(--composer-border); border-radius: 12px; padding: 10px 12px; cursor: pointer; display: flex; flex-direction: column; gap: 5px; transition: border-color .15s; }
  .item:hover { border-color: var(--accent); }
  .item .t { font-size: 13px; color: var(--txt); font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item .meta { display: flex; align-items: center; gap: 7px; font-size: 10.5px; color: var(--txt3); }
  .item .proj { font-family: var(--mono); background: var(--orb-bg); border: .5px solid var(--orb-border); border-radius: 999px; padding: 1px 8px; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--txt3); font-size: 12.5px; text-align: center; padding: 0 24px; line-height: 1.7; gap: 6px; }
  .empty .big { font-size: 28px; opacity: .45; }
</style>
</head>
<body>
<div class="glass">
  <span class="hl"></span>
  <div class="card">
    <div class="hd" id="hd">
      <span class="orb"></span>
      <span class="ttl">对话 <span id="count" class="sub"></span></span>
      <button id="min" class="hbtn nodrag" title="最小化" aria-label="最小化"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/></svg></button>
      <button id="max" class="hbtn nodrag" title="最大化 / 还原" aria-label="最大化"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="5" width="14" height="14" rx="2"/></svg></button>
      <button id="x" class="hbtn nodrag" title="关闭" aria-label="关闭"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </div>

    <div class="ctlrow nodrag">
      <button id="proj" class="proj-chip" title="工作目录：对话 / 工作流都对它说话（点击切换）">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <span id="projn">未选目录</span>
      </button>
      <button id="modelChip" class="proj-chip" title="选择模型（全局默认；卡片可单独覆盖）">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 1 3 3 3 3 0 0 1 0 6 3 3 0 0 1-6 0 3 3 0 0 1 0-6 3 3 0 0 1 3-3z"/><path d="M12 11v8M8 21h8"/></svg>
        <span id="modelName">默认模型</span>
      </button>
      <span class="sp"></span>
      <div class="seg" title="自动：Agent 自己判断要不要拉队 ｜ 直接工作流：强制拉起动态编排">
        <button id="mAuto" class="on">自动</button>
        <button id="mWf">直接工作流</button>
      </div>
    </div>
    <div id="modelMenu" class="model-menu" hidden></div>

    <div class="newrow nodrag">
      <textarea id="goal" rows="2" placeholder="想让 Agent 做什么？" spellcheck="false"></textarea>
      <button id="go" class="go" title="开始（Enter）" aria-label="开始"><svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg></button>
    </div>
    <div class="hint2"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>复杂任务它会自主拉起动态工作流</div>

    <div class="seclbl">最近会话 · 点一条续接 <span class="sp"></span><button id="clear" class="clr nodrag">清空</button></div>
    <div id="list" class="list nodrag"></div>
  </div>
</div>
<script>
  const H = window.BocomHermes
  const $ = (id) => document.getElementById(id)
  const list = $('list')
  const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
  H.onTheme && H.onTheme((t) => { document.documentElement.dataset.theme = t })

  function rel(ts) {
    const d = Date.now() - ts, m = 60000, h = 3600000, day = 86400000
    if (d < m) return '刚刚'
    if (d < h) return Math.floor(d / m) + ' 分钟前'
    if (d < day) return Math.floor(d / h) + ' 小时前'
    if (d < 2 * day) return '昨天'
    const dt = new Date(ts); return (dt.getMonth() + 1) + '月' + dt.getDate() + '日'
  }
  function render() {
    let items = []
    try { items = (H.getHistory() || []).slice() } catch (e) {}
    items.sort((a, b) => (b.ts || 0) - (a.ts || 0))
    $('count').textContent = items.length ? items.length + ' 段历史' : ''
    if (!items.length) {
      list.innerHTML = '<div class="empty"><span class="big">💬</span>还没有历史会话<br>上面输入开一张新卡，关掉后会留在这儿续接</div>'
      return
    }
    list.innerHTML = ''
    for (const it of items) {
      const el = document.createElement('button'); el.className = 'item'
      el.innerHTML = '<span class="t">' + esc(it.title || '对话') + '</span>'
        + '<span class="meta"><span class="proj">' + esc(it.project || '未选目录') + '</span><span>' + rel(it.ts || it.created || Date.now()) + '</span></span>'
      el.title = '续接：' + (it.title || '') + (it.dir ? '\n' + it.dir : '')
      el.addEventListener('click', async () => { try { await H.openHistory(it.id, it.title || '续接对话') } catch (e) {} H.closeSelf() })
      list.appendChild(el)
    }
  }
  render()

  // 工作目录:对话/工作流都对它说话(grounding 的真相源)
  const projBtn = $('proj'), projN = $('projn')
  function paintProj(name) {
    const has = name && name !== '未选目录'
    projN.textContent = has ? name : '未选目录'
    projBtn.title = has ? '工作目录：' + name + '（对话 / 工作流都对它说话，点击切换）' : '未选工作目录，点击选择'
    projBtn.classList.toggle('empty', !has)
  }
  try { paintProj(H.getProject && H.getProject()) } catch (e) {}
  projBtn.addEventListener('click', async () => { try { paintProj(await H.pickProject()) } catch (e) {} setTimeout(() => goalEl.focus(), 30) })
  H.onProject && H.onProject((p) => paintProj(p))

  // 模式:自动(Agent 自判要不要升格) / 直接工作流(强制拉起动态编排)
  let mode = 'auto'
  $('mAuto').addEventListener('click', () => { mode = 'auto'; $('mAuto').classList.add('on'); $('mWf').classList.remove('on'); goalEl.focus() })
  $('mWf').addEventListener('click', () => { mode = 'wf'; $('mWf').classList.add('on'); $('mAuto').classList.remove('on'); goalEl.focus() })

  // 模型选择(全局默认;卡片可单独覆盖):列模型 → setSettings({model})
  const modelChip = $('modelChip'), modelNameEl = $('modelName'), modelMenu = $('modelMenu')
  let modelsCache = null, curModelKey = ''
  function paintModel() {
    let m = null; try { m = (H.getSettings && H.getSettings().model) || null } catch (e) {}
    curModelKey = m ? (m.providerID + '/' + m.modelID) : ''
    modelNameEl.textContent = m ? (m.name || m.modelID) : '默认模型'
    modelChip.title = '当前模型：' + (m ? (m.name || m.modelID) : 'serve 默认') + '（全局默认；卡片可覆盖，点击切换）'
  }
  paintModel()
  async function openModelMenu() {
    const r = modelChip.getBoundingClientRect()
    modelMenu.style.top = (r.bottom + 6) + 'px'; modelMenu.style.left = r.left + 'px'; modelMenu.style.right = 'auto'
    modelMenu.hidden = false; modelMenu.innerHTML = '<div class="mhint">加载模型…</div>'
    if (!modelsCache || !modelsCache.length) { try { modelsCache = await H.listModels() } catch (e) { modelsCache = [] } }   // 空不缓存,下次重试
    if (!modelsCache || !modelsCache.length) { modelMenu.innerHTML = '<div class="mhint">没拿到模型列表（serve 未就绪，稍后再点）</div>'; return }
    modelMenu.innerHTML = ''
    const mk = (name, sub, on, fn) => { const d = document.createElement('div'); d.className = 'mi' + (on ? ' on' : ''); d.innerHTML = '<span class="mn">' + esc(name) + '</span><span class="mp">' + esc(sub) + '</span>'; d.addEventListener('click', fn); modelMenu.appendChild(d) }
    mk('serve 默认', '不指定，用 serve 配置的默认模型', !curModelKey, () => pickModel(null))
    for (const m of modelsCache) mk(m.name, m.provider || m.providerID, curModelKey === m.providerID + '/' + m.modelID, () => pickModel(m))
  }
  async function pickModel(m) {
    try { await H.setSettings({ model: m ? { providerID: m.providerID, modelID: m.modelID, name: m.name } : null }) } catch (e) {}
    paintModel(); modelMenu.hidden = true
  }
  modelChip.addEventListener('click', (e) => { e.stopPropagation(); if (modelMenu.hidden) openModelMenu(); else modelMenu.hidden = true })
  document.addEventListener('click', (e) => { if (!modelMenu.hidden && !modelMenu.contains(e.target) && !modelChip.contains(e.target)) modelMenu.hidden = true })

  // 开新会话:自动=开对话卡(卡里 Agent 可自主升格);直接工作流=强制动态编排
  const goalEl = $('goal')
  function go() {
    const v = goalEl.value.trim(); if (!v) return
    try { if (mode === 'wf') H.spawnWorkflow(v); else H.spawnCard(v) } catch (e) {}
    H.closeSelf()
  }
  $('go').addEventListener('click', go)
  goalEl.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); go() } })
  setTimeout(() => { try { goalEl.focus() } catch (e) {} }, 60)

  // 窗口控制
  $('x').addEventListener('click', () => H.closeSelf())
  $('min').addEventListener('click', () => H.minimizeSelf())
  $('max').addEventListener('click', () => H.toggleMaximize())
  $('clear').addEventListener('click', async () => { try { await H.clearHistory() } catch (e) {} render() })
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') H.closeSelf() })

  // 整张卡 JS 拖动(同需求分析卡):抓取时读一次尺寸,移动时写回锁定尺寸 + 新坐标
  let _drag = false, _b = null, _mx = 0, _my = 0
  document.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return
    if (e.target.closest('button, input, a, textarea, select')) return
    _b = H.getSelfBounds(); if (!_b) return
    _drag = true; _mx = e.screenX; _my = e.screenY; e.preventDefault()
  })
  window.addEventListener('mousemove', (e) => {
    if (!_drag || !_b) return
    H.setSelfBounds({ x: _b.x + (e.screenX - _mx), y: _b.y + (e.screenY - _my), width: _b.width, height: _b.height })
  })
  window.addEventListener('mouseup', () => { _drag = false; _b = null })
</script>
</body>
</html>
