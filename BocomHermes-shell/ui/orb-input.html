<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>BocomHermes</title>
<script>try{document.documentElement.dataset.theme=window.BocomHermes.getTheme()||'light'}catch{document.documentElement.dataset.theme='light'}</script>
<link rel="stylesheet" href="glass.css">
<style>
body{padding:0;height:56px}
.glass{border-radius:28px;height:56px;display:flex;align-items:center;padding:0 8px 0 20px;gap:8px;
  opacity:0;transform-origin:var(--ax,50%) var(--oy,100%);animation:none}
.glass.in{animation:growOut .3s cubic-bezier(.34,1.5,.5,1) both}
/* 从智能体「长出来」：从最靠近球的那条边、由小放大 + 轻微位移 + 淡入 */
@keyframes growOut{
  0%{opacity:0;transform:translateY(var(--fy,14px)) scale(.18)}
  55%{opacity:1}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
#q{
  flex:1;min-width:0;border:none;outline:none;background:transparent;
  font-size:15px;color:var(--txt);font-family:var(--font);
  -webkit-user-select:text;user-select:text;cursor:text;
}
#q::placeholder{color:var(--txt3)}
.send-btn{
  flex:none;width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  background:var(--brand);transition:opacity .15s;
}
.send-btn:hover{opacity:.85}
.send-btn svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.mode-badge{
  flex:none;font-size:10px;letter-spacing:.04em;padding:3px 9px;border-radius:12px;
  background:rgba(130,80,255,.18);border:.5px solid rgba(130,80,255,.35);
  color:rgba(160,120,255,.9);white-space:nowrap;
}
.proj-chip{
  flex:none;display:flex;align-items:center;gap:5px;font-size:11px;font-family:var(--mono);
  color:var(--txt2);background:var(--composer-bg);border:.5px solid var(--composer-border);
  border-radius:12px;padding:3px 9px;max-width:140px;cursor:pointer;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .12s,border-color .12s,background .12s;
}
.proj-chip:hover{color:var(--txt);border-color:var(--accent)}
.proj-chip.empty{color:var(--accent);border-color:var(--accent);background:rgba(74,168,255,.08)}
.proj-chip svg{width:11px;height:11px;flex:none;opacity:.8}
.model-menu{position:fixed;z-index:100;min-width:210px;max-width:300px;max-height:360px;overflow-y:auto;background:var(--glass-bg);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border:1px solid var(--composer-border);border-radius:12px;padding:5px;box-shadow:0 10px 34px rgba(0,0,0,.28)}
.model-menu .mi{padding:7px 10px;border-radius:8px;cursor:pointer;display:flex;flex-direction:column;gap:1px}
.model-menu .mi:hover,.model-menu .mi.on{background:var(--composer-bg)}
.model-menu .mi .mn{font-size:13px;color:var(--txt)}
.model-menu .mi .mp{font-size:10.5px;color:var(--txt3)}
.model-menu .mhint{padding:8px 10px;font-size:12px;color:var(--txt3)}
</style>
</head>
<body>
<div class="glass nodrag">
  <div class="hl"></div>
  <div id="badge" class="mode-badge" style="display:none">并行评审</div>
  <button id="proj" class="proj-chip" title="点击选择项目目录（新卡将对它说话）">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    <span id="projn">未选目录</span>
  </button>
  <button id="modelChip" class="proj-chip" title="选择模型（全局默认；卡片可单独覆盖）">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M9 9h6v6H9z"/></svg>
    <span id="modelName">默认模型</span>
  </button>
  <div id="modelMenu" class="model-menu" hidden></div>
  <input id="q" placeholder="问 BocomHermes…" autofocus autocomplete="off" spellcheck="false">
  <button class="send-btn nodrag" id="send" title="发送">
    <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
  </button>
</div>
<script>
const H = window.BocomHermes
const q = document.getElementById('q')
const params = new URLSearchParams(location.search)

// 从智能体「长出来」的方向与锚点：dir=up 输入框在球上方→从底边长出；down→从顶边；ax=球心相对输入框的 x
const dir = params.get('dir') || 'up'
const ax = params.get('ax')
const glass = document.querySelector('.glass')
glass.style.setProperty('--ax', ax ? ax + 'px' : '50%')
glass.style.setProperty('--oy', dir === 'down' ? '0%' : '100%')
glass.style.setProperty('--fy', dir === 'down' ? '-14px' : '14px')
requestAnimationFrame(() => glass.classList.add('in'))

function submit() {
  const v = q.value.trim()
  if (!v) { H.closeOrbInput(); return }
  q.value = ''
  H.spawnCard(v)            // 单一入口:开一张对话卡;复杂任务由卡内 Agent 自主升格为动态工作流
  H.closeOrbInput()
}

q.addEventListener('keydown', e => {
  if (e.isComposing || e.keyCode === 229) return;   // IME 组合态不发送
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit() }
  if (e.key === 'Escape') H.closeOrbInput()
})
document.getElementById('send').addEventListener('click', submit)

H.onFillInput && H.onFillInput(text => { q.value = text.slice(0, 500); q.focus() })
H.onTheme && H.onTheme(t => { document.documentElement.dataset.theme = t })

// 项目选择
const projBtn = document.getElementById('proj'), projN = document.getElementById('projn')
function paintProj(name) {
  const has = name && name !== '未选目录'
  projN.textContent = has ? name : '未选目录'
  projBtn.title = has ? '项目目录：' + name + '（点击切换；只影响新开的卡）' : '未选目录，点击选择'
  projBtn.classList.toggle('empty', !has)
}
try { paintProj(H.getProject && H.getProject()) } catch {}
let picking = false
projBtn.addEventListener('mousedown', e => e.preventDefault())  // 不让按钮抢焦点，避免触发 blur 链路
projBtn.addEventListener('click', async () => {
  picking = true
  try { paintProj(await H.pickProject()) } catch {}
  picking = false; setTimeout(() => q.focus(), 30)
})
H.onProject && H.onProject(p => paintProj(p))

// 模型选择(与对话坞同一全局默认;新开的卡生效,已开的卡不受影响——卡内 chip 可单独覆盖)
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]))
const modelChip = document.getElementById('modelChip'), modelNameEl = document.getElementById('modelName'), modelMenu = document.getElementById('modelMenu')
let modelsCache = null, curModelKey = ''
function paintModel() {
  let m = null; try { m = (H.getSettings && H.getSettings().model) || null } catch (e) {}
  curModelKey = m ? (m.providerID + '/' + m.modelID) : ''
  modelNameEl.textContent = m ? (m.name || m.modelID) : '默认模型'
  modelChip.title = '当前模型：' + (m ? (m.name || m.modelID) : 'serve 默认') + '（全局默认；卡片可覆盖，点击切换）'
}
paintModel()
async function openModelMenu() {
  const r = modelChip.getBoundingClientRect()
  modelMenu.style.top = (r.bottom + 6) + 'px'; modelMenu.style.left = r.left + 'px'; modelMenu.style.right = 'auto'
  modelMenu.hidden = false; modelMenu.innerHTML = '<div class="mhint">加载模型…</div>'
  if (!modelsCache || !modelsCache.length) { try { modelsCache = await H.listModels() } catch (e) { modelsCache = [] } }   // 空不缓存,下次重试
  if (!modelsCache || !modelsCache.length) { modelMenu.innerHTML = '<div class="mhint">没拿到模型列表（serve 未就绪，稍后再点）</div>'; return }
  modelMenu.innerHTML = ''
  const mk = (name, sub, on, fn) => { const d = document.createElement('div'); d.className = 'mi' + (on ? ' on' : ''); d.innerHTML = '<span class="mn">' + esc(name) + '</span><span class="mp">' + esc(sub) + '</span>'; d.addEventListener('click', fn); modelMenu.appendChild(d) }
  mk('serve 默认', '不指定，用 serve 配置的默认模型', !curModelKey, () => pickModel(null))
  for (const m of modelsCache) mk(m.name, m.provider || m.providerID, curModelKey === m.providerID + '/' + m.modelID, () => pickModel(m))
}
async function pickModel(m) {
  try { await H.setSettings({ model: m ? { providerID: m.providerID, modelID: m.modelID, name: m.name } : null }) } catch (e) {}
  paintModel(); modelMenu.hidden = true; setTimeout(() => q.focus(), 30)
}
modelChip.addEventListener('mousedown', e => e.preventDefault())  // 不抢焦点,避免触发 blur 关框
modelChip.addEventListener('click', (e) => { e.stopPropagation(); if (modelMenu.hidden) openModelMenu(); else modelMenu.hidden = true })
document.addEventListener('click', (e) => { if (!modelMenu.hidden && !modelMenu.contains(e.target) && !modelChip.contains(e.target)) modelMenu.hidden = true })

window.addEventListener('blur', () => { if (!picking) H.closeOrbInput() })
setTimeout(() => q.focus(), 40)
</script>
</body>
</html>
