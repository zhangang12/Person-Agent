<script>(function(){try{var p=new URLSearchParams(location.search),d=document.documentElement.style;['gox','goy','gfx','gfy'].forEach(function(k){var v=p.get(k);if(v)d.setProperty('--'+k,v)})}catch(e){}})()</script>
<link rel="stylesheet" href="glass.css" />
<style>
  .card { display: flex; flex-direction: column; height: 100%; padding: 11px 13px 12px; gap: 9px; position: relative; }
  /* 探活日志抽屉 */
  .probedraw { position: absolute; top: 0; right: 0; bottom: 0; width: 320px; max-width: 80%; z-index: 40;
    background: var(--bg, #12131a); border-left: 1px solid var(--line, rgba(255,255,255,.1));
    box-shadow: -10px 0 30px rgba(0,0,0,.45); display: flex; flex-direction: column;
    animation: pdslide .18s ease-out; }
  .probedraw[hidden] { display: none; }
  @keyframes pdslide { from { transform: translateX(100%) } to { transform: translateX(0) } }
  .pd-hd { display: flex; align-items: center; gap: 7px; padding: 10px 12px; flex: none; border-bottom: 1px solid var(--line, rgba(255,255,255,.08)); flex-wrap: wrap; }
  .pd-title { font-size: 12.5px; font-weight: 700; color: var(--txt); }
  .pd-sub { font-size: 10px; color: var(--txt3); font-family: var(--mono); }
  .pd-now { margin-left: auto; font-size: 10.5px; color: var(--accent); background: var(--accent-dim, rgba(74,168,255,.12)); border: .5px solid rgba(74,168,255,.3); border-radius: 6px; padding: 3px 8px; cursor: pointer; }
  .pd-now:hover { background: rgba(74,168,255,.22); }
  .pd-x { font-size: 13px; color: var(--txt2); background: transparent; border: none; cursor: pointer; padding: 2px 5px; }
  .pd-x:hover { color: var(--txt); }
  .pd-list { flex: 1; overflow-y: auto; padding: 6px 8px; font-family: var(--mono); font-size: 11px; line-height: 1.5; }
  .pd-empty { color: var(--txt3); text-align: center; padding: 24px 12px; font-size: 11.5px; }
  .pd-row { display: grid; grid-template-columns: auto 1fr auto; gap: 4px 8px; align-items: baseline; padding: 5px 6px; border-radius: 6px; border-left: 2px solid transparent; }
  .pd-row + .pd-row { margin-top: 2px; }
  .pd-row.ok { border-left-color: #2bb673; background: rgba(43,182,115,.06); }
  .pd-row.bad { border-left-color: #e5534b; background: rgba(229,83,75,.08); }
  .pd-t { color: var(--txt3); font-variant-numeric: tabular-nums; }
  .pd-m { color: var(--txt2); grid-column: 2; word-break: break-all; }
  .pd-r { grid-column: 2; font-weight: 600; }
  .pd-row.ok .pd-r { color: #2bb673; }
  .pd-row.bad .pd-r { color: #e5534b; }
  .pd-ms { grid-row: 1; grid-column: 3; color: var(--txt3); }
  .hd { display: flex; align-items: center; gap: 7px; flex: none; }
  .icn { width: 16px; height: 16px; flex: none; display: inline-flex; }
  .ttl { flex: 1; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .proj { font-size: 10.5px; font-family: var(--mono); color: var(--txt2); background: var(--composer-bg); border: .5px solid var(--composer-border); border-radius: 999px; padding: 2px 8px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; transition: color .12s, border-color .12s, background .12s; }
  .proj:hover { color: var(--txt); border-color: var(--accent); }
  .proj.empty { color: var(--accent); border-color: var(--accent); background: rgba(74,168,255,.08); }
  /* 模型选择 */
  .modelchip { display: inline-flex; align-items: center; gap: 4px; max-width: 134px; }
  .model-menu { position: fixed; z-index: 100; min-width: 210px; max-width: 290px; max-height: 340px; overflow-y: auto; background: var(--glass-bg); -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px); border: 1px solid var(--composer-border); border-radius: 12px; padding: 5px; box-shadow: 0 10px 34px rgba(0,0,0,.28); }
  .model-menu::-webkit-scrollbar { width: 6px; } .model-menu::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 3px; }
  .model-menu .mi { padding: 7px 10px; border-radius: 8px; cursor: pointer; display: flex; flex-direction: column; gap: 1px; }
  .model-menu .mi:hover, .model-menu .mi.on { background: var(--composer-bg); }
  .model-menu .mi .mn { font-size: 13px; color: var(--txt); }
  .model-menu .mi .mp { font-size: 10.5px; color: var(--txt3); }
  .model-menu .mhint { padding: 8px 10px; font-size: 12px; color: var(--txt3); }
  /* 作答技能:slash 菜单(浮在输入框上方) + 当前技能胶囊 */
  .skill-menu { position: absolute; left: 12px; right: 12px; bottom: 52px; z-index: 90; max-height: 260px; overflow-y: auto; background: var(--glass-bg); -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px); border: 1px solid var(--composer-border); border-radius: 12px; padding: 5px; box-shadow: 0 10px 34px rgba(0,0,0,.28); }
  .skill-menu[hidden] { display: none; }
  .skill-menu::-webkit-scrollbar { width: 6px; } .skill-menu::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 3px; }
  .skill-menu .si { padding: 7px 10px; border-radius: 8px; cursor: pointer; display: flex; flex-direction: column; gap: 1px; }
  .skill-menu .si:hover, .skill-menu .si.sel { background: var(--composer-bg); }
  .skill-menu .si .sn { font-size: 13px; color: var(--txt); font-weight: 600; }
  .skill-menu .si .sd { font-size: 10.5px; color: var(--txt3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .skill-menu .sfoot { padding: 7px 10px; font-size: 11px; color: var(--accent); cursor: pointer; border-top: .5px solid var(--composer-border); margin-top: 3px; }
  .skill-menu .snone { padding: 8px 10px; font-size: 12px; color: var(--txt3); }
  .skill-bar { padding: 0 2px 5px; }
  .skill-bar[hidden] { display: none; }
  .skill-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--accent); background: rgba(74,168,255,.1); border: .5px solid var(--accent); border-radius: 999px; padding: 3px 6px 3px 10px; }
  .skill-chip .sx { cursor: pointer; opacity: .7; display: inline-flex; padding: 1px; border-radius: 50%; font-size: 12px; line-height: 1; } .skill-chip .sx:hover { opacity: 1; background: rgba(74,168,255,.2); }
  /* 拖拽 / 粘贴 附件 */
  .att-row { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 2px 6px; }
  .att-row:empty { display: none; }
  .att { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--txt2); background: var(--composer-bg); border: .5px solid var(--composer-border); border-radius: 8px; padding: 4px 8px; max-width: 220px; }
  .att img { width: 26px; height: 26px; object-fit: cover; border-radius: 4px; flex: none; }
  .att .an { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .att .ax { cursor: pointer; color: var(--txt3); flex: none; font-size: 12px; } .att .ax:hover { color: var(--diff-del); }
  .drop-hint { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; text-align: center; padding: 20px; background: rgba(74,168,255,.14); border: 2.5px dashed var(--accent); border-radius: 14px; color: var(--accent); font-size: 14px; font-weight: 600; z-index: 60; pointer-events: none; }
  .drop-hint.show { display: flex; }
  .hb { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-family: var(--mono); color: var(--txt2); padding: 1px 6px 1px 5px; border-radius: 999px; border: .5px solid var(--composer-border); background: var(--composer-bg); user-select: none; cursor: default; }
  .hb .hb-dot { width: 7px; height: 7px; border-radius: 50%; background: #9aa0a6; box-shadow: 0 0 0 0 rgba(0,0,0,0); transition: background .2s, box-shadow .2s; }
  .hb.ok  .hb-dot { background: #2bb673; box-shadow: 0 0 6px rgba(43,182,115,.7); }
  .hb.bad .hb-dot { background: #e5534b; box-shadow: 0 0 6px rgba(229,83,75,.7); }
  .hb.ok  { color: #2bb673; border-color: rgba(43,182,115,.35); }
  .hb.bad { color: #e5534b; border-color: rgba(229,83,75,.4); }
  .hbtn { border: none; background: transparent; color: var(--txt3); cursor: pointer; padding: 3px; border-radius: 6px; display: flex; align-items: center; }
  .hbtn:hover { color: var(--txt); background: var(--composer-bg); }
  .hbtn.on { color: var(--accent); }
  .err { color: var(--txt2); }

  /* 卡片输入框：自增高多行 */
  .composer { align-items: flex-end; }
  .composer textarea { flex: 1; min-width: 0; background: transparent; border: none; outline: none; color: var(--txt); font-size: 13px; font-family: var(--font); resize: none; line-height: 1.45; max-height: 96px; overflow-y: auto; padding: 4px 0; }
  .composer textarea::placeholder { color: var(--txt3); }
  .composer textarea::-webkit-scrollbar { width: 5px; } .composer textarea::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 3px; }
  .composer .send { margin-bottom: 1px; }

  /* 思考链折叠块 */
  .reason { align-self: flex-start; max-width: 92%; background: var(--c-think-bg); border: .5px solid var(--composer-border); border-left: 3px solid var(--c-think); border-radius: 0 11px 11px 0; }
  .reason > summary { cursor: pointer; padding: 8px 12px; color: var(--c-think); font-size: 13px; font-weight: 600; list-style: none; display: flex; align-items: center; gap: 7px; user-select: none; }
  .reason > summary::-webkit-details-marker { display: none; }
  .reason > summary .chev { transition: transform .15s; }
  .reason[open] > summary .chev { transform: rotate(90deg); }
  .reason .body { padding: 0 12px 9px; color: var(--txt); white-space: pre-wrap; line-height: 1.6; font-size: 13.5px; max-height: 280px; overflow-y: auto; }
  .reason .body::-webkit-scrollbar { width: 5px; } .reason .body::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 3px; }

  /* Markdown */
  #feed { overflow-x: hidden; }
  .ai { overflow-wrap: anywhere; line-height: 1.55; }
  .ai h1, .ai h2, .ai h3, .ai h4 { font-size: 15px; font-weight: 600; margin: 10px 0 5px; color: var(--c-heading); }
  .ai p { margin: 5px 0; } .ai p:first-child { margin-top: 0; }
  .ai ul, .ai ol { margin: 5px 0; padding-left: 18px; } .ai li { margin: 2px 0; }
  .ai li::marker { color: var(--accent); }
  .ai strong, .ai b { color: var(--c-strong); font-weight: 600; }
  .ai code { font-family: var(--mono); font-size: 13px; color: var(--c-code); background: var(--c-codebg); padding: 1px 5px; border-radius: 4px; }
  .ai pre.code { background: var(--composer-bg); border: .5px solid var(--composer-border); border-radius: 8px; padding: 9px 11px; overflow-x: auto; margin: 7px 0; }
  .ai pre.code code { background: none; padding: 0; white-space: pre; color: var(--txt); }
  .ai hr { border: none; border-top: .5px solid var(--composer-border); margin: 9px 0; }
  .ai blockquote { margin: 6px 0; padding: 3px 11px; border-left: 2.5px solid var(--c-quote); color: var(--c-quote); background: var(--composer-bg); border-radius: 0 7px 7px 0; }
  .floc { color: var(--accent); cursor: pointer; text-decoration: none; border-bottom: 1px dotted var(--accent); }
  .floc:hover { opacity: .75; }
  .ai table { border-collapse: collapse; margin: 7px 0; font-size: 13px; display: block; max-width: 100%; overflow-x: auto; }
  .ai th, .ai td { border: .5px solid var(--composer-border); padding: 4px 8px; text-align: left; vertical-align: top; }
  .ai th { font-weight: 600; background: var(--composer-bg); white-space: nowrap; }
  .ai pre.code::-webkit-scrollbar, .ai table::-webkit-scrollbar { height: 6px; }
  .ai pre.code::-webkit-scrollbar-thumb, .ai table::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 3px; }

  /* 富结果块 */
  .rblk { margin: 8px 0; background: var(--composer-bg); border: .5px solid var(--composer-border); border-radius: 10px; overflow: hidden; }
  .rbhd { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 5px 8px; border-bottom: .5px solid var(--composer-border); }
  .rfile { font-size: 11px; color: var(--accent); font-family: var(--mono); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .racts { display: flex; gap: 6px; flex: none; }
  .rbtn-primary { font-size: 11px; font-weight: 600; color: var(--send-fg); background: var(--brand); border: none; border-radius: 7px; padding: 3px 11px; cursor: pointer; }
  .rbtn-ghost { font-size: 11px; color: var(--txt2); background: transparent; border: .5px solid var(--composer-border); border-radius: 7px; padding: 3px 9px; cursor: pointer; }
  .rbtn-ghost:hover { color: var(--txt); }
  .rbtn-primary:disabled, .rbtn-ghost:disabled { opacity: .65; cursor: default; }
  .rbtn-primary.done, .rbtn-ghost.done { background: var(--composer-bg); color: var(--green); border: .5px solid var(--composer-border); opacity: 1; }
  .rbtn-primary.danger { background: var(--diff-del-bg); color: var(--diff-del); border: 1px solid var(--diff-del); padding: 2px 10px; }
  .rbody { margin: 0; padding: 8px 10px; overflow-x: auto; }
  .rbody code { font-family: var(--mono); font-size: 12px; white-space: pre; background: none; padding: 0; }
  .rbody::-webkit-scrollbar { height: 6px; } .rbody::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 3px; }
  /* 多文件 diff 组 */
  .rdiffset { margin: 8px 0; display: flex; flex-direction: column; gap: 6px; }
  .rdiffset .rblk { margin: 0; }
  .rsetbar { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 1px 2px 2px; }
  .rsetlabel { font-size: 11px; color: var(--txt2); }
  .rdiff { padding: 6px 0; }
  .dl { font-family: var(--mono); font-size: 12px; padding: 1px 10px; white-space: pre; }
  .dl-add { background: var(--diff-add-bg); color: var(--diff-add); }
  .dl-del { background: var(--diff-del-bg); color: var(--diff-del); }
  .dl-hunk, .dl-meta { color: var(--txt3); }

  /* 命令运行的折叠输出区（挂在命令块下） */
  .rout { border-top: .5px solid var(--composer-border); }
  .rout > summary { cursor: pointer; padding: 5px 10px; font-size: 11px; color: var(--txt2); list-style: none; }
  .rout > summary::-webkit-details-marker { display: none; }
  .rout > summary::before { content: '▸ '; }
  .rout[open] > summary::before { content: '▾ '; }
  .routbody { padding: 2px 10px 8px; font-size: 12px; max-height: 240px; overflow: auto; background: none; border: none; max-width: 100%; }
  .routbody::-webkit-scrollbar { width: 5px; } .routbody::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 3px; }

  /* TODO 待办块 */
  .todo-blk { display: flex; align-items: center; gap: 8px; background: var(--composer-bg); border: .5px solid var(--composer-border); border-radius: 10px; padding: 7px 10px; margin: 4px 0; flex-wrap: wrap; }

  /* findings 严重度徽标 */
  .ai .sev { display: inline-block; font-size: 10px; font-weight: 600; padding: 0 6px; border-radius: 999px; margin-right: 6px; border: 1px solid; }
  .ai .sev-must { color: var(--diff-del); border-color: var(--diff-del); background: var(--diff-del-bg); }
  .ai .sev-sugg { color: var(--warn-txt); border-color: var(--warn-border); background: var(--warn-bg); }
  .ai .sev-info { color: var(--txt3); border-color: var(--composer-border); background: var(--composer-bg); }

  /* 快捷指令条 */
  .quick { flex: none; display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 1px; }
  .quick::-webkit-scrollbar { height: 0; }
  .quick.hidden { display: none; }
  .qchip { flex: none; font-size: 11px; color: var(--txt2); background: var(--composer-bg); border: .5px solid var(--composer-border); border-radius: 999px; padding: 4px 11px; cursor: pointer; white-space: nowrap; }
  .qchip:hover { color: var(--txt); border-color: var(--accent); }
  .qchip.go { color: #fff; background: linear-gradient(135deg,#1aa86e,#0b8e5c); border-color: transparent; font-weight: 600; }
  .qchip.go:hover { opacity: .92; }

  .perm { display: flex; align-items: center; gap: 8px; background: var(--warn-bg); border: .5px solid var(--warn-border); border-radius: 11px; padding: 7px 9px; }
  .perm .t { flex: 1; font-size: 12px; color: var(--warn-txt); }
  .perm .ok { font-size: 11px; font-weight: 600; color: var(--warn-btn-fg); background: var(--warn-btn); padding: 4px 10px; border-radius: 7px; border: none; cursor: pointer; }
  .perm .no { font-size: 11px; color: var(--txt2); background: transparent; border: none; cursor: pointer; padding: 4px 6px; }

  /* 分诊 / 进度播报行 */
  .note { align-self: flex-start; max-width: 92%; font-size: 11.5px; color: var(--txt2); background: var(--composer-bg); border: .5px solid var(--composer-border); border-left: 2.5px solid var(--accent); border-radius: 0 9px 9px 0; padding: 5px 10px; white-space: pre-wrap; line-height: 1.45; }
  .note.muted { border-left-color: var(--txt3); color: var(--txt3); }
  /* 工具调用 chip:看得见 Agent 在 grounding / 升格(run_workflow 高亮) */
  /* 工具日志块：可展开，显示 工具名/标题 + 入参 + 结果（对齐 opencode TUI 的 tool call 视图） */
  .toolbox { align-self: flex-start; max-width: 92%; font-size: 11px; color: var(--txt2); background: var(--composer-bg); border: .5px solid var(--composer-border); border-radius: 9px; margin: 2px 0; overflow: hidden; }
  .toolbox > summary { cursor: pointer; padding: 5px 11px; display: flex; align-items: center; gap: 6px; list-style: none; user-select: none; }
  .toolbox > summary::-webkit-details-marker { display: none; }
  .toolbox .ti { flex: none; }
  .toolbox .tn { font-family: var(--mono); font-weight: 600; color: var(--txt); flex: none; }
  .toolbox .tt { font-family: var(--mono); color: var(--txt3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
  .toolbox .ts2 { color: var(--txt3); margin-left: auto; flex: none; }
  .toolbox.done .ts2 { color: var(--green); }
  .toolbox.err .ts2 { color: var(--diff-del); }
  .toolbox .tsec { border-top: .5px solid var(--composer-border); padding: 5px 11px; }
  .toolbox .tsl { display: block; font-size: 9.5px; color: var(--txt3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
  .toolbox .tsec pre { margin: 0; font-family: var(--mono); font-size: 11px; line-height: 1.45; white-space: pre-wrap; word-break: break-word; max-height: 260px; overflow: auto; color: var(--txt); }
  .toolbox .tsec.e pre { color: var(--diff-del); }
  .toolbox.wf { border-color: var(--accent); background: rgba(74,168,255,.08); }
  .toolbox.wf .tn { color: var(--accent); font-family: inherit; }
  /* 子agent富容器(可"进入"):折叠块,点开=看它的 思考 + 完整工具(入参/结果,复用 .toolbox) + 产出,对齐主 Agent */
  .subagent { align-self: flex-start; max-width: 92%; background: var(--composer-bg); border: .5px solid var(--composer-border); border-left: 3px solid var(--c-think); border-radius: 0 11px 11px 0; margin: 3px 0; overflow: hidden; }
  .subagent > summary { cursor: pointer; padding: 6px 11px; list-style: none; display: flex; align-items: center; gap: 7px; user-select: none; }
  .subagent > summary::-webkit-details-marker { display: none; }
  .subagent .sa-chev { flex: none; color: var(--txt3); transition: transform .15s; }
  .subagent[open] .sa-chev { transform: rotate(90deg); }
  .subagent .sa-ic { flex: none; }
  .subagent .sa-name { font-size: 12.5px; font-weight: 600; color: var(--c-think); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
  .subagent .sa-meta { margin-left: auto; flex: none; font-family: var(--mono); font-size: 10.5px; color: var(--txt3); font-variant-numeric: tabular-nums; }
  .subagent.done .sa-meta { color: var(--green); } .subagent.err .sa-meta { color: var(--diff-del); }
  .subagent .sa-body { padding: 2px 10px 8px 14px; display: flex; flex-direction: column; gap: 3px; }
  .subagent .sa-reason { font-size: 12px; color: var(--txt2); white-space: pre-wrap; line-height: 1.55; max-height: 200px; overflow-y: auto; border-left: 2px solid var(--c-think); padding: 2px 9px; opacity: .92; }
  .subagent .sa-reason::-webkit-scrollbar { width: 5px; } .subagent .sa-reason::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 3px; }
  .subagent .sa-out { font-size: 13px; color: var(--txt); line-height: 1.5; overflow-wrap: anywhere; margin-top: 3px; padding-top: 4px; border-top: .5px dashed var(--composer-border); }
  /* 子agent紧凑组(.subbox)样式仍在共享组件 agentmon.js(reqflow/reqplan 用);本卡已改用上面的 .subagent 富容器 */
  /* 体验感:滚动守卫的"跳到最新"悬浮键 + AI 回答悬停复制 */
  .card { position: relative; }
  .jumpbtn { position: absolute; left: 50%; bottom: 64px; transform: translateX(-50%); z-index: 8; display: inline-flex; align-items: center; gap: 4px; font-size: 11.5px; color: var(--txt); background: var(--glass-bg); -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px); border: .5px solid var(--composer-border); border-radius: 999px; padding: 5px 12px; cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,.2); }
  .jumpbtn:hover { border-color: var(--accent); color: var(--accent); }
  .jumpbtn[hidden] { display: none; }
  .msg.ai { position: relative; }
  .msg.ai .copybtn { position: absolute; top: 4px; right: 4px; opacity: 0; transition: opacity .12s, color .12s, border-color .12s; background: var(--composer-bg); border: .5px solid var(--composer-border); border-radius: 6px; padding: 3px; color: var(--txt3); cursor: pointer; display: inline-flex; line-height: 0; }
  .msg.ai:hover .copybtn { opacity: .8; }
  .msg.ai .copybtn:hover { opacity: 1; color: var(--txt); border-color: var(--accent); }
  .msg.ai .copybtn.ok { color: var(--green); border-color: var(--green); opacity: 1; }
  /* Claude Code 式状态行:忙时钉在输入框上方 —— 耗时 + 正在跑的工具 + Esc 提示;完成短显 ✓ 耗时 */
  .statusline { flex: none; display: flex; align-items: center; gap: 7px; font-size: 11.5px; color: var(--txt2); padding: 1px 4px 0; min-width: 0; }
  .statusline[hidden] { display: none; }
  .statusline .sl-spin { flex: none; display: inline-flex; color: var(--accent); }
  .statusline .sl-main { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
  .statusline .sl-tool { font-family: var(--mono); color: var(--accent); }
  .statusline .sl-time { flex: none; font-variant-numeric: tabular-nums; color: var(--txt3); }
  .statusline .sl-esc { flex: none; color: var(--txt3); border: .5px solid var(--composer-border); border-radius: 5px; padding: 0 5px; font-size: 10px; }
  .statusline.ok { color: var(--green); }
  /* 排队中的消息气泡(Claude Code 式 queueing):半透明 + ⏳ 角标,发出时恢复 */
  .msg.me.queued { opacity: .55; }
  .qtag { font-size: 10px; color: var(--txt3); margin-left: 6px; }
  /* 工具行紧凑化:折叠时 summary 即一行摘要(⏺ 名称 · 目标 · 状态 · 输出量) */
  .toolbox .tsum { color: var(--txt3); flex: none; font-size: 10.5px; }
  /* todowrite → 勾选清单(对齐 Claude Code 的 todo 列表) */
  .todoline { display: flex; align-items: baseline; gap: 7px; padding: 2px 0; font-size: 12px; color: var(--txt2); line-height: 1.45; }
  .todoline .tstat { flex: none; font-size: 11px; }
  .todoline.done { color: var(--txt3); text-decoration: line-through; text-decoration-color: var(--composer-border); }
  .todoline.doing { color: var(--txt); font-weight: 600; }
  .todoline.doing .tstat { color: var(--accent); }
</style>
</head>
<body>
<div class="glass">
  <span class="hl"></span>
  <div class="card">
    <div class="hd">
      <span id="st" class="icn"></span>
      <span id="ttl" class="ttl">对话</span>
      <span id="proj" class="proj"></span>
      <span id="model" class="proj modelchip nodrag" title="选择模型（仅影响本卡）">默认模型</span>
      <span id="hb" class="hb" title="引擎保活心跳检测中…"><i class="hb-dot"></i><span class="hb-txt">保活</span></span>
      <button id="bverbose" class="hbtn nodrag" title="过程详情：开=每个工具自动展开入参/结果；关=紧凑一行摘要(点击单个可展开)" aria-label="过程详情"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13M8 12h13M8 18h13"/><circle cx="3.5" cy="6" r="1.2" fill="currentColor" stroke="none"/><circle cx="3.5" cy="12" r="1.2" fill="currentColor" stroke="none"/><circle cx="3.5" cy="18" r="1.2" fill="currentColor" stroke="none"/></svg></button>
      <button id="bprobe" class="hbtn nodrag" title="保活心跳日志（看 POST /heartbeat 的报文）" aria-label="保活日志"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2.5 7 5-14 2.5 7H21"/></svg></button>
      <button id="pin" class="hbtn nodrag" title="置顶" aria-label="置顶"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4h6l-1.2 5.2L17 12v2H7v-2l3.2-2.8z"/><path d="M12 14v6"/></svg></button>
      <button id="max" class="hbtn nodrag" title="最大化 / 还原" aria-label="最大化"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="5" y="5" width="14" height="14" rx="2"/></svg></button>
      <button id="min" class="hbtn nodrag" title="最小化" aria-label="最小化"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/></svg></button>
      <button id="x" class="hbtn nodrag" title="关闭" aria-label="关闭"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </div>
    <div id="modelMenu" class="model-menu nodrag" hidden></div>
    <div id="skillMenu" class="skill-menu nodrag" hidden></div>
    <div id="feed" class="feed nodrag"></div>
    <div id="quick" class="quick nodrag"></div>
    <div id="attRow" class="att-row nodrag"></div>
    <div id="dropHint" class="drop-hint">松手上传 — 文档解析成文本，图片走多模态识别</div>
    <div id="skillBar" class="skill-bar nodrag" hidden></div>
    <div id="statusline" class="statusline nodrag" hidden></div>
    <div class="composer nodrag">
      <textarea id="ci" rows="1" placeholder="继续对话…（Enter 发送 · Shift+Enter 换行 · / 挂载作答技能 · ↑ 翻输入历史）"></textarea>
      <button id="send" class="send" aria-label="发送"></button>
    </div>

    <!-- 探活日志抽屉:右侧滑出,显示 GET /global/health 的报文 -->
    <div id="probedraw" class="probedraw nodrag" hidden>
      <div class="pd-hd">
        <span class="pd-title">📡 保活心跳日志</span>
        <span class="pd-sub">每 2 分钟 POST /heartbeat</span>
        <button id="pd-now" class="pd-now" title="当场发一次心跳">⟳ 立即保活</button>
        <button id="pd-x" class="pd-x" aria-label="关闭">✕</button>
      </div>
      <div id="pd-list" class="pd-list"></div>
    </div>
  </div>
</div>
<script src="rich.js"></script>
<script>
  window.BocomHermes.onTheme((t) => { document.documentElement.dataset.theme = t })

  // 引擎探活状态灯：保活心跳每 2 分钟刷一次 /global/health，结果(healthy)推过来更新本卡的灯
  ;(function () {
    const hb = document.getElementById('hb'); if (!hb) return
    const dot = hb.querySelector('.hb-dot'), txt = hb.querySelector('.hb-txt')
    window.BocomHermes.onServeHealth && window.BocomHermes.onServeHealth((p) => {
      const ok = p && p.healthy
      hb.classList.toggle('ok', !!ok); hb.classList.toggle('bad', !ok)
      if (txt) txt.textContent = ok ? '保活正常' : '保活失败'
      const when = p && p.at ? new Date(p.at).toLocaleTimeString('zh-CN') : ''
      hb.title = (ok ? '引擎保活正常' : '引擎保活失败') + (p && p.port ? '（serve :' + p.port + '）' : '') + (when ? '\n最近心跳 ' + when : '')
    })
  })()

  // 探活日志抽屉:看每次 GET /global/health 的报文
  ;(function () {
    const draw = document.getElementById('probedraw'), btn = document.getElementById('bprobe')
    const list = document.getElementById('pd-list'), pdx = document.getElementById('pd-x'), pdnow = document.getElementById('pd-now')
    if (!draw || !btn) return
    const esc = (s) => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    const fmt = (p) => {
      const t = p.at ? new Date(p.at).toLocaleTimeString('zh-CN') : ''
      const ok = !!p.healthy
      const res = ok ? '✓ success' : ('✗ ' + (p.status ? 'HTTP ' + p.status + ' ' : '') + esc(p.body || ''))
      return '<div class="pd-row ' + (ok ? 'ok' : 'bad') + '">'
        + '<span class="pd-t">' + t + '</span>'
        + '<span class="pd-m">POST 127.0.0.1:' + (p.port || '?') + '/heartbeat</span>'
        + '<span class="pd-r">' + res + '</span>'
        + '<span class="pd-ms">' + (p.ms != null ? p.ms + 'ms' : '') + '</span>'
        + '</div>'
    }
    let history = []
    const render = () => { list.innerHTML = history.length ? history.slice().reverse().map(fmt).join('') : '<div class="pd-empty">还没有保活记录<br>(每 2 分钟一条，或点「立即保活」)</div>' }
    async function open() {
      draw.hidden = false; btn.classList.add('on')
      try { history = await window.BocomHermes.getProbeLog() || [] } catch { history = [] }
      render()
    }
    function close() { draw.hidden = true; btn.classList.remove('on') }
    btn.addEventListener('click', () => draw.hidden ? open() : close())
    pdx && pdx.addEventListener('click', close)
    pdnow && pdnow.addEventListener('click', async () => {
      pdnow.disabled = true; const o = pdnow.textContent; pdnow.textContent = '保活中…'
      try { const e = await window.BocomHermes.probeNow(); if (e) { history.push(e); if (history.length > 50) history.shift(); render() } }
      catch {} finally { pdnow.disabled = false; pdnow.textContent = o }
    })
    window.BocomHermes.onServeProbe && window.BocomHermes.onServeProbe((p) => {
      history.push(p); if (history.length > 50) history.shift()
      if (!draw.hidden) render()
    })
  })()

  // Markdown 渲染 + 富结果块识别已抽到 ui/rich.js（window.Rich）。
  const renderMarkdown = (md) => window.Rich.renderMarkdown(md)
  // HTML 转义 —— 主脚本必须自带一份:此前唯一的定义在上面探活抽屉的 IIFE 里(函数作用域,不外泄),
  // 主脚本里所有 esc() 调用(工具日志/模型菜单/技能菜单)运行时都是 TypeError: esc is not a function ——
  // 工具块 createElement 成功进了 DOM、innerHTML 赋值时炸掉,剩一个空白框(vm 桩自测 card:ui:test 抓的就是这类雷)
  const esc = (s) => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')

  const params = new URLSearchParams(location.search)
  const title = params.get('title') || '新对话'
  const initMsg = params.get('msg') || title    // msg 在场时发送内容不同于标题（fan-out）
  const dispMsg = params.get('disp') || initMsg // disp 在场时用户气泡展示它（发送仍是 initMsg，如 AI 分析含大段 DOM）
  const ttl = document.getElementById('ttl'); ttl.textContent = title; ttl.title = title
  document.title = title + ' · BocomHermes'   // 任务栏/Alt+Tab 区分各卡
  const projEl = document.getElementById('proj')
  // 项目标签 = 本卡视角:显示【本卡绑定】的目录,点击只切换本卡(不动全局、不影响其它卡)
  function paintProj(name, dir) {
    const txt = (name && name !== '未选目录') ? name : ''
    projEl.textContent = txt || '未选目录'
    projEl.title = '本卡项目目录：' + (dir || txt || '未选') + '\n点击切换（仅影响本卡，立即重建会话）'
    projEl.classList.toggle('empty', !txt)
  }
  projEl.addEventListener('click', async () => {
    // 本卡专用切目录:选完立刻在新目录的 serve 上重建本卡会话;取消/同目录不动
    let r
    try { r = await window.BocomHermes.cardPickProject() } catch (e) { return }
    if (!r || !r.changed) return
    if (busy) { try { window.BocomHermes.cardAbort() } catch {} }
    cardReady = false; setBusy(true); resetConversation()
    const boot = addMsg('', 'ai'); boot.textContent = '正在切换到新项目，重建会话…'
    try {
      const rr = await window.BocomHermes.cardReinit({ dir: r.dir })
      boot.remove()
      paintProj(rr.project, rr.dir)
      paintModelChip(rr.model)   // reinit 后后端以回包为准,chip 不再骗人
      cardReady = true; setBusy(false)
      addMsg('本卡已切换到项目「' + (rr.project || '未选目录') + '」(' + (rr.dir || '') + ')，新会话就绪，直接提问即可。', 'ai')
      maybeDrain()
    } catch (e) {
      boot.className = 'msg ai err'; boot.textContent = '⚠ 切换失败：' + (e.message || e); setBusy(false)
    }
  })
  // 不再监听全局 project-changed 重绘 —— 全局项目只是"新卡默认",本卡标签唯一真相源是 cardInit/cardReinit 回包
  const feed = document.getElementById('feed'), st = document.getElementById('st')
  const ci = document.getElementById('ci'), send = document.getElementById('send')
  // 体验感:滚动守卫 —— 只有贴着底部(≤80px)才跟随流式内容;用户上翻看历史时不被硬拽,离底则弹"跳到最新"
  const nearBottom = () => feed.scrollHeight - feed.scrollTop - feed.clientHeight < 80
  const jumpBtn = document.createElement('button'); jumpBtn.className = 'jumpbtn'; jumpBtn.hidden = true
  jumpBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>最新'
  jumpBtn.addEventListener('click', () => { feed.scrollTop = feed.scrollHeight; jumpBtn.hidden = true })
  ;(document.querySelector('.card') || document.body).appendChild(jumpBtn)
  feed.addEventListener('scroll', () => { jumpBtn.hidden = nearBottom() })
  function scrollFeed(force) {
    if (force || nearBottom()) { feed.scrollTop = feed.scrollHeight; jumpBtn.hidden = true }
    else jumpBtn.hidden = false   // 离底又来了新内容 → 提示有更新
  }
  const quick = document.getElementById('quick')

  // 工作台内嵌：隐藏自带窗口控件（由工作台窗口的系统边框负责），不自动发首条消息
  const embedded = params.get('embedded') === '1'
  if (embedded) ['pin', 'max', 'min', 'x'].forEach((id) => { const el = document.getElementById(id); if (el) el.style.display = 'none' })

  document.getElementById('x').addEventListener('click', () => window.BocomHermes.closeSelf())
  document.getElementById('min').addEventListener('click', () => window.BocomHermes.minimizeSelf())
  document.getElementById('max').addEventListener('click', () => window.BocomHermes.toggleMaximize())
  const pinBtn = document.getElementById('pin')
  pinBtn.addEventListener('click', async () => { const on = await window.BocomHermes.togglePin(); pinBtn.classList.toggle('on', on); pinBtn.title = on ? '已置顶（点击取消）' : '置顶' })

  // 模型选择(仅影响本卡):点 chip → 列模型 → 选 → cardSetModel。
  // chip 状态以主进程回包为准:失败回滚、未就绪提示"就绪后生效"、init/reinit 后重绘 —— UI 不再骗人
  const modelEl = document.getElementById('model'), menuEl = document.getElementById('modelMenu')
  let modelsCache = null, modelsCacheAt = 0, curModelKey = ''
  function setModelLabel(name) { modelEl.textContent = name || '默认模型'; modelEl.title = '当前模型：' + (name || 'serve 默认') + '\n点击切换（仅影响本卡）' }
  function paintModelChip(m) {
    curModelKey = (m && m.modelID) ? ((m.providerID || '') + '/' + m.modelID) : ''
    setModelLabel(m && m.modelID ? (m.name || m.modelID) : '')
  }
  async function openModelMenu() {
    const r = modelEl.getBoundingClientRect()
    menuEl.style.top = (r.bottom + 6) + 'px'; menuEl.style.right = (window.innerWidth - r.right) + 'px'; menuEl.style.left = 'auto'
    menuEl.hidden = false; menuEl.innerHTML = '<div class="mhint">加载模型…</div>'
    // 空不缓存下次重试;成功缓存 60s(serve 换模型配置后列表能刷新)
    if (!modelsCache || !modelsCache.length || Date.now() - modelsCacheAt > 60000) {
      try { modelsCache = await window.BocomHermes.listModels(); if (modelsCache && modelsCache.length) modelsCacheAt = Date.now() } catch (e) { modelsCache = [] }
    }
    if (!modelsCache || !modelsCache.length) { menuEl.innerHTML = '<div class="mhint">没拿到模型列表（serve 未就绪，稍后再点）</div>'; return }
    menuEl.innerHTML = ''
    const mk = (cls, name, sub, on, fn) => { const d = document.createElement('div'); d.className = 'mi' + (on ? ' on' : ''); d.innerHTML = '<span class="mn">' + esc(name) + '</span><span class="mp">' + esc(sub) + '</span>'; d.addEventListener('click', fn); menuEl.appendChild(d) }
    mk('', 'serve 默认', '不指定，用 serve 配置的默认模型', !curModelKey, () => pickModel(null))
    for (const m of modelsCache) mk('', m.name, m.provider || m.providerID, curModelKey === m.providerID + '/' + m.modelID, () => pickModel(m))
  }
  async function pickModel(m) {
    menuEl.hidden = true
    const prevKey = curModelKey, prevLabel = modelEl.textContent, prevTitle = modelEl.title
    try {
      const r = await window.BocomHermes.cardSetModel(m)
      if (r && r.ok) {
        paintModelChip(m || r.model)
        addNote(r.applied
          ? ('已切换模型：' + (m ? m.name : 'serve 默认') + '（仅本卡，下一条起生效）')
          : ('模型已记录：' + (m ? m.name : 'serve 默认') + '，会话就绪后自动生效'), 'muted')
        return
      }
    } catch (e) {}
    curModelKey = prevKey; modelEl.textContent = prevLabel; modelEl.title = prevTitle   // 失败回滚,chip 不骗人
    addNote('切换模型失败（引擎未响应，请稍后重试）', 'muted')
  }
  modelEl.addEventListener('click', (e) => { e.stopPropagation(); if (menuEl.hidden) openModelMenu(); else menuEl.hidden = true })
  document.addEventListener('click', (e) => { if (!menuEl.hidden && !menuEl.contains(e.target) && e.target !== modelEl) menuEl.hidden = true })
  // 进卡的初始 chip 由 boot 处 cardInit 回包绘制(= 本卡 override || 全局默认);这里先给全局默认兜底
  try { const gm = (window.BocomHermes.getSettings && window.BocomHermes.getSettings().model) || null; if (gm && gm.modelID) paintModelChip(gm) } catch (e) {}

  // 点 文件:行 链接 → 在编辑器打开
  feed.addEventListener('click', (e) => {
    const a = e.target.closest('a.floc'); if (!a) return
    e.preventDefault(); window.BocomHermes.openLoc(a.dataset.file, a.dataset.line)
  })

  const ARROW = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>'
  const STOP = '<svg width="12" height="12" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>'
  const SPIN = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" style="color:var(--accent);animation:spin 1s linear infinite"><path d="M12 3a9 9 0 1 0 9 9"/></svg>'
  const DONE = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" style="color:var(--green)"><path d="M4 12l5 5L20 6"/></svg>'
  let busy = false
  // 运行中的工具登记表:状态行据此显示"正在跑什么"。必须declare在 setBusy 之前 —— setBusy(false) 在定义处立即执行,
  // 若它声明在后面就是 TDZ ReferenceError,整张卡直接白屏(卡片自测的 vm 桩就是抓这种雷的)。
  const runningTools = new Map()   // partID → 摘要文本
  // Claude Code 式状态行:忙时实时显示【正在跑什么 + 已耗时 + Esc 中断】,完成短显 ✓ 耗时。
  // 挂在 setBusy 上:所有进入/退出忙态的路径(turn/切项目/boot)自然带上状态行,不用逐处埋点。
  const sl = document.getElementById('statusline')
  let turnT0 = 0, slTimer = null, slHideTimer = null
  function paintStatus() {
    if (!busy || !turnT0) return
    const secs = Math.floor((Date.now() - turnT0) / 1000)
    let act = '思考中'
    if (runningTools.size) {
      const last = [...runningTools.values()].pop()
      act = '<span class="sl-tool">' + esc(last) + '</span>' + (runningTools.size > 1 ? '（共 ' + runningTools.size + ' 个工具在跑）' : '')
    }
    sl.classList.remove('ok')
    sl.innerHTML = '<span class="sl-spin">✻</span><span class="sl-main">' + act + '</span><span class="sl-time">' + secs + 's</span><span class="sl-esc">Esc 中断</span>'
    sl.hidden = false
  }
  function setBusy(b) {
    busy = b; st.innerHTML = b ? SPIN : DONE; send.innerHTML = b ? STOP : ARROW; quick.classList.toggle('hidden', b); try { window.BocomHermes.reportBusy(b) } catch {}
    if (b) {
      turnT0 = Date.now(); runningTools.clear(); clearTimeout(slHideTimer)
      paintStatus(); if (!slTimer) slTimer = setInterval(paintStatus, 500)
    } else {
      if (slTimer) { clearInterval(slTimer); slTimer = null }
      runningTools.clear()
      if (turnT0) {   // 有过一轮 → 短显 ✓ 耗时再隐藏;boot 期间的 setBusy(false) 没有 turnT0,不闪一下
        const secs = Math.round((Date.now() - turnT0) / 1000)
        sl.classList.add('ok'); sl.innerHTML = '✓ 完成 · ' + secs + 's'; sl.hidden = false
        clearTimeout(slHideTimer); slHideTimer = setTimeout(() => { sl.hidden = true }, 3500)
        turnT0 = 0
      } else sl.hidden = true
    }
  }
  setBusy(false)
  // Esc 中断(Claude Code 肌肉记忆)。优先级:关记忆弹层 > 关模型菜单 >(技能菜单由输入框自己处理)> 中断本轮
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return
    const mp = document.getElementById('memPop'); if (mp) { mp.remove(); return }
    if (!menuEl.hidden) { menuEl.hidden = true; return }
    if (skillMenuOpen()) return
    if (busy) {
      try { window.BocomHermes.cardAbort() } catch {}
      sl.classList.remove('ok'); sl.innerHTML = '<span class="sl-spin">✻</span><span class="sl-main">正在停止…（等引擎收尾，几秒内结束）</span>'; sl.hidden = false
    }
  })

  // 工作台：右侧浏览器一键把调试上下文注入这个会话（会话忙/未就绪时排队，逐条发送）
  let cardReady = false
  const pendingInjects = []
  function maybeDrain() {
    if (!cardReady || busy || !pendingInjects.length) return
    const n = pendingInjects.shift()
    if (n.el) { n.el.classList.remove('queued'); const q = n.el.querySelector('.qtag'); if (q) q.remove() }   // 排队气泡转正:去掉半透明和 ⏳
    else if (n.disp) addMsg(n.disp, 'me')
    turn(n.text, null, n.files)
  }
  function injectMessage(text, disp) { pendingInjects.push({ text, disp }); maybeDrain() }
  // 分诊 / 进度提示行（不是一轮对话，只是过程播报）
  function addNote(text, tone) {
    if (tone === 'user') { addMsg(text, 'me'); return }
    const d = document.createElement('div'); d.className = 'note' + (tone === 'muted' ? ' muted' : '')
    d.textContent = text; feed.appendChild(d); scrollFeed()
  }
  try { window.BocomHermes.onCardInject(({ text, disp }) => injectMessage(text, disp)) } catch {}
  try { window.BocomHermes.onCardNote(({ text, tone }) => addNote(text, tone)) } catch {}

  // 切项目重建会话时:清空对话与流式中间态(curAnswer/parts 在下方声明,调用时已初始化)
  function resetConversation() {
    feed.innerHTML = ''
    curAnswer = null; curReason = null; answerParts = null; reasonParts = null
    pendingInjects.length = 0
    // toolEls/subAgents 也得清:feed 清空后它们攥的全是 detached DOM —— 旧引用既是内存泄漏,
    // 撞上同 partID 时 renderTool 还会去更新一个不在页面上的节点(工具日志"凭空消失")
    toolEls.clear(); subAgents.clear(); if (_saTick) { clearInterval(_saTick); _saTick = null }
  }

  function addMsg(text, who) {
    const d = document.createElement('div')
    d.className = 'msg ' + (who === 'me' ? 'me' : 'ai')
    if (who === 'ai') { d.dataset.raw = text || ''; d.innerHTML = renderMarkdown(text); if (text) addCopyBtn(d) } else d.textContent = text
    feed.appendChild(d); scrollFeed(true)   // 新消息=离散动作,强制到底(流式增量才守卫)
    return d
  }
  // AI 回答悬停右上角一键复制(复制原文,不是渲染后的 HTML)
  function addCopyBtn(el) {
    if (el._copied) return; el._copied = true
    const b = document.createElement('button'); b.className = 'copybtn'; b.title = '复制'
    b.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>'
    b.addEventListener('click', (e) => { e.stopPropagation(); try { navigator.clipboard.writeText(el.dataset.raw || el.textContent || '') } catch {} b.classList.add('ok'); setTimeout(() => b.classList.remove('ok'), 1200) })
    el.appendChild(b)
  }
  function showPermission(requestId, tool, detail) {
    const box = document.createElement('div'); box.className = 'perm'
    const t = document.createElement('span'); t.className = 't'
    t.innerHTML = '请求执行 <span class="pt" style="font-family:var(--mono)"></span>'
    t.querySelector('.pt').textContent = tool
    if (detail) { const d = document.createElement('span'); d.style.cssText = 'display:block;font-family:var(--mono);font-size:11px;color:var(--txt2);margin-top:3px;word-break:break-all;opacity:.92'; d.textContent = detail; t.appendChild(d) }
    const ok = document.createElement('button'); ok.className = 'ok'; ok.textContent = '允许一次'
    const al = document.createElement('button'); al.className = 'no'; al.textContent = '总是'
    const no = document.createElement('button'); no.className = 'no'; no.textContent = '拒绝'
    const reply = (d) => { window.BocomHermes.permissionReply(requestId, d); box.remove() }
    ok.onclick = () => reply('once'); al.onclick = () => reply('always'); no.onclick = () => reply('reject')
    box.append(t, ok, al, no)
    feed.appendChild(box); scrollFeed(true)   // 权限提示需被看到,强制到底
  }
  window.BocomHermes.onPermission(({ requestId, tool, detail }) => showPermission(requestId, tool, detail))

  // 流式：text → 答案气泡；reasoning → 思考折叠块（答案上方）
  // 一轮回答可能有多个 text 片段（文本→工具调用→文本），按 partID 累积、按到达顺序拼接，
  // 避免后到的片段把先到的覆盖掉（与最终 reply 的拼接口径一致：用 \n 连接）。
  let curAnswer = null, curReason = null, answerParts = null, reasonParts = null
  function makeReason(beforeEl) {
    const d = document.createElement('details'); d.className = 'reason'; d.open = true
    d.innerHTML = '<summary><svg class="chev" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>思考过程</summary><div class="body"></div>'
    feed.insertBefore(d, beforeEl)
    return { el: d, body: d.querySelector('.body') }
  }
  const joinParts = (m) => Array.from(m.values()).join('\n')
  // 工具日志块:同一 callID 原地更新(运行中→完成),展开可见 入参 + 结果。run_workflow 高亮成"升格"。
  const toolEls = new Map()
  const TOOL_LABEL = { run_workflow: '升格 → 动态工作流' }
  const TOOL_ICON = { run_workflow: '🚀', bash: '▶', shell: '▶', read: '📖', write: '✍', edit: '✏', patch: '✏', grep: '🔎', glob: '🔎', list: '📁', ls: '📁', webfetch: '🌐', fetch: '🌐', task: '🤖', todowrite: '☑', todoread: '☑' }
  const fmtInput = (v) => { if (v == null) return ''; if (typeof v === 'string') return v; try { return JSON.stringify(v, null, 2) } catch { return String(v) } }
  // 过程详情开关(Claude Code 的 verbose):关=工具紧凑一行摘要(默认,免刷屏),开=每个工具自动展开入参/结果。记住偏好。
  let verbose = false; try { verbose = localStorage.getItem('cardVerbose') === '1' } catch {}
  const verboseBtn = document.getElementById('bverbose')
  function paintVerbose() { verboseBtn.classList.toggle('on', verbose) }
  verboseBtn.addEventListener('click', () => {
    verbose = !verbose; try { localStorage.setItem('cardVerbose', verbose ? '1' : '0') } catch {}
    paintVerbose()
    document.querySelectorAll('.toolbox').forEach((el) => { el.open = verbose })   // 立即作用于已有块,所见即所得
    addNote(verbose ? '过程详情已开启：工具自动展开入参/结果' : '已切换紧凑模式：工具折叠为一行摘要，点击可展开', 'muted')
  })
  paintVerbose()
  // todowrite 的入参 → 勾选清单(对齐 Claude Code 的 todo 列表);形状不符则退回普通 JSON 显示
  function todoHtml(input) {
    const todos = input && Array.isArray(input.todos) ? input.todos : null
    if (!todos || !todos.length) return null
    const line = (t) => {
      const txt = String((t && (t.content || t.text || t.title)) || '').trim(); if (!txt) return ''
      const s = String((t && t.status) || '')
      const done = /complet/i.test(s), doing = /progress|doing/i.test(s), cancel = /cancel/i.test(s)
      const mark = done ? '☒' : doing ? '◐' : cancel ? '⊘' : '☐'
      return '<div class="todoline' + (done || cancel ? ' done' : doing ? ' doing' : '') + '"><span class="tstat">' + mark + '</span><span>' + esc(txt) + '</span></div>'
    }
    const rows = todos.map(line).filter(Boolean)
    if (!rows.length) return null
    const doneN = todos.filter((t) => /complet/i.test(String(t && t.status || ''))).length
    return { rows: rows.join(''), meta: doneN + '/' + todos.length }
  }
  function renderTool(partID, name, status, data, opts) {
    data = data || {}; opts = opts || {}
    const isWf = name === 'run_workflow'
    const isTodo = /^todo(write|read)$/i.test(String(name))
    let el = toolEls.get(partID)
    if (!el) {
      el = document.createElement('details'); el.className = 'toolbox' + (isWf ? ' wf' : '') + (opts.sub ? ' subtool' : '')
      // 紧凑模式(默认):折叠成一行摘要,点开看入参/结果 —— 对齐 Claude Code;verbose 开着才自动展开。
      // todo 清单例外:它就是给人盯进度的,始终展开。
      el.open = isTodo || (verbose && !opts.sub)
      const host = opts.container || feed
      if (opts.container) host.appendChild(el)
      else if (curAnswer && curAnswer.parentNode === feed) feed.insertBefore(el, curAnswer)
      else feed.appendChild(el)
      toolEls.set(partID, el)
    }
    const done = /complet|success|done|finish|ok/i.test(status), err = /error|fail|deny|reject/i.test(status)
    el.classList.toggle('done', done && !err); el.classList.toggle('err', err)
    const stt = err ? '出错' : done ? '完成' : '运行中…'
    const icon = isWf ? '🚀' : (TOOL_ICON[String(name).toLowerCase()] || '⚙')
    const inStr = fmtInput(data.input)
    const outStr = data.error ? String(data.error) : (data.output != null ? String(data.output) : '')
    const todo = isTodo ? todoHtml(data.input) : null
    // 摘要行自带信息量:完成后标注输出量(点开之前就知道有多少东西),对齐 Claude Code 的 "⎿ 120 lines"
    const sum = todo ? ('待办 ' + todo.meta) : ((done && !err && outStr) ? ('⎿ ' + (outStr.length > 999 ? (outStr.length / 1000).toFixed(1) + 'k 字' : outStr.length + ' 字')) : '')
    el.innerHTML =
      '<summary><span class="ti">' + icon + '</span><span class="tn">' + esc(TOOL_LABEL[name] || name) + '</span>'
      + (data.title ? '<span class="tt">' + esc(String(data.title).slice(0, 200)) + '</span>' : '')
      + (sum ? '<span class="tsum">' + esc(sum) + '</span>' : '')
      + '<span class="ts2">· ' + stt + '</span></summary>'
      + (todo
        ? '<div class="tsec">' + todo.rows + '</div>'
        : (inStr ? '<div class="tsec"><span class="tsl">入参</span><pre>' + esc(inStr.slice(0, 4000)) + '</pre></div>' : '')
          + (outStr ? '<div class="tsec' + (data.error ? ' e' : '') + '"><span class="tsl">' + (data.error ? '错误' : '结果') + '</span><pre>' + esc(outStr.slice(0, 20000)) + '</pre></div>' : ''))
    // 状态行登记:运行中登记(带子agent名),完成/出错注销
    const slName = String(name) + (data.title ? '(' + String(data.title).slice(0, 40) + ')' : '') + (opts.sub && opts.agentName ? ' @' + opts.agentName : '')
    if (done || err) runningTools.delete(partID); else runningTools.set(partID, slName)
    paintStatus()
    scrollFeed()
  }
  // 流式渲染按帧合并：高频 token 事件下，一帧内多次事件只跑一次 renderMarkdown + innerHTML，
  // 消除"回答越长越卡"的 O(n²) 抖动（每帧最多渲一次，视觉无差）。
  // 思考过程 = opencode 原生 reasoning part；不自己解析 <think>/<ask>，按 opencode 原生来。
  let _flushQueued = false, _needAnswer = false, _needReason = false
  function flushStream() {
    _flushQueued = false
    if (_needReason && curReason) {
      curReason.body.textContent = reasonParts ? joinParts(reasonParts) : ''
      curReason.body.scrollTop = curReason.body.scrollHeight
      _needReason = false
    }
    if (_needAnswer && curAnswer) {
      curAnswer.innerHTML = renderMarkdown(answerParts ? joinParts(answerParts) : '')
      _needAnswer = false
    }
    scrollFeed()
  }
  function scheduleFlush() { if (!_flushQueued) { _flushQueued = true; requestAnimationFrame(flushStream) } }

  // ── 子agent富容器(可"进入"):每个 agentId 一个折叠块,点开=看它的【思考 + 完整工具(入参/结果)+ 产出】,和主 Agent 一样详实 ──
  // opencode 用 task 起子agent并行干活,主进程把子会话事件路由回本卡(sub=true,带 agentId)。工具直接复用主 Agent 的 renderTool(container=本块工具区)。
  const subAgents = new Map()   // agentId -> { el, name, meta, reason, tools, out, reasonParts, outParts, toolIds, count, t0, doneAt, done }
  let _saTick = null
  const saMeta = (s) => (s.count ? s.count + ' 次调用 · ' : '') + Math.max(0, Math.round(((s.done ? s.doneAt : Date.now()) - s.t0) / 1000)) + 's' + (s.done ? '' : ' · 运行中')
  function saTick() { let run = false; for (const s of subAgents.values()) if (!s.done) { run = true; s.meta.textContent = saMeta(s) } if (!run && _saTick) { clearInterval(_saTick); _saTick = null } }
  function subAgent(agentId, name) {
    let s = subAgents.get(agentId)
    if (s) { if (name && name !== '子agent' && s.name.textContent !== name) s.name.textContent = name; return s }
    const el = document.createElement('details'); el.className = 'subagent'; el.open = true   // 默认展开 —— 直接看到它的思考/工具/产出全程(想收起可手动折叠)
    el.innerHTML = '<summary><svg class="sa-chev" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg><span class="sa-ic">🔍</span><span class="sa-name"></span><span class="sa-meta">运行中…</span></summary>'
      + '<div class="sa-body"><div class="sa-reason" hidden></div><div class="sa-tools"></div><div class="sa-out" hidden></div></div>'
    if (curAnswer && curAnswer.parentNode === feed) feed.insertBefore(el, curAnswer); else feed.appendChild(el)
    s = { el, name: el.querySelector('.sa-name'), meta: el.querySelector('.sa-meta'), reason: el.querySelector('.sa-reason'), tools: el.querySelector('.sa-tools'), out: el.querySelector('.sa-out'), reasonParts: new Map(), outParts: new Map(), toolIds: new Set(), count: 0, t0: Date.now(), doneAt: 0, done: false }
    s.name.textContent = name || '子agent'
    subAgents.set(agentId, s)
    if (!_saTick) _saTick = setInterval(saTick, 1000)
    scrollFeed()
    return s
  }
  function subAgentDone(agentId, status, name) {
    const s = subAgents.get(agentId); if (!s || s.done) return
    if (name) s.name.textContent = name
    s.done = true; s.doneAt = Date.now()
    const err = /error|fail|deny|reject/i.test(status || '')
    s.el.classList.toggle('done', !err); s.el.classList.toggle('err', err)
    s.meta.textContent = saMeta(s)   // 收尾只置状态,【不折叠】—— 思考/工具/产出的过程留着可回看(修"结果出来后压缩成空白框")
  }

  window.BocomHermes.onStream(({ kind, text, partID, status, input, output, title, error, sub, agentId, agentName, taskChild, taskDesc }) => {
    if (sub) {                                            // 子agent活动 → 进它自己的富容器(思考/工具/产出),点开可"进入"看全程
      const s = subAgent(agentId || '_', agentName)
      if (kind === 'tool') {
        if (partID && !s.toolIds.has(partID)) { s.toolIds.add(partID); s.count++ }
        s.meta.textContent = saMeta(s)
        renderTool(partID || '_', text, status || '', { input, output, title, error }, { container: s.tools, sub: true, agentName })   // 复用主 Agent 富工具块:入参+结果,默认折叠;agentName 给状态行标注"谁在跑"
      } else if (kind === 'reasoning') {                  // 子agent思考(过去被丢弃)→ 进思考区
        s.reason.hidden = false; s.reasonParts.set(partID || '_', text)
        s.reason.textContent = joinParts(s.reasonParts); s.reason.scrollTop = s.reason.scrollHeight
      } else {                                            // 子agent文本产出(过去被丢弃)→ 进产出区
        s.out.hidden = false; s.outParts.set(partID || '_', text); s.out.innerHTML = renderMarkdown(joinParts(s.outParts))
      }
      return
    }
    if (kind === 'tool') {
      if (text === 'task') {                              // 父会话的 task 工具 = 起/收一个子agent
        const gid = taskChild || ''
        const fin = /complet|success|done|finish|error|fail|deny|reject/i.test(status || '')
        if (gid && subAgents.has(gid)) { if (fin) subAgentDone(gid, status || '', taskDesc || '') }
        else if (fin) renderTool(partID || '_', 'task', status || '', { input, output, title, error })   // 子路由没拿到 → 退回普通工具块显示结果
        return
      }
      renderTool(partID || '_', text, status || '', { input, output, title, error })
      return
    }
    const key = partID || '_'
    if (kind === 'reasoning') {
      if (!curReason && curAnswer && curAnswer.parentNode === feed) curReason = makeReason(curAnswer)
      if (curReason && reasonParts) { reasonParts.set(key, text); _needReason = true; scheduleFlush() }
    } else if (curAnswer && answerParts) {
      answerParts.set(key, text); _needAnswer = true; scheduleFlush()
    }
  })

  // 返回 true=本轮顺利完成（传输层无异常），false=出错。富结果动作据此落状态。
  // target 在场=把回答渲染进它（如命令块下的输出区），不新建气泡。
  async function turn(text, target, files) {
    const ai = target || addMsg('', 'ai')
    const PH = target ? '运行中…' : '思考中…'; ai.textContent = PH
    curAnswer = ai; curReason = null; answerParts = new Map(); reasonParts = new Map(); subAgents.clear(); toolEls.clear(); if (_saTick) { clearInterval(_saTick); _saTick = null }; setBusy(true)   // toolEls 跨轮清:上一轮的工具块已定格在 feed 里,Map 只清引用防无限涨
    let ok = true
    try {
      const reply = await window.BocomHermes.cardSend(text, files, activeSkill && activeSkill.id)
      // POST 空 body 的 serve（内网 bocomcode）：reply 可能为空，用流式累积的文本兜底，绝不丢已收到的答案
      const finalText = reply || (answerParts ? joinParts(answerParts) : '')
      if (finalText) ai.innerHTML = renderMarkdown(finalText)
      else if (!ai.textContent.trim() || ai.textContent === PH) ai.textContent = '（无文本输出）'
      if (!target && finalText) { ai.dataset.raw = finalText; addCopyBtn(ai) }   // 答完挂复制按钮(流式中不挂,免被逐帧重渲染冲掉)
      // 思考过程答完保持展开(用户要看得见过程);可手动点标题折叠
    } catch (e) {
      ok = false
      // 半截答案是用户的,错误不许覆盖它:流式可能已经收了几千字,再"⚠ 引擎连接中断"一盖全没了。
      // 有半截 → 保留半截 + 错误另起一行 note;真的一个字没有 → 才把气泡改成错误。
      const partial = answerParts ? joinParts(answerParts).trim() : ''
      if (partial) {
        ai.innerHTML = renderMarkdown(partial)
        if (!target) { ai.dataset.raw = partial; addCopyBtn(ai) }
        addNote('⚠ 回合中断：' + (e.message || e) + '（以上是中断前已收到的部分回答）', 'muted')
      } else {
        if (!target) ai.className = 'msg ai err'
        ai.textContent = '⚠ ' + (e.message || e)
      }
    } finally { for (const [id, s] of subAgents) if (!s.done) subAgentDone(id, 'done'); curAnswer = null; setBusy(false); scrollFeed(); maybeDrain() }
    return ok
  }
  // 输入框自增高（1~约5 行）
  function autoGrow() { ci.style.height = 'auto'; ci.style.height = Math.min(ci.scrollHeight, 96) + 'px' }

  // ── 拖拽上传文档 / Ctrl+V 粘贴截图 ──（图片走多模态识别,文档解析成文本）
  const pendingAtts = []
  const attRow = document.getElementById('attRow'), dropHint = document.getElementById('dropHint')
  function renderAtts() {
    attRow.innerHTML = ''
    pendingAtts.forEach((a, i) => {
      const el = document.createElement('div'); el.className = 'att'
      el.innerHTML = (a.kind === 'image' ? '<img src="' + a.dataUrl + '">' : '<span>📄</span>') + '<span class="an">' + esc(a.name) + (a.loading ? ' …' : '') + '</span><span class="ax" data-i="' + i + '">✕</span>'
      attRow.appendChild(el)
    })
  }
  attRow.addEventListener('click', (e) => { const x = e.target.closest('.ax'); if (x) { pendingAtts.splice(+x.dataset.i, 1); renderAtts() } })
  const fileToDataUrl = (file) => new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(file) })
  async function addFile(file) {
    const mime = file.type || ''
    if (/^image\//.test(mime)) {
      try { const dataUrl = await fileToDataUrl(file); pendingAtts.push({ kind: 'image', name: file.name || '截图.png', mime, dataUrl }); renderAtts() } catch (e) {}
    } else {                                                  // 文档 → 只记路径,opencode 用 read_document 工具按需读(A+B)
      const fpath = (window.BocomHermes.getDropPath && window.BocomHermes.getDropPath(file)) || file.path || ''
      if (fpath) { pendingAtts.push({ kind: 'doc', name: file.name || '文档', path: fpath }); renderAtts() }
      else addNote('读不到拖入文件的路径', 'muted')
    }
  }
  ;['dragenter', 'dragover'].forEach((ev) => document.addEventListener(ev, (e) => { if (e.dataTransfer && Array.from(e.dataTransfer.types || []).includes('Files')) { e.preventDefault(); dropHint.classList.add('show') } }))
  document.addEventListener('dragleave', (e) => { if (!e.relatedTarget) dropHint.classList.remove('show') })
  document.addEventListener('drop', async (e) => { e.preventDefault(); dropHint.classList.remove('show'); const fs = Array.from((e.dataTransfer && e.dataTransfer.files) || []); for (const f of fs) await addFile(f) })
  document.addEventListener('paste', async (e) => {
    const items = (e.clipboardData && e.clipboardData.items) || []
    for (const it of items) { if (it.kind === 'file' && /^image\//.test(it.type)) { const f = it.getAsFile(); if (f) { e.preventDefault(); await addFile(f) } } }
  })

  // 输入历史:↑/↓ 翻已发送的消息(仅当光标在首/末行,不打断多行编辑;正在翻时再输入即退出翻阅态)
  const sentHistory = []
  let histIdx = -1, histDraft = ''
  function histNav(d) {
    if (!sentHistory.length) return false
    if (histIdx === -1) { if (d > 0) return false; histDraft = ci.value; histIdx = sentHistory.length - 1 }
    else { histIdx += d }
    if (histIdx >= sentHistory.length) { histIdx = -1; ci.value = histDraft }
    else { histIdx = Math.max(0, histIdx); ci.value = sentHistory[histIdx] }
    autoGrow(); ci.setSelectionRange(ci.value.length, ci.value.length)
    return true
  }

  function submit() {
    const v = ci.value.trim()
    if (!v && !pendingAtts.length) return
    if (v) { if (sentHistory[sentHistory.length - 1] !== v) sentHistory.push(v); if (sentHistory.length > 50) sentHistory.shift() }
    histIdx = -1; histDraft = ''
    const docRefs = pendingAtts.filter((a) => a.kind === 'doc').map((a) => '- ' + a.path + '（' + a.name + '）').join('\n')
    const docNote = docRefs ? '【用户拖入了文档，需要时用 read_document 工具读取其内容】\n' + docRefs : ''
    const images = pendingAtts.filter((a) => a.kind === 'image').map((a) => ({ mime: a.mime, url: a.dataUrl, filename: a.name }))
    const full = [docNote, v].filter(Boolean).join('\n\n')
    const dispText = (v || (images.length ? '(图片)' : '(文档)')) + (pendingAtts.length ? '  📎' + pendingAtts.length : '')
    ci.value = ''; autoGrow()
    pendingAtts.length = 0; renderAtts()
    const el = addMsg(dispText, 'me')
    // 忙时排队(Claude Code 式 queueing):以前 busy 直接 return,打好的字连附件一起被吞,连个提示都没有。
    // 现在气泡立即上屏(半透明 + ⏳),本轮一结束按序自动发出(复用注入队列 maybeDrain)。
    if (busy || !cardReady) {
      el.classList.add('queued')
      const q = document.createElement('span'); q.className = 'qtag'; q.textContent = '⏳ 排队中，本轮结束后发出'; el.appendChild(q)
      pendingInjects.push({ text: full || '(见附件)', files: images, el })
      return
    }
    turn(full || '(见附件)', null, images)
  }

  send.addEventListener('click', () => { if (busy) window.BocomHermes.cardAbort(); else submit() })
  // ── 作答技能:composer 输入 "/" 弹菜单,↑↓ 选、Enter 挂载(把方法论指令静默预置到消息前);当前技能显示为胶囊,✕ 卸载 ──
  const skillMenu = document.getElementById('skillMenu'), skillBar = document.getElementById('skillBar')
  let activeSkill = null, skillList = null, skillItems = [], skillSel = 0
  async function getSkills(force) { if (force || !skillList) { try { skillList = await window.BocomHermes.skillsList() } catch { skillList = skillList || [] } } return skillList }
  const skillMenuOpen = () => !skillMenu.hidden
  function hideSkillMenu() { skillMenu.hidden = true; skillItems = [] }
  async function openSkillMenu(query) {
    // 从隐藏→打开的那一下强制重拉:用户刚在"管理技能库"里改了 md,回来就能看到新内容(以前缓存永不失效,要重开卡)。
    // 打开后逐字过滤仍用缓存 —— 别让每敲一个键都打一次 IPC 读磁盘。
    const all = await getSkills(skillMenu.hidden)
    const q = (query || '').toLowerCase().trim()
    const list = q ? all.filter((s) => (s.name + ' ' + (s.desc || '') + ' ' + s.id).toLowerCase().includes(q)) : all
    skillItems = list; skillSel = 0
    skillMenu.innerHTML = (list.length
      ? list.map((s, i) => '<div class="si' + (i === 0 ? ' sel' : '') + '" data-i="' + i + '"><span class="sn">' + esc(s.name) + '</span>' + (s.desc ? '<span class="sd">' + esc(s.desc) + '</span>' : '') + '</div>').join('')
      : '<div class="snone">没有匹配的技能</div>')
      + '<div class="sfoot">＋ 管理技能库(编辑 / 新增 .md)</div>'
    skillMenu.hidden = false
    skillMenu.querySelectorAll('.si').forEach((el) => el.addEventListener('mousedown', (ev) => { ev.preventDefault(); chooseSkill(skillItems[+el.dataset.i]) }))
    const foot = skillMenu.querySelector('.sfoot'); if (foot) foot.addEventListener('mousedown', (ev) => { ev.preventDefault(); try { window.BocomHermes.skillsOpenDir() } catch {} hideSkillMenu() })
  }
  function moveSkillSel(d) { if (!skillItems.length) return; skillSel = (skillSel + d + skillItems.length) % skillItems.length; skillMenu.querySelectorAll('.si').forEach((el, i) => el.classList.toggle('sel', i === skillSel)) }
  function chooseSkill(sk) { if (!sk) return; activeSkill = sk; ci.value = ''; autoGrow(); hideSkillMenu(); renderSkillChip(); ci.focus() }
  function renderSkillChip() {
    if (!activeSkill) { skillBar.hidden = true; skillBar.innerHTML = ''; return }
    skillBar.hidden = false
    skillBar.innerHTML = '<span class="skill-chip">⚡ 技能:' + esc(activeSkill.name) + '<span class="sx" title="卸载技能">✕</span></span>'
    skillBar.querySelector('.sx').addEventListener('click', () => { activeSkill = null; renderSkillChip() })
  }
  ci.addEventListener('input', () => { autoGrow(); const v = ci.value; if (v[0] === '/') openSkillMenu(v.slice(1)); else if (skillMenuOpen()) hideSkillMenu() })
  ci.addEventListener('keydown', (e) => {
    if (skillMenuOpen()) {
      if (e.key === 'ArrowDown') { e.preventDefault(); moveSkillSel(1); return }
      if (e.key === 'ArrowUp') { e.preventDefault(); moveSkillSel(-1); return }
      if (e.key === 'Escape') { e.preventDefault(); hideSkillMenu(); return }
      if (e.key === 'Enter') { e.preventDefault(); if (skillItems.length) chooseSkill(skillItems[skillSel]); else { hideSkillMenu(); submit() } return }
    }
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); return }
    // ↑/↓ 翻输入历史:只在光标位于首/末行时接管(多行编辑中的正常移动不受影响)
    if (e.key === 'ArrowUp' && ci.selectionStart === ci.selectionEnd && !ci.value.slice(0, ci.selectionStart).includes('\n')) {
      if (histNav(-1)) e.preventDefault()
    } else if (e.key === 'ArrowDown' && histIdx !== -1 && ci.selectionStart === ci.selectionEnd && !ci.value.slice(ci.selectionEnd).includes('\n')) {
      if (histNav(1)) e.preventDefault()
    }
  })
  ci.addEventListener('input', () => { histIdx = -1 })   // 翻到某条后一编辑即退出翻阅态(编辑的是副本,不改历史)
  document.addEventListener('mousedown', (e) => { if (skillMenuOpen() && !skillMenu.contains(e.target) && e.target !== ci) hideSkillMenu() })

  // 快捷指令：常用追问的模板（在这个数组里增删即可迭代）
  const QUICK = [
    { label: '✅ 批准方案 → 改', text: '批准方案。请按你刚才的计划用编辑工具完成修改;改完调 repro_assert/repro_self_review 登记,再简要总结改了什么。我改完后会自动用 git diff 把改动展示给我看。', highlight: true },
    { label: '改成可应用 diff', text: '把你上面给出的修改整理成统一 diff：用 ```diff 围栏，包含 +++/--- 文件头和 @@ 行号，便于我一键应用到对应文件。' },
    { label: '补单元测试', text: '为刚才的改动补充单元测试，覆盖正常路径与边界场景。' },
    { label: '加中文注释', text: '给刚才的代码补上必要的中文注释，解释关键逻辑，但不要改变行为。' },
    { label: '查风险', text: '审视刚才的改动是否存在空指针、并发、SQL 注入、事务边界等风险，逐条列出（必改/建议）并给修法。' },
    { label: '解释代码', text: '用简洁的中文解释上面的代码：目的是什么，关键步骤，有哪些潜在的坑。' },
    { label: '写提交信息', text: '根据刚才的改动，给我一条符合 Conventional Commits 规范的 git commit message（中文描述）。' },
    { label: '排查报错', text: '帮我分析这个报错的根因，给出最可能的修法，优先考虑内网环境下的常见原因。' },
  ]
  QUICK.forEach((q) => {
    const b = document.createElement('button'); b.className = 'qchip' + (q.highlight ? ' go' : ''); b.textContent = q.label; b.title = q.text
    b.addEventListener('click', () => { if (busy) return; addMsg(q.text, 'me'); turn(q.text) })
    quick.appendChild(b)
  })
  // 查看本次改动:把 git diff 当 ```diff 注入 ai 气泡(富结果会自动渲红绿+可应用)
  const diffBtn = document.createElement('button'); diffBtn.className = 'qchip'; diffBtn.textContent = '📜 查看本次改动'; diffBtn.title = '取当前 session 的 git diff(前端+后端目录),用富结果格式显示;改完想看 agent 到底改了什么用这个'
  diffBtn.addEventListener('click', async () => {
    if (busy) return
    try {
      const d = await window.BocomHermes.currentDiff()
      const ai = addMsg('', 'ai')
      ai.innerHTML = window.Rich.renderMarkdown('## 本次 session 的改动 (git diff)\n\n```diff\n' + (d || '(无)').slice(0, 50000) + '\n```')
    } catch (e) { addMsg('⚠ 拉 diff 失败:' + (e.message || e), 'ai') }
  })
  quick.appendChild(diffBtn)

  // 记忆管理:内联编辑弹层。不能用 window.prompt() —— Electron 渲染进程不实现它,一调就抛
  // "prompt() is and will not be supported",这个按钮点了毫无反应(而且异常还没人接)。
  const memBtn = document.createElement('button'); memBtn.className = 'qchip'; memBtn.textContent = '📌 我的记忆'; memBtn.title = '查看 / 编辑个人记忆（每张新卡会自动注入）'
  memBtn.addEventListener('click', async () => {
    if (document.getElementById('memPop')) return
    let cur = ''
    try { cur = (await window.BocomHermes.memoryRead()) || '' } catch (e) { addNote('读取记忆失败：' + (e.message || e), 'muted'); return }
    const pop = document.createElement('div'); pop.id = 'memPop'
    pop.style.cssText = 'position:absolute;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);border-radius:14px;'
    const box = document.createElement('div')
    box.style.cssText = 'width:86%;max-width:520px;background:var(--glass-bg);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border:1px solid var(--composer-border);border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:8px;box-shadow:0 10px 34px rgba(0,0,0,.3);'
    const ttl2 = document.createElement('div'); ttl2.textContent = '📌 个人记忆（每张新卡自动注入，留空即清除）'; ttl2.style.cssText = 'font-size:12.5px;font-weight:600;color:var(--txt);'
    const ta = document.createElement('textarea'); ta.value = cur; ta.placeholder = '例如：我是信贷系统后端开发，回答优先给 Java 示例…'
    ta.style.cssText = 'height:150px;resize:vertical;background:var(--composer-bg);border:.5px solid var(--composer-border);border-radius:8px;color:var(--txt);font-size:12.5px;font-family:var(--font);padding:8px;outline:none;line-height:1.5;'
    const row = document.createElement('div'); row.style.cssText = 'display:flex;gap:8px;justify-content:flex-end;'
    const cancel = document.createElement('button'); cancel.className = 'rbtn-ghost'; cancel.textContent = '取消'
    const save = document.createElement('button'); save.className = 'rbtn-primary'; save.textContent = '保存'
    cancel.addEventListener('click', () => pop.remove())
    pop.addEventListener('click', (e) => { if (e.target === pop) pop.remove() })
    save.addEventListener('click', async () => {
      save.disabled = true; save.textContent = '保存中…'
      try { await window.BocomHermes.memoryWrite(ta.value); pop.remove(); addNote('✓ 记忆已更新，下一张新卡起生效。', 'muted') }
      catch (e) { save.disabled = false; save.textContent = '保存'; addNote('保存记忆失败：' + (e.message || e), 'muted') }
    })
    row.append(cancel, save); box.append(ttl2, ta, row); pop.appendChild(box)
    ;(document.querySelector('.card') || document.body).appendChild(pop)
    ta.focus()
  })
  quick.appendChild(memBtn)

  // 破坏性命令特征（误触前先红字拦一道；不替代 bash 权限确认）
  const DANGER = /(\brm\s+-[rf]+|\bmkfs\b|\bdd\s+if=|:\(\)\s*\{|\b(drop|truncate)\s+(table|database)\b|\bshutdown\b|\breboot\b|\bformat\s+[a-z]:|\bdel\s+\/[sq]|\brd\s+\/s|\b(git\s+)?reset\s+--hard|\bgit\s+clean\s+-[a-z]*f)/i

  // 富结果动作：应用/运行 = 向同一会话发指令（agent 用工具做、经内联权限）；复制/打开在 rich.js/本地
  window.Rich.wireActions(feed, {
    open: (file, line) => window.BocomHermes.openLoc(file, line),
    todo: async ({ urgency, from, text, mailIdx, mailMsgId }, btn) => {
      const orig = btn.textContent; btn.disabled = true; btn.textContent = '保存中…'
      try {
        // mailMsgId 优先(跨会话稳定);mailIdx 兼容老格式
        const r = await window.BocomHermes.todoAdd({ urgency, from, text, source: 'email', mailIdx: mailIdx || null, mailMsgId: mailMsgId || null })
        if (r) { btn.textContent = '已加入 ✓'; btn.classList.add('done'); window.BocomHermes.notifyTodosUpdated() }
        else { btn.textContent = '已存在'; btn.classList.add('done') }
      } catch { btn.textContent = orig; btn.disabled = false }
    },
    apply: async ({ file, raw, all }, btn) => {
      if (busy) return
      const orig = btn.innerHTML; btn.textContent = '应用中…'; btn.disabled = true
      try {
        const results = await window.BocomHermes.applyDiff(raw)
        const failed = results.filter(r => !r.ok)
        if (failed.length === 0) {
          const names = results.map(r => r.file.split(/[/\\]/).pop()).join('、')
          btn.textContent = '已写入 ✓ ' + names; btn.classList.add('done')
        } else {
          const msg = failed.map(r => r.file + '：' + r.error).join('\n')
          btn.innerHTML = orig; btn.disabled = false
          addMsg('⚠ 应用失败：\n' + msg, 'ai')
        }
      } catch (e) {
        btn.innerHTML = orig; btn.disabled = false
        addMsg('⚠ 应用出错：' + (e.message || e), 'ai')
      }
    },
    run: async ({ raw }, btn) => {
      if (busy) return
      // 破坏性命令客户端二次确认（最终仍走 bash 权限条，这里只防误触）
      if (DANGER.test(raw) && btn.dataset.armed !== '1') {
        const o = btn.textContent; btn.dataset.armed = '1'; btn.textContent = '危险·再点确认'; btn.classList.add('danger')
        setTimeout(() => { if (btn.dataset.armed === '1') { btn.dataset.armed = ''; btn.textContent = o; btn.classList.remove('danger') } }, 4000)
        return
      }
      btn.dataset.armed = ''; btn.classList.remove('danger')
      const orig = btn.innerHTML; btn.textContent = '运行中…'; btn.disabled = true
      const blk = btn.closest('.rblk')
      const old = blk.querySelector(':scope > .rout'); if (old) old.remove()   // 重跑刷新输出
      const out = document.createElement('details'); out.className = 'rout'; out.open = true
      out.innerHTML = '<summary>输出</summary><div class="ai routbody"></div>'
      blk.appendChild(out)
      const p = '请运行下面这条命令并把输出原样返回：\n\n```bash\n' + raw + '\n```'
      const ok = await turn(p, out.querySelector('.routbody'))
      if (ok) { btn.textContent = '已运行 ✓'; btn.classList.add('done') }
      else { btn.innerHTML = orig; btn.disabled = false }
      scrollFeed()
    },
  })

  const sid = params.get('sid') || ''   // 带 sid = 从卡坞续接旧会话
  ;(async () => {
    setBusy(true)
    if (!sid && !embedded) addMsg(dispMsg, 'me')      // 全新卡：先显示任务（disp 在场时只展示摘要，不展示大段上下文）
    const boot = addMsg('', 'ai'); boot.textContent = sid ? '正在续接对话…' : embedded ? '正在连接调试助手…' : '正在启动引擎…（首次较慢，请稍候）'
    try {
      const r = await window.BocomHermes.cardInit(sid ? { sid, title } : { title })
      paintProj(r.project, r.dir)          // 本卡真实绑定目录
      paintModelChip(r.model)              // 本卡实际生效模型(override || 全局默认),含 boot 期间预选的
      boot.remove()
      cardReady = true
      if (sid) {
        if (r.reattached) {
          if (r.messages && r.messages.length) r.messages.forEach((m) => addMsg(m.text, m.role === 'user' ? 'me' : 'ai'))
          else addMsg('（历史消息未能载入，可直接继续这段对话）', 'ai')
        } else {
          addMsg('（原对话已不在引擎中，已为你新开一段，标题：' + title + '）', 'ai')
        }
        setBusy(false); scrollFeed()
      } else if (embedded) {
        setBusy(false)
        addMsg('我是你的调试助手。在右侧浏览器复现问题后点「发给 Agent」，我会拿到控制台报错、网络异常和页面结构来定位；也可以直接在下面提问。', 'ai')
      } else {
        let initFiles = []
        try { const cid = params.get('id'); if (cid) initFiles = await window.BocomHermes.getCardFiles(cid) } catch (e) {}   // 对话坞拖进来的附件(图片)
        await turn(initMsg, null, initFiles)
      }
      maybeDrain()
    } catch (e) {
      boot.className = 'msg ai err'
      boot.textContent = '⚠ ' + (sid ? '无法续接：' : '引擎未就绪：') + (e.message || e) + (sid ? '' : '（确认 opencode/bocomcode 已装、模型已配）')
      setBusy(false)
    }
  })()
  ci.focus()
</script>
  <script src="carddrag.js"></script>
</body>
</html>
