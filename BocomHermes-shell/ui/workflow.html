<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<script>try { document.documentElement.dataset.theme = window.BocomHermes.getTheme() || 'light' } catch (e) { document.documentElement.dataset.theme = 'light' }</script>
<script>(function(){try{var p=new URLSearchParams(location.search),d=document.documentElement.style;['gox','goy','gfx','gfy'].forEach(function(k){var v=p.get(k);if(v)d.setProperty('--'+k,v)})}catch(e){}})()</script>
<link rel="stylesheet" href="glass.css" />
<style>
  .card { display: flex; flex-direction: column; height: 100%; padding: 11px 13px 12px; gap: 8px; }
  .hd { display: flex; align-items: center; gap: 7px; flex: none; }
  .ttl { flex: 1; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hbtn { border: none; background: transparent; color: var(--txt3); cursor: pointer; padding: 3px; border-radius: 6px; display: flex; }
  .hbtn:hover { color: var(--txt); background: var(--composer-bg); }
  .stop { font-size: 11px; color: var(--diff-del); background: transparent; border: 1px solid var(--diff-del); border-radius: 7px; padding: 3px 10px; cursor: pointer; }
  /* 统一滚动条:细滚动条 + 主题色,四个可滚区域(goal/graph/detail/mon/feed)共用一套,
     标准 scrollbar-* 属性打底(Chromium 121+ 原生支持),::-webkit-scrollbar 兜底旧内核。 */
  .scrollable { scrollbar-width: thin; scrollbar-color: var(--scroll) transparent; }
  .scrollable::-webkit-scrollbar { width: 7px; height: 7px; }
  .scrollable::-webkit-scrollbar-track { background: transparent; }
  .scrollable::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 3px; }
  .scrollable::-webkit-scrollbar-thumb:hover { background: var(--txt3); }

  /* goal 设上限:极长目标文本此前会把 graph/feed 挤到 0 高度(内容消失、看着像"没有滚动条") */
  .goal { flex: none; font-size: 12px; color: var(--txt2); background: var(--composer-bg); border: .5px solid var(--composer-border); border-radius: 9px; padding: 7px 10px; line-height: 1.45; max-height: 18%; overflow-y: auto; -webkit-user-select: text; user-select: text; }

  /* DAG 图:降级为辅助视图(头部「图」按钮开关,默认隐藏)—— 主视图是下方统一树形时间线 */
  #graph { flex: none; height: 42%; min-height: 110px; overflow: auto; border: .5px solid var(--composer-border); border-radius: 10px; background: var(--composer-bg); }
  #graph[hidden] { display: none; }
  .node rect { fill: var(--ai-bg); stroke: var(--composer-border); stroke-width: 1.2; }
  .node .nid { font: 600 10px var(--mono); fill: var(--txt2); }
  .node .ng { font: 11.5px var(--font); fill: var(--txt); }
  .node .nst { font: 10px var(--font); fill: var(--txt3); }
  .node { cursor: pointer; }
  .node.running rect { stroke: var(--accent); stroke-width: 1.8; animation: tw 1.4s ease-in-out infinite; }
  .node.running .nst { fill: var(--accent); }
  .node.ok rect { stroke: var(--green); stroke-width: 1.6; }
  .node.ok .nst { fill: var(--green); }
  .node.error rect, .node.timeout rect, .node.aborted rect { stroke: var(--diff-del); stroke-width: 1.6; }
  .node.error .nst, .node.timeout .nst, .node.aborted .nst { fill: var(--diff-del); }
  .node.sel rect { stroke: var(--accent); stroke-width: 2.2; }
  .edge { fill: none; stroke: var(--txt3); stroke-width: 1.3; opacity: .7; }
  /* 统一树形条目(对齐 Claude 工作流树):每个执行体一行 —— 状态灯 + 标签 + 实时「N 次调用 · 耗时」,
     点开看工具明细(↳ 工具 目标)与产出全文。规划器/汇总/子任务/嵌套子agent 同一形态。 */
  .wfi { align-self: stretch; border: .5px solid var(--composer-border); border-radius: 9px; background: var(--composer-bg); overflow: hidden; }
  .wfi > summary { list-style: none; cursor: pointer; padding: 5px 9px; display: flex; align-items: center; gap: 7px; user-select: none; }
  .wfi > summary::-webkit-details-marker { display: none; }
  .wfi .g { flex: none; font-size: 12px; color: var(--txt3); }
  .wfi.run .g { color: var(--accent); } .wfi.ok .g { color: var(--green); } .wfi.err .g { color: var(--diff-del); }
  .wfi .lbl { flex: 1; min-width: 0; font-size: 12px; color: var(--txt); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .wfi.pend .lbl { color: var(--txt3); }
  .wfi .meta { flex: none; font-family: var(--mono); font-size: 10.5px; color: var(--txt3); font-variant-numeric: tabular-nums; }
  .wfi .body { padding: 2px 10px 8px 26px; display: flex; flex-direction: column; gap: 2px; }
  .wfi .tools { max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 1px; }
  .wfi .tln { font: 11px var(--mono); color: var(--txt3); display: flex; gap: 6px; align-items: baseline; line-height: 1.5; }
  .wfi .tln .tt { font-weight: 600; flex: none; }
  .wfi .tln.run .tt { color: var(--accent); } .wfi .tln.ok .tt { color: var(--txt2); } .wfi .tln.e .tt { color: var(--diff-del); }
  .wfi .tln .tg { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .wfi .out { margin-top: 4px; font-size: 11px; color: var(--txt2); white-space: pre-wrap; overflow-wrap: anywhere; max-height: 220px; overflow-y: auto; -webkit-user-select: text; user-select: text; border-top: .5px dashed var(--composer-border); padding-top: 4px; }

  /* feed 留个下限:detail/mon 都撑满时 feed(最终成果/审批/报错都在这)不该被压到看不见 */
  #feed { flex: 1 1 45%; min-height: 90px; overflow-y: auto; display: flex; flex-direction: column; gap: 7px; }
  .banner { font-size: 12px; padding: 7px 10px; border-radius: 9px; }
  .banner.run { background: var(--composer-bg); color: var(--txt2); }
  .banner.done { background: rgba(10,157,110,.12); color: var(--green); }
  .banner.err { background: var(--warn-bg); color: var(--warn-txt); border: .5px solid var(--warn-border); }
  /* Claude 式时间线:轮次分段头 + 规划器旁白 + 每任务一行状态(⏺ 运行 / ✓ 完成+耗时 / ✗ 失败+原因) */
  .rhead { font-size: 10.5px; color: var(--txt3); text-align: center; margin: 3px 0 0; letter-spacing: .06em; user-select: none; }
  .note { font-size: 11.5px; color: var(--txt2); border-left: 2px solid var(--accent); padding: 2px 9px; line-height: 1.5; }
  .wf-final { background: var(--ai-bg); border: .5px solid var(--ai-border); border-radius: 11px; padding: 9px 11px; overflow-wrap: anywhere; line-height: 1.55; -webkit-user-select: text; user-select: text; }
  .wf-final h1,.wf-final h2,.wf-final h3,.wf-final h4 { font-size: 13px; font-weight: 600; margin: 9px 0 4px; }
  .wf-final p { margin: 5px 0; } .wf-final ul,.wf-final ol { margin: 5px 0; padding-left: 18px; }
  .wf-final pre.code { background: var(--composer-bg); border: .5px solid var(--composer-border); border-radius: 8px; padding: 9px 11px; overflow-x: auto; }
  .wf-final table { border-collapse: collapse; margin: 7px 0; font-size: 12px; display: block; overflow-x: auto; }
  .wf-final th,.wf-final td { border: .5px solid var(--composer-border); padding: 4px 8px; }
  .approve { background: var(--composer-bg); border: 1px solid var(--accent); border-radius: 11px; padding: 9px 10px; display: flex; flex-direction: column; gap: 8px; }
  .approve .t { font-size: 12px; color: var(--txt); }
  .approve .btns { display: flex; gap: 7px; flex-wrap: wrap; }
  .approve .go { font-size: 11.5px; font-weight: 600; color: var(--send-fg); background: var(--brand); border: none; border-radius: 8px; padding: 5px 13px; cursor: pointer; }
  .approve .auto { font-size: 11.5px; color: var(--txt2); background: transparent; border: 1px solid var(--composer-border); border-radius: 8px; padding: 5px 11px; cursor: pointer; }
  .approve .no { font-size: 11.5px; color: var(--diff-del); background: transparent; border: 1px solid var(--diff-del); border-radius: 8px; padding: 5px 11px; cursor: pointer; }
  .perm { display: flex; align-items: center; gap: 8px; background: var(--warn-bg); border: .5px solid var(--warn-border); border-radius: 11px; padding: 7px 9px; }
  .perm .t { flex: 1; font-size: 12px; color: var(--warn-txt); }
  .perm .ok { font-size: 11px; font-weight: 600; color: var(--warn-btn-fg); background: var(--warn-btn); padding: 4px 10px; border-radius: 7px; border: none; cursor: pointer; }
  .perm .no { font-size: 11px; color: var(--txt2); background: transparent; border: none; cursor: pointer; padding: 4px 6px; }
</style>
</head>
<body>
<div class="glass">
  <span class="hl"></span>
  <div class="card">
    <div class="hd">
      <span class="icn" style="display:flex"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent)"><circle cx="6" cy="6" r="2.5"/><circle cx="18" cy="6" r="2.5"/><circle cx="12" cy="18" r="2.5"/><path d="M6 8.5v3a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-3M12 13.5v2"/></svg></span>
      <span id="ttl" class="ttl">工作流</span>
      <button id="dag" class="hbtn nodrag" title="依赖图(开/关)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="4" width="7" height="6" rx="1.5"/><rect x="14" y="4" width="7" height="6" rx="1.5"/><rect x="8.5" y="15" width="7" height="6" rx="1.5"/><path d="M6.5 10v2.5h11V10M12 12.5V15"/></svg></button>
      <button id="stop" class="stop nodrag">停止</button>
      <button id="min" class="hbtn nodrag" title="最小化"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/></svg></button>
      <button id="max" class="hbtn nodrag" title="最大化/还原"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="5" width="14" height="14" rx="2"/></svg></button>
      <button id="x" class="hbtn nodrag" title="关闭"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </div>
    <div id="goal" class="goal scrollable nodrag"></div>
    <div id="graph" class="scrollable nodrag" hidden></div>
    <div id="feed" class="feed scrollable nodrag"></div>
  </div>
</div>
<script src="rich.js"></script>
<script>
  window.BocomHermes.onTheme((t) => { document.documentElement.dataset.theme = t })
  const params = new URLSearchParams(location.search)
  const goal = params.get('goal') || '工作流'
  document.getElementById('goal').textContent = goal
  document.getElementById('ttl').title = goal
  const feed = document.getElementById('feed'), graphEl = document.getElementById('graph')
  // 依赖图开关(主视图=统一树,DAG 是辅助)
  document.getElementById('dag').addEventListener('click', () => { graphEl.hidden = !graphEl.hidden; if (!graphEl.hidden) draw() })
  // 跑动中关窗要确认:关闭 = 中止全部在跑子任务(spawnWorkflow 的 closed 钩子会杀会话)
  document.getElementById('x').addEventListener('click', () => {
    if (runningBanner && !confirm('工作流仍在运行,关闭将中止所有子任务。确定关闭?')) return
    window.BocomHermes.closeSelf()
  })
  document.getElementById('min').addEventListener('click', () => window.BocomHermes.minimizeSelf())
  document.getElementById('max').addEventListener('click', () => window.BocomHermes.toggleMaximize())

  // ---- DAG 图：按依赖深度分层，状态着色 ----
  const tasks = new Map()   // id -> { id, role, goal, deps, status }
  const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
  const STt = { pending: '等待', running: '运行中', ok: '完成', error: '失败', timeout: '超时', aborted: '已停' }
  const NW = 158, NH = 56, GX = 52, GY = 14, PAD = 12
  function draw() {
    const memo = new Map()
    const layerOf = (id, seen) => {
      if (memo.has(id)) return memo.get(id)
      if (seen.has(id)) return 0
      seen.add(id)
      const t = tasks.get(id); if (!t) return 0
      const dl = (t.deps || []).map((d) => layerOf(d, seen))
      const l = dl.length ? 1 + Math.max(-1, ...dl) : 0
      memo.set(id, l); return l
    }
    const layers = []
    for (const t of tasks.values()) { const l = layerOf(t.id, new Set()); (layers[l] || (layers[l] = [])).push(t) }
    const pos = new Map(); let maxRows = 0
    layers.forEach((arr, li) => { arr.forEach((t, ri) => pos.set(t.id, { x: PAD + li * (NW + GX), y: PAD + ri * (NH + GY) })); maxRows = Math.max(maxRows, arr.length) })
    const W = Math.max(120, PAD * 2 + layers.length * (NW + GX) - GX)
    const H = Math.max(70, PAD * 2 + maxRows * (NH + GY) - GY)
    let edges = '', nodes = ''
    for (const t of tasks.values()) {
      const p = pos.get(t.id)
      for (const d of t.deps || []) { const q = pos.get(d); if (!q) continue
        const x1 = q.x + NW, y1 = q.y + NH / 2, x2 = p.x, y2 = p.y + NH / 2, mx = (x1 + x2) / 2
        edges += `<path class="edge" d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}" marker-end="url(#ah)"/>`
      }
      const role = (t.role || 'worker')
      const goalShort = t.goal.length > 17 ? t.goal.slice(0, 16) + '…' : t.goal
      const statusLabel = STt[t.status] || '等待'
      nodes += `<g class="node ${t.status || 'pending'}" data-id="${esc(t.id)}" transform="translate(${p.x},${p.y})">`
        + `<rect width="${NW}" height="${NH}" rx="9"/>`
        + `<text class="nid" x="10" y="15">${esc(t.id)} · ${esc(role)}</text>`
        + `<text class="ng" x="10" y="30">${esc(goalShort)}</text>`
        + `<text class="nst" x="10" y="46">${esc(statusLabel)}</text></g>`
    }
    graphEl.innerHTML = `<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg"><defs>`
      + `<marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="var(--txt3)"/></marker>`
      + `</defs>${edges}${nodes}</svg>`
  }
  // 图上点节点 → 展开树里对应条目并滚过去(明细/产出都在条目里,不再有独立详情面板)
  graphEl.addEventListener('click', (e) => {
    const g = e.target.closest('.node'); if (!g) return
    const it = items.get(g.dataset.id); if (!it) return
    it.el.open = true
    it.el.scrollIntoView({ block: 'center' })
  })

  function banner(cls, text) { const b = document.createElement('div'); b.className = 'banner ' + cls; b.textContent = text; feed.appendChild(b); feed.scrollTop = feed.scrollHeight; return b }

  // 权限（worker 写/执行会路由到这里）
  window.BocomHermes.onPermission(({ requestId, tool }) => {
    const box = document.createElement('div'); box.className = 'perm'
    const t = document.createElement('span'); t.className = 't'; t.textContent = '某子任务请求执行：' + tool
    const ok = document.createElement('button'); ok.className = 'ok'; ok.textContent = '允许一次'
    const al = document.createElement('button'); al.className = 'no'; al.textContent = '总是'
    const no = document.createElement('button'); no.className = 'no'; no.textContent = '拒绝'
    const reply = (d) => { window.BocomHermes.permissionReply(requestId, d); box.remove() }
    ok.onclick = () => reply('once'); al.onclick = () => reply('always'); no.onclick = () => reply('reject')
    box.append(t, ok, al, no); feed.appendChild(box); feed.scrollTop = feed.scrollHeight
  })

  // ── 统一树(对齐 Claude 工作流):每个执行体(规划器/子任务/汇总/嵌套子agent)= 一个可展开条目,
  //    行内实时「N 次调用 · 耗时」,展开看工具明细(↳ 工具 目标)与产出全文。取代原独立监控区+详情面板。──
  const items = new Map()   // key -> { el, gEl, lblEl, metaEl, toolsEl, outEl, calls, count, t0, doneAt, status }
  const GLYPH = { pend: '○', run: '⏺', ok: '✓', err: '✗' }
  const toolTarget = (input) => {
    if (input == null) return ''
    if (typeof input === 'string') return input.slice(0, 110)
    const v = input.filePath || input.path || input.file || input.pattern || input.command || input.cmd || input.query || input.url || input.description || ''
    return String(v).slice(0, 110)
  }
  function wfItem(key, label) {
    let it = items.get(key)
    if (it) { if (label) it.lblEl.textContent = label; return it }
    const el = document.createElement('details'); el.className = 'wfi pend'
    el.innerHTML = '<summary><span class="g">○</span><span class="lbl"></span><span class="meta"></span></summary>'
      + '<div class="body"><div class="tools"></div><div class="out" hidden></div></div>'
    it = { el, gEl: el.querySelector('.g'), lblEl: el.querySelector('.lbl'), metaEl: el.querySelector('.meta'),
           toolsEl: el.querySelector('.tools'), outEl: el.querySelector('.out'), calls: new Map(), count: 0, reads: 0, t0: 0, doneAt: 0, status: 'pend' }
    it.lblEl.textContent = label || key
    items.set(key, it); feed.appendChild(el); scrollFeed(false)
    return it
  }
  function wfMeta(it) {
    const secs = it.t0 ? Math.round(((it.doneAt || Date.now()) - it.t0) / 1000) + 's' : ''
    // 查子Agent:该执行体读文件累计;越界(≥60)红字提示可能撑爆上下文
    const rd = it.reads ? (it.reads >= 60 ? '<span style="color:var(--diff-del);font-weight:600">📄 ' + it.reads + '</span>' : '📄 ' + it.reads) : ''
    const parts = []
    if (it.count) parts.push(it.count + ' 次调用')
    if (rd) parts.push(rd)
    if (secs) parts.push(secs)
    it.metaEl.innerHTML = parts.join(' · ')
  }
  function wfStatus(key, status, label) {
    const it = wfItem(key, label)
    if (status === 'run' && !it.t0) it.t0 = Date.now()
    if ((status === 'ok' || status === 'err') && !it.doneAt) it.doneAt = Date.now()
    it.status = status
    it.el.className = 'wfi ' + status
    it.gEl.textContent = GLYPH[status] || '○'
    if (status === 'ok' || status === 'err') it.el.open = false   // 收尾自动收起,树保持紧凑
    wfMeta(it)
    return it
  }
  function wfTool(key, label, toolName, status, input, callId, readN) {
    const it = wfItem(key, label)
    if (it.status === 'pend') wfStatus(key, 'run')
    if (readN) it.reads = readN
    let line = it.calls.get(callId)
    if (!line) { line = document.createElement('div'); it.toolsEl.appendChild(line); it.calls.set(callId, line); it.count++ }
    const fin = /complet|success|done|finish|ok/i.test(status), err = /error|fail|deny|reject/i.test(status)
    line.className = 'tln' + (err ? ' e' : fin ? ' ok' : ' run')
    line.innerHTML = '<span>↳</span><span class="tt">' + esc(toolName) + '</span><span class="tg">' + esc(toolTarget(input)) + '</span>'
    wfMeta(it)
  }
  setInterval(() => { for (const it of items.values()) if (it.status === 'run') wfMeta(it) }, 1000)   // 运行中条目耗时每秒跳
  // card-stream 路由:tag{scope:'wf',id=DAG节点id,kind,role,round};嵌套子agent挂到 父key/agentId
  window.BocomHermes.onStream((p) => {
    const t = p.tag || {}; if (t.scope !== 'wf') return
    const base = String(t.id || 'task')
    const topLabel = t.kind === 'plan' ? '规划器 · 第 ' + (t.round || '?') + ' 轮' : t.kind === 'reduce' ? '汇总' : t.kind === 'review' ? '汇总后复核' : t.kind === 'revise' ? '据复核修订' : null   // worker 顶层名由 plan 事件定(id·goal),流事件不覆盖
    const key = p.sub ? base + '/' + (p.agentId || '_') : base
    const name = p.sub ? ((topLabel || base) + ' ▸ ' + (p.agentName || '子agent')) : topLabel
    const it = wfItem(key, name || undefined)
    if (p.kind !== 'tool') { if (it.status === 'pend') wfStatus(key, 'run'); return }   // 思考/文本只用于点亮,内容不进 DOM
    if (p.text === 'task' && !p.sub) {   // 父会话 task 工具收尾 → 嵌套子agent条目收口
      const fin = /complet|success|done|finish|error|fail|deny|reject/i.test(p.status || '')
      if (fin && p.taskChild) wfStatus(key + '/' + p.taskChild, /error|fail|deny|reject/i.test(p.status || '') ? 'err' : 'ok', p.taskDesc)
      return
    }
    wfTool(key, name || undefined, p.text, p.status || '', p.input, p.partID || '_', p.readN || 0)
  })

  // 进度横幅:单条常驻,随事件滚动更新(第 x 轮 · 运行中 k · 完成 m/n),不再是静态"正在规划…"
  let curRound = 0
  function refreshBanner(extra) {
    if (!runningBanner) return
    const all = [...tasks.values()]
    const run = all.filter((t) => t.status === 'running').length
    const done = all.filter((t) => t.status && t.status !== 'pending' && t.status !== 'running').length
    runningBanner.textContent = extra || ('第 ' + (curRound || 1) + ' 轮 · 运行中 ' + run + ' · 完成 ' + done + '/' + all.length)
  }
  let runningBanner = banner('run', '正在规划…')
  // 滚动守卫:用户上翻阅读时不拽底;贴近底部(≤60px)才跟随新内容。force=阶段切换点(审批/最终成果)仍强制到底
  const nearBottom = () => feed.scrollTop + feed.clientHeight >= feed.scrollHeight - 60
  function scrollFeed(force) { if (force || nearBottom()) feed.scrollTop = feed.scrollHeight }
  // 时间线元素:轮次分段头 + 规划器旁白(note)+ 每任务一行状态
  function roundHead(round, n, planned) {
    const h = document.createElement('div'); h.className = 'rhead'
    h.textContent = '── 第 ' + round + ' 轮 · ' + n + ' 个任务' + (planned > n ? '(计划 ' + planned + ',预算截为 ' + n + ')' : '') + ' ──'
    feed.appendChild(h); scrollFeed(false)
  }
  function plannerNote(text) { if (!text) return; const d = document.createElement('div'); d.className = 'note'; d.textContent = text; feed.appendChild(d); scrollFeed(false) }
  window.BocomHermes.onWorkflowEvent((ev) => {
    if (ev.type === 'plan') {
      curRound = ev.round || curRound
      // done=true 一律收尾(编排器此时 break,即使 tasks 非空也不会执行 —— 不画幽灵轮次)
      if (ev.done || !ev.tasks || !ev.tasks.length) { plannerNote(ev.note || (ev.done ? '判定可收尾' : '')); refreshBanner('第 ' + ev.round + ' 轮：' + (ev.done ? '判定可收尾，正在汇总…' : '本轮无新任务')); return }
      roundHead(ev.round, ev.tasks.length, ev.plannedTotal || ev.tasks.length)
      plannerNote(ev.note)
      for (const t of ev.tasks) {
        if (!tasks.has(t.id)) tasks.set(t.id, { id: t.id, role: t.role, goal: t.goal, deps: t.deps || [], status: 'pending' })
        wfItem(t.id, t.id + ' · ' + t.goal)   // 树条目(○ 等待)——审批通过后开跑时点亮
      }
      if (!graphEl.hidden) draw()
      refreshBanner()
    } else if (ev.type === 'plan-failed') {
      // 规划器挂了但前面几轮有成果:编排层收手去汇总。必须说出来 —— 否则用户只看到"轮次莫名其妙少了几轮"
      plannerNote('⚠ 第 ' + ev.round + ' 轮规划失败：' + (ev.error || '') + ' —— 不再往下拆，直接用已完成的子任务成果汇总（成果不丢）')
      refreshBanner('规划器失败，正在用已有成果汇总…')
    } else if (ev.type === 'plan-approve') {
      const box = document.createElement('div'); box.className = 'approve'
      const t = document.createElement('div'); t.className = 't'
      t.textContent = '第 ' + ev.round + ' 轮 · ' + ev.count + ' 个子任务，确认执行？'
      // 任务列表预览
      const tlist = document.createElement('div'); tlist.style.cssText = 'display:flex;flex-direction:column;gap:4px;margin:2px 0;'
      const cks = []
      for (const task of (ev.tasks || [])) {
        const item = document.createElement('label')
        item.style.cssText = 'display:flex;align-items:flex-start;gap:6px;font-size:11px;color:var(--txt2);background:var(--composer-bg);border:.5px solid var(--composer-border);border-radius:7px;padding:4px 8px;line-height:1.4;cursor:pointer;'
        const ck = document.createElement('input'); ck.type = 'checkbox'; ck.checked = true; ck.dataset.tid = task.id; ck.style.cssText = 'margin-top:1px;cursor:pointer'
        cks.push(ck); item.appendChild(ck)
        const body = document.createElement('span')
        const badge = document.createElement('span')
        badge.style.cssText = 'font-family:var(--mono);font-size:10px;color:var(--accent);margin-right:5px;'
        badge.textContent = task.role || 'worker'
        body.appendChild(badge)
        body.appendChild(document.createTextNode(task.goal))
        if (task.deps && task.deps.length) {   // 依赖可见:一眼看出哪些并行、哪些等前置
          const dep = document.createElement('span')
          dep.style.cssText = 'font-family:var(--mono);font-size:10px;color:var(--txt3);margin-left:5px;'
          dep.textContent = '← ' + task.deps.join(',')
          body.appendChild(dep)
        }
        item.appendChild(body)
        tlist.appendChild(item)
      }
      const btns = document.createElement('div'); btns.className = 'btns'
      const go = document.createElement('button'); go.className = 'go'; go.textContent = '批准执行'
      go.title = '只跑勾选的任务;全不勾 = 直接收尾汇总'
      const auto = document.createElement('button'); auto.className = 'auto'; auto.textContent = '自动·不再询问'
      const no = document.createElement('button'); no.className = 'no'; no.textContent = '停止'
      const reply = (decision, a, keepIds) => { window.BocomHermes.wfApprove(ev.reqId, decision, a, keepIds); box.remove() }
      go.onclick = () => {
        const keep = cks.filter((c) => c.checked).map((c) => c.dataset.tid)
        // 勾掉的任务从图和树上一并移走(不执行);全勾 = 不传 keepIds,走全量
        if (keep.length !== cks.length) {
          for (const c of cks) if (!c.checked) {
            tasks.delete(c.dataset.tid)
            const gi = items.get(c.dataset.tid); if (gi) { gi.el.remove(); items.delete(c.dataset.tid) }
          }
          draw()
        }
        reply('run', false, keep.length === cks.length ? null : keep)
      }
      auto.onclick = () => reply('run', true, null); no.onclick = () => reply('abort', false, null)
      btns.append(go, auto, no); box.append(t, tlist, btns); feed.appendChild(box); feed.scrollTop = feed.scrollHeight
    } else if (ev.type === 'task') {
      const t = tasks.get(ev.id)
      if (t) { t.status = ev.status; if (ev.output) t.output = ev.output; if (ev.error) t.error = ev.error }
      // 树条目权威收尾(编排事件优先于流事件):状态灯 + 精确耗时(ev.ms)+ 产出/错误进条目体
      if (ev.status === 'running') wfStatus(ev.id, 'run')
      else {
        const it = wfStatus(ev.id, ev.status === 'ok' ? 'ok' : 'err')
        if (ev.ms) { it.doneAt = (it.t0 || Date.now() - ev.ms) + ev.ms; if (!it.t0) it.t0 = it.doneAt - ev.ms; wfMeta(it) }   // 用编排的精确耗时校准
        const body = ev.output || (ev.error ? '✗ ' + ev.error : '')
        if (body) { it.outEl.textContent = body; it.outEl.hidden = false }
        if (ev.status !== 'ok' && ev.error) { it.lblEl.textContent = it.lblEl.textContent.split(' — ')[0] + ' — ' + String(ev.error).slice(0, 60) }
      }
      if (!graphEl.hidden) draw()
      refreshBanner()
    } else if (ev.type === 'final') {
      if (runningBanner) { runningBanner.remove(); runningBanner = null }
      // 收口所有还亮着的条目(规划器/汇总没有 task 事件,靠这里统一 ✓;耗时计时器随 status 变更自然停)
      for (const [k, it] of items) if (it.status === 'run' || it.status === 'pend') wfStatus(k, 'ok')
      const secs = ev.elapsedMs ? Math.round(ev.elapsedMs / 1000) + 's' : ''
      const okN = [...tasks.values()].filter((t) => t.status === 'ok').length
      const b = banner('done', '完成 · ' + ev.rounds + ' 轮 · ' + okN + '/' + tasks.size + ' 任务成功 · ' + secs + (ev.stopped ? ' · 提前收尾(' + (STOP_WHY[ev.stopped] || ev.stopped) + ')' : '') + (ev.unmet && ev.unmet.length ? ' · 未满足依赖:' + ev.unmet.join(',') : ''))
      const cp = document.createElement('button')   // 最终成果一键复制(拿去贴文档/邮件)
      cp.textContent = '复制成果'
      cp.style.cssText = 'margin-left:8px;font-size:11px;color:var(--accent);background:transparent;border:1px solid var(--accent);border-radius:6px;padding:1px 8px;cursor:pointer'
      cp.addEventListener('click', () => { try { navigator.clipboard.writeText(ev.final || '') } catch {} cp.textContent = '已复制' ; setTimeout(() => cp.textContent = '复制成果', 1500) })
      b.appendChild(cp)
      if (ev.archive) {   // 成果已落盘:关窗不丢;对话 Agent 可用 workflow_result 取回继续用
        const op = document.createElement('button')
        op.textContent = '打开存档'
        op.title = ev.archive + '\n对话里的 Agent 也能取:workflow_result(id=' + (params.get('id') || '') + ')'
        op.style.cssText = cp.style.cssText
        op.addEventListener('click', () => window.BocomHermes.openLoc(ev.archive, 1))
        b.appendChild(op)
      }
      const box = document.createElement('div'); box.className = 'wf-final'
      box.innerHTML = window.Rich.renderMarkdown(ev.final || '(无最终成果)')
      feed.appendChild(box); feed.scrollTop = feed.scrollHeight
    } else if (ev.type === 'error') {
      if (runningBanner) { runningBanner.remove(); runningBanner = null }
      banner('err', '⚠ 出错：' + ev.error)
    }
  })
  feed.addEventListener('click', (e) => { const a = e.target.closest('a.floc'); if (a) { e.preventDefault(); window.BocomHermes.openLoc(a.dataset.file, a.dataset.line) } })
  document.getElementById('stop').addEventListener('click', () => { window.BocomHermes.abortWorkflow(); banner('err', '已请求停止…') })
  ;(async () => { try { await window.BocomHermes.runWorkflow(goal, params.get('id') || '') } catch (e) { banner('err', '⚠ ' + (e.message || e)) } })()
</script>
  <script src="carddrag.js"></script>
</body>
</html>
