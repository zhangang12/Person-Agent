<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<script>try { document.documentElement.dataset.theme = window.BocomHermes.getTheme() || 'light' } catch (e) { document.documentElement.dataset.theme = 'light' }</script>
<script>(function(){try{var p=new URLSearchParams(location.search),d=document.documentElement.style;['gox','goy','gfx','gfy'].forEach(function(k){var v=p.get(k);if(v)d.setProperty('--'+k,v)})}catch(e){}})()</script>
<link rel="stylesheet" href="glass.css" />
<style>
  .card { display: flex; flex-direction: column; height: 100%; padding: 11px 13px 12px; gap: 8px; }
  .hd { display: flex; align-items: center; gap: 7px; flex: none; }
  .ttl { flex: 1; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hbtn { border: none; background: transparent; color: var(--txt3); cursor: pointer; padding: 3px; border-radius: 6px; display: flex; }
  .hbtn:hover { color: var(--txt); background: var(--composer-bg); }
  .stop { font-size: 11px; color: var(--diff-del); background: transparent; border: 1px solid var(--diff-del); border-radius: 7px; padding: 3px 10px; cursor: pointer; }
  .goal { flex: none; font-size: 12px; color: var(--txt2); background: var(--composer-bg); border: .5px solid var(--composer-border); border-radius: 9px; padding: 7px 10px; line-height: 1.45; }

  /* DAG 图 */
  #graph { flex: 1 1 55%; min-height: 130px; overflow: auto; border: .5px solid var(--composer-border); border-radius: 10px; background: var(--composer-bg); }
  #graph::-webkit-scrollbar, #feed::-webkit-scrollbar { width: 7px; height: 7px; }
  #graph::-webkit-scrollbar-thumb, #feed::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 3px; }
  .node rect { fill: var(--ai-bg); stroke: var(--composer-border); stroke-width: 1.2; }
  .node .nid { font: 600 10px var(--mono); fill: var(--txt2); }
  .node .ng { font: 11.5px var(--font); fill: var(--txt); }
  .node .nst { font: 10px var(--font); fill: var(--txt3); }
  .node { cursor: pointer; }
  .node.running rect { stroke: var(--accent); stroke-width: 1.8; animation: tw 1.4s ease-in-out infinite; }
  .node.running .nst { fill: var(--accent); }
  .node.ok rect { stroke: var(--green); stroke-width: 1.6; }
  .node.ok .nst { fill: var(--green); }
  .node.error rect, .node.timeout rect, .node.aborted rect { stroke: var(--diff-del); stroke-width: 1.6; }
  .node.error .nst, .node.timeout .nst, .node.aborted .nst { fill: var(--diff-del); }
  .node.sel rect { stroke: var(--accent); stroke-width: 2.2; }
  .edge { fill: none; stroke: var(--txt3); stroke-width: 1.3; opacity: .7; }
  .detail { flex: none; font-size: 11.5px; color: var(--txt); background: var(--composer-bg); border: .5px solid var(--accent); border-radius: 9px; padding: 7px 9px; line-height: 1.5; display: none; max-height: 30%; overflow-y: auto; -webkit-user-select: text; user-select: text; white-space: pre-wrap; overflow-wrap: anywhere; }
  .detail.on { display: block; }
  .detail .dh { font-weight: 600; margin-bottom: 3px; }
  .detail .dout { color: var(--txt2); font-size: 11px; }

  #feed { flex: 1 1 45%; overflow-y: auto; display: flex; flex-direction: column; gap: 7px; }
  .banner { font-size: 12px; padding: 7px 10px; border-radius: 9px; }
  .banner.run { background: var(--composer-bg); color: var(--txt2); }
  .banner.done { background: rgba(10,157,110,.12); color: var(--green); }
  .banner.err { background: var(--warn-bg); color: var(--warn-txt); border: .5px solid var(--warn-border); }
  .wf-final { background: var(--ai-bg); border: .5px solid var(--ai-border); border-radius: 11px; padding: 9px 11px; overflow-wrap: anywhere; line-height: 1.55; -webkit-user-select: text; user-select: text; }
  .wf-final h1,.wf-final h2,.wf-final h3,.wf-final h4 { font-size: 13px; font-weight: 600; margin: 9px 0 4px; }
  .wf-final p { margin: 5px 0; } .wf-final ul,.wf-final ol { margin: 5px 0; padding-left: 18px; }
  .wf-final pre.code { background: var(--composer-bg); border: .5px solid var(--composer-border); border-radius: 8px; padding: 9px 11px; overflow-x: auto; }
  .wf-final table { border-collapse: collapse; margin: 7px 0; font-size: 12px; display: block; overflow-x: auto; }
  .wf-final th,.wf-final td { border: .5px solid var(--composer-border); padding: 4px 8px; }
  .approve { background: var(--composer-bg); border: 1px solid var(--accent); border-radius: 11px; padding: 9px 10px; display: flex; flex-direction: column; gap: 8px; }
  .approve .t { font-size: 12px; color: var(--txt); }
  .approve .btns { display: flex; gap: 7px; flex-wrap: wrap; }
  .approve .go { font-size: 11.5px; font-weight: 600; color: var(--send-fg); background: var(--brand); border: none; border-radius: 8px; padding: 5px 13px; cursor: pointer; }
  .approve .auto { font-size: 11.5px; color: var(--txt2); background: transparent; border: 1px solid var(--composer-border); border-radius: 8px; padding: 5px 11px; cursor: pointer; }
  .approve .no { font-size: 11.5px; color: var(--diff-del); background: transparent; border: 1px solid var(--diff-del); border-radius: 8px; padding: 5px 11px; cursor: pointer; }
  .perm { display: flex; align-items: center; gap: 8px; background: var(--warn-bg); border: .5px solid var(--warn-border); border-radius: 11px; padding: 7px 9px; }
  .perm .t { flex: 1; font-size: 12px; color: var(--warn-txt); }
  .perm .ok { font-size: 11px; font-weight: 600; color: var(--warn-btn-fg); background: var(--warn-btn); padding: 4px 10px; border-radius: 7px; border: none; cursor: pointer; }
  .perm .no { font-size: 11px; color: var(--txt2); background: transparent; border: none; cursor: pointer; padding: 4px 6px; }
</style>
</head>
<body>
<div class="glass">
  <span class="hl"></span>
  <div class="card">
    <div class="hd">
      <span class="icn" style="display:flex"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent)"><circle cx="6" cy="6" r="2.5"/><circle cx="18" cy="6" r="2.5"/><circle cx="12" cy="18" r="2.5"/><path d="M6 8.5v3a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-3M12 13.5v2"/></svg></span>
      <span id="ttl" class="ttl">工作流</span>
      <button id="stop" class="stop nodrag">停止</button>
      <button id="min" class="hbtn nodrag" title="最小化"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/></svg></button>
      <button id="max" class="hbtn nodrag" title="最大化/还原"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="5" width="14" height="14" rx="2"/></svg></button>
      <button id="x" class="hbtn nodrag" title="关闭"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </div>
    <div id="goal" class="goal nodrag"></div>
    <div id="graph" class="nodrag"></div>
    <div id="detail" class="detail nodrag"></div>
    <div id="mon" class="nodrag" style="flex:none;max-height:34%;overflow-y:auto;display:flex;flex-direction:column;gap:3px"></div>
    <div id="feed" class="feed nodrag"></div>
  </div>
</div>
<script src="rich.js"></script>
<script src="agentmon.js"></script>
<script>
  window.BocomHermes.onTheme((t) => { document.documentElement.dataset.theme = t })
  const params = new URLSearchParams(location.search)
  const goal = params.get('goal') || '工作流'
  document.getElementById('goal').textContent = goal
  document.getElementById('ttl').title = goal
  const feed = document.getElementById('feed'), graphEl = document.getElementById('graph'), detailEl = document.getElementById('detail')
  document.getElementById('x').addEventListener('click', () => window.BocomHermes.closeSelf())
  document.getElementById('min').addEventListener('click', () => window.BocomHermes.minimizeSelf())
  document.getElementById('max').addEventListener('click', () => window.BocomHermes.toggleMaximize())

  // ---- DAG 图：按依赖深度分层，状态着色 ----
  const tasks = new Map()   // id -> { id, role, goal, deps, status }
  let selId = null
  const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
  const STt = { pending: '等待', running: '运行中', ok: '完成', error: '失败', timeout: '超时', aborted: '已停' }
  const NW = 158, NH = 56, GX = 52, GY = 14, PAD = 12
  function draw() {
    const memo = new Map()
    const layerOf = (id, seen) => {
      if (memo.has(id)) return memo.get(id)
      if (seen.has(id)) return 0
      seen.add(id)
      const t = tasks.get(id); if (!t) return 0
      const dl = (t.deps || []).map((d) => layerOf(d, seen))
      const l = dl.length ? 1 + Math.max(-1, ...dl) : 0
      memo.set(id, l); return l
    }
    const layers = []
    for (const t of tasks.values()) { const l = layerOf(t.id, new Set()); (layers[l] || (layers[l] = [])).push(t) }
    const pos = new Map(); let maxRows = 0
    layers.forEach((arr, li) => { arr.forEach((t, ri) => pos.set(t.id, { x: PAD + li * (NW + GX), y: PAD + ri * (NH + GY) })); maxRows = Math.max(maxRows, arr.length) })
    const W = Math.max(120, PAD * 2 + layers.length * (NW + GX) - GX)
    const H = Math.max(70, PAD * 2 + maxRows * (NH + GY) - GY)
    let edges = '', nodes = ''
    for (const t of tasks.values()) {
      const p = pos.get(t.id)
      for (const d of t.deps || []) { const q = pos.get(d); if (!q) continue
        const x1 = q.x + NW, y1 = q.y + NH / 2, x2 = p.x, y2 = p.y + NH / 2, mx = (x1 + x2) / 2
        edges += `<path class="edge" d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}" marker-end="url(#ah)"/>`
      }
      const role = (t.role || 'worker')
      const goalShort = t.goal.length > 17 ? t.goal.slice(0, 16) + '…' : t.goal
      const statusLabel = STt[t.status] || '等待'
      nodes += `<g class="node ${t.status || 'pending'}${selId === t.id ? ' sel' : ''}" data-id="${esc(t.id)}" transform="translate(${p.x},${p.y})">`
        + `<rect width="${NW}" height="${NH}" rx="9"/>`
        + `<text class="nid" x="10" y="15">${esc(t.id)} · ${esc(role)}</text>`
        + `<text class="ng" x="10" y="30">${esc(goalShort)}</text>`
        + `<text class="nst" x="10" y="46">${esc(statusLabel)}</text></g>`
    }
    graphEl.innerHTML = `<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg"><defs>`
      + `<marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="var(--txt3)"/></marker>`
      + `</defs>${edges}${nodes}</svg>`
  }
  graphEl.addEventListener('click', (e) => {
    const g = e.target.closest('.node'); if (!g) return
    const t = tasks.get(g.dataset.id); if (!t) return
    if (selId === t.id) { selId = null; draw(); detailEl.className = 'detail'; return }   // 再点一次收起
    selId = t.id; draw()
    detailEl.className = 'detail on'
    detailEl.innerHTML = ''
    const h = document.createElement('div'); h.className = 'dh'
    h.textContent = '[' + t.id + ' · ' + (t.role || 'worker') + '] ' + t.goal
    detailEl.appendChild(h)
    const o = document.createElement('div'); o.className = 'dout'
    o.textContent = t.output ? t.output : (t.error ? '✗ ' + t.error : (t.status === 'running' ? '运行中…' : '(还没有产出)'))
    detailEl.appendChild(o)
  })

  function banner(cls, text) { const b = document.createElement('div'); b.className = 'banner ' + cls; b.textContent = text; feed.appendChild(b); feed.scrollTop = feed.scrollHeight; return b }

  // 权限（worker 写/执行会路由到这里）
  window.BocomHermes.onPermission(({ requestId, tool }) => {
    const box = document.createElement('div'); box.className = 'perm'
    const t = document.createElement('span'); t.className = 't'; t.textContent = '某子任务请求执行：' + tool
    const ok = document.createElement('button'); ok.className = 'ok'; ok.textContent = '允许一次'
    const al = document.createElement('button'); al.className = 'no'; al.textContent = '总是'
    const no = document.createElement('button'); no.className = 'no'; no.textContent = '拒绝'
    const reply = (d) => { window.BocomHermes.permissionReply(requestId, d); box.remove() }
    ok.onclick = () => reply('once'); al.onclick = () => reply('always'); no.onclick = () => reply('reject')
    box.append(t, ok, al, no); feed.appendChild(box); feed.scrollTop = feed.scrollHeight
  })

  // ── 子任务实时监控（共享组件 agentmon.js）：card-stream 带 tag{scope:'wf',id=DAG节点id,kind,role,round} → 按任务分组列工具调用 ──
  const mon = AgentMon.create({ host: document.getElementById('mon') })
  AgentMon.bindStream(mon, (p) => {
    const t = p.tag || {}; if (t.scope !== 'wf') return null
    const base = String(t.id || 'task')
    const label = t.kind === 'plan' ? '🧭 规划器 · 第' + (t.round || '?') + '轮' : t.kind === 'reduce' ? '🧾 汇总' : base + ' · ' + (t.role || 'worker')
    return p.sub ? { key: base + '/' + (p.agentId || '_'), name: label + ' ▸ ' + (p.agentName || '子agent') } : { key: base, name: label }
  })

  // 进度横幅:单条常驻,随事件滚动更新(第 x 轮 · 运行中 k · 完成 m/n),不再是静态"正在规划…"
  let curRound = 0
  function refreshBanner(extra) {
    if (!runningBanner) return
    const all = [...tasks.values()]
    const run = all.filter((t) => t.status === 'running').length
    const done = all.filter((t) => t.status && t.status !== 'pending' && t.status !== 'running').length
    runningBanner.textContent = extra || ('第 ' + (curRound || 1) + ' 轮 · 运行中 ' + run + ' · 完成 ' + done + '/' + all.length)
  }
  let runningBanner = banner('run', '正在规划…')
  window.BocomHermes.onWorkflowEvent((ev) => {
    if (ev.type === 'plan') {
      curRound = ev.round || curRound
      if (ev.done && (!ev.tasks || !ev.tasks.length)) { refreshBanner('第 ' + ev.round + ' 轮：判定可收尾，正在汇总…'); return }
      for (const t of ev.tasks || []) if (!tasks.has(t.id)) tasks.set(t.id, { id: t.id, role: t.role, goal: t.goal, deps: t.deps || [], status: 'pending' })
      draw(); refreshBanner()
    } else if (ev.type === 'plan-approve') {
      const box = document.createElement('div'); box.className = 'approve'
      const t = document.createElement('div'); t.className = 't'
      t.textContent = '第 ' + ev.round + ' 轮 · ' + ev.count + ' 个子任务，确认执行？'
      // 任务列表预览
      const tlist = document.createElement('div'); tlist.style.cssText = 'display:flex;flex-direction:column;gap:4px;margin:2px 0;'
      for (const task of (ev.tasks || [])) {
        const item = document.createElement('div')
        item.style.cssText = 'font-size:11px;color:var(--txt2);background:var(--composer-bg);border:.5px solid var(--composer-border);border-radius:7px;padding:4px 8px;line-height:1.4;'
        const badge = document.createElement('span')
        badge.style.cssText = 'font-family:var(--mono);font-size:10px;color:var(--accent);margin-right:5px;'
        badge.textContent = task.role || 'worker'
        item.appendChild(badge)
        item.appendChild(document.createTextNode(task.goal))
        if (task.deps && task.deps.length) {   // 依赖可见:一眼看出哪些并行、哪些等前置
          const dep = document.createElement('span')
          dep.style.cssText = 'font-family:var(--mono);font-size:10px;color:var(--txt3);margin-left:5px;'
          dep.textContent = '← ' + task.deps.join(',')
          item.appendChild(dep)
        }
        tlist.appendChild(item)
      }
      const btns = document.createElement('div'); btns.className = 'btns'
      const go = document.createElement('button'); go.className = 'go'; go.textContent = '批准执行'
      const auto = document.createElement('button'); auto.className = 'auto'; auto.textContent = '自动·不再询问'
      const no = document.createElement('button'); no.className = 'no'; no.textContent = '停止'
      const reply = (decision, a) => { window.BocomHermes.wfApprove(ev.reqId, decision, a); box.remove() }
      go.onclick = () => reply('run', false); auto.onclick = () => reply('run', true); no.onclick = () => reply('abort', false)
      btns.append(go, auto, no); box.append(t, tlist, btns); feed.appendChild(box); feed.scrollTop = feed.scrollHeight
    } else if (ev.type === 'task') {
      const t = tasks.get(ev.id)
      if (t) {
        t.status = ev.status
        if (ev.output) t.output = ev.output
        if (ev.error) t.error = ev.error
        draw(); refreshBanner()
        // 详情面板开着且正是这个节点 → 实时刷新产出
        if (selId === ev.id && detailEl.classList.contains('on')) { const o = detailEl.querySelector('.dout'); if (o) o.textContent = t.output || (t.error ? '✗ ' + t.error : (t.status === 'running' ? '运行中…' : '(还没有产出)')) }
      }
      // 编排事件是权威收尾:会话销毁竞态下迟到的工具事件会被丢,工具清单跟 DAG 节点一起收
      if (ev.status && ev.status !== 'running') mon.done(ev.id, ev.status === 'ok' ? 'completed' : 'error')
    } else if (ev.type === 'final') {
      if (runningBanner) { runningBanner.remove(); runningBanner = null }
      const secs = ev.elapsedMs ? Math.round(ev.elapsedMs / 1000) + 's' : ''
      const okN = [...tasks.values()].filter((t) => t.status === 'ok').length
      const b = banner('done', '完成 · ' + ev.rounds + ' 轮 · ' + okN + '/' + tasks.size + ' 任务成功 · ' + secs + (ev.stopped ? ' · 提前收尾(' + ev.stopped + ')' : '') + (ev.unmet && ev.unmet.length ? ' · 未满足依赖:' + ev.unmet.join(',') : ''))
      const cp = document.createElement('button')   // 最终成果一键复制(拿去贴文档/邮件)
      cp.textContent = '复制成果'
      cp.style.cssText = 'margin-left:8px;font-size:11px;color:var(--accent);background:transparent;border:1px solid var(--accent);border-radius:6px;padding:1px 8px;cursor:pointer'
      cp.addEventListener('click', () => { try { navigator.clipboard.writeText(ev.final || '') } catch {} cp.textContent = '已复制' ; setTimeout(() => cp.textContent = '复制成果', 1500) })
      b.appendChild(cp)
      const box = document.createElement('div'); box.className = 'wf-final'
      box.innerHTML = window.Rich.renderMarkdown(ev.final || '(无最终成果)')
      feed.appendChild(box); feed.scrollTop = feed.scrollHeight
    } else if (ev.type === 'error') {
      if (runningBanner) { runningBanner.remove(); runningBanner = null }
      banner('err', '⚠ 出错：' + ev.error)
    }
  })
  feed.addEventListener('click', (e) => { const a = e.target.closest('a.floc'); if (a) { e.preventDefault(); window.BocomHermes.openLoc(a.dataset.file, a.dataset.line) } })
  document.getElementById('stop').addEventListener('click', () => { window.BocomHermes.abortWorkflow(); banner('err', '已请求停止…') })
  ;(async () => { try { await window.BocomHermes.runWorkflow(goal) } catch (e) { banner('err', '⚠ ' + (e.message || e)) } })()
</script>
  <script src="carddrag.js"></script>
</body>
</html>
