<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<script>try { document.documentElement.dataset.theme = window.BocomHermes.getTheme() || 'light' } catch (e) { document.documentElement.dataset.theme = 'light' }</script>
<script>(function(){try{var p=new URLSearchParams(location.search),d=document.documentElement.style;['gox','goy','gfx','gfy'].forEach(function(k){var v=p.get(k);if(v)d.setProperty('--'+k,v)})}catch(e){}})()</script>
<link rel="stylesheet" href="glass.css" />
<style>
  .card { display: flex; flex-direction: column; height: 100%; padding: 0; }
  .hd { display: flex; align-items: center; gap: 7px; flex: none; padding: 10px 13px; border-bottom: .5px solid var(--composer-border); }
  .orb { width: 11px; height: 11px; border-radius: 50%; background: var(--brand); flex: none; }
  .ttl { flex: 1; font-size: 13px; font-weight: 600; }
  .hbtn { border: none; background: transparent; color: var(--txt3); cursor: pointer; padding: 3px; border-radius: 6px; display: flex; }
  .hbtn:hover { color: var(--txt); background: var(--composer-bg); }
  .list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 13px; }
  .list::-webkit-scrollbar { width: 7px; } .list::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 3px; }
  /* 进度态 */
  .prog { margin: auto; width: 100%; max-width: 380px; text-align: center; }
  .prog .ic { font-size: 30px; }
  .prog .t { font-size: 13.5px; font-weight: 600; margin: 8px 0 3px; }
  .prog .s { font-size: 12px; color: var(--txt3); line-height: 1.55; min-height: 18px; }
  .pbar { height: 6px; border-radius: 3px; background: var(--composer-bg); overflow: hidden; margin: 14px 0 0; }
  .pbar > div { height: 100%; width: 0; background: var(--brand); transition: width .25s; }
  /* 详设卡 */
  .item { border: .5px solid var(--composer-border); border-radius: 11px; padding: 12px 13px; }
  .ihd { display: flex; align-items: baseline; gap: 8px; }
  .num { font-size: 12px; font-weight: 700; color: var(--brand); flex: none; }
  .rp { font-size: 13px; font-weight: 600; flex: 1; }
  .sys { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px; background: var(--me-bg); color: var(--me-txt); flex: none; }
  .quote { background: var(--composer-bg); border-radius: 8px; padding: 6px 9px; font-size: 12px; color: var(--txt2); margin: 8px 0; line-height: 1.45; }
  .chg { font-size: 12.5px; color: var(--txt); line-height: 1.6; margin: 6px 0; }
  .sec { margin-top: 9px; }
  .sct { font-size: 11px; font-weight: 700; color: var(--txt3); letter-spacing: .04em; margin-bottom: 4px; }
  .row { font-size: 12px; color: var(--txt2); line-height: 1.5; padding: 1px 0; display: flex; gap: 6px; align-items: baseline; }
  .ev { font-family: var(--mono); font-size: 11px; padding: 2px 7px; border-radius: 6px; background: var(--me-bg); color: var(--me-txt); border: none; cursor: pointer; flex: none; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ev[disabled] { cursor: default; opacity: .8; }
  .ol { padding-left: 18px; margin: 0; font-size: 12px; color: var(--txt2); line-height: 1.6; }
  .opens { border-left: 3px solid var(--warn-txt); background: var(--warn-bg); border-radius: 0 8px 8px 0; padding: 7px 10px; margin-top: 9px; }
  .opens .sct { color: var(--warn-txt); }
  .opens .o { font-size: 12px; color: var(--warn-txt); line-height: 1.55; padding: 1px 0; }
  .foot { display: flex; align-items: center; gap: 10px; padding: 10px 13px; border-top: .5px solid var(--composer-border); flex: none; }
  .muted { color: var(--txt3); font-size: 11px; }
  .btn { font-size: 12px; padding: 6px 12px; border-radius: 8px; border: .5px solid var(--composer-border); background: var(--composer-bg); color: var(--txt); cursor: pointer; }
  .btn:hover { border-color: var(--accent); }
  .err { background: var(--warn-bg); color: var(--warn-txt); border: .5px solid var(--warn-border); border-radius: 9px; padding: 9px 11px; font-size: 12.5px; }
  .glass, .card { -webkit-app-region: no-drag; }
</style>
</head>
<body>
<div class="glass">
  <span class="hl"></span>
  <div class="card">
    <div class="hd">
      <span class="orb"></span><span class="ttl">实施方案 · 详设</span>
      <span id="cnt" class="muted"></span>
      <button id="min" class="hbtn nodrag" title="最小化"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/></svg></button>
      <button id="x" class="hbtn nodrag" title="关闭"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </div>
    <div id="list" class="list nodrag"></div>
    <div class="foot nodrag">
      <span class="muted" style="flex:1">证据可点开核对 · 未决项需人工确认后落地</span>
      <button id="export" class="btn" disabled>导出实施方案</button>
    </div>
  </div>
</div>
<script src="agentmon.js"></script>
<script>
  window.BocomHermes.onTheme((t) => { document.documentElement.dataset.theme = t })
  const H = window.BocomHermes
  const reportId = new URLSearchParams(location.search).get('reportId') || ''
  let planId = ''
  document.getElementById('x').addEventListener('click', () => H.closeSelf())
  document.getElementById('min').addEventListener('click', () => H.minimizeSelf())
  // 整卡拖动统一在 carddrag.js（见 </body> 前引入）

  const esc = (s) => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
  const base = (p) => String(p || '').replace(/^.*[\\\/]/, '')
  const listEl = document.getElementById('list')

  // ── 进度态 ──
  function renderProgress() {
    listEl.innerHTML = '<div class="prog"><div class="ic">🛠️</div>'
      + '<div class="t">正在生成详设级实施方案</div>'
      + '<div id="ps" class="s">定位代码 + 起草中…（grep 在模型外、只把命中切片喂给 agent）</div>'
      + '<div class="pbar"><div id="pf"></div></div>'
      + '<div id="agentmon" style="margin-top:12px;text-align:left;display:flex;flex-direction:column;gap:3px"></div></div>'
  }
  const setPS = (t) => { const d = document.getElementById('ps'); if (d) d.textContent = t }
  const setPF = (f) => { const d = document.getElementById('pf'); if (d) d.style.width = Math.round(Math.max(0, Math.min(1, f)) * 100) + '%' }
  function showErr(msg) { listEl.innerHTML = '<div class="err">⚠ ' + esc(msg) + '</div>' }

  let lastReqPoint = ''   // 'planned' 事件不带 reqPoint(管线顺序执行) → 记住 locating/planning 报的当前需求点做收尾 key
  H.onReqPlanEvent((ev) => {
    if (ev.type === 'stage') {
      const s = ev
      if (s.stage === 'plan-start') setPS('共 ' + s.total + ' 个需求点，开始定位…')
      else if (s.stage === 'locating') { lastReqPoint = s.reqPoint || lastReqPoint; setPS('定位代码 ' + (s.done + 1) + ' / ' + s.total + '：' + (s.reqPoint || '')); setPF(s.total ? s.done / s.total : 0) }
      else if (s.stage === 'planning') { lastReqPoint = s.reqPoint || lastReqPoint; setPS('起草详设 ' + (s.done + 1) + ' / ' + s.total + '（命中 ' + (s.refs || 0) + ' 处）：' + (s.reqPoint || '')) }
      else if (s.stage === 'planned') { setPF(s.total ? s.done / s.total : 0); mon.done(((s.reqPoint || lastReqPoint) || '') + ':plan', 'completed') }   // 编排事件权威收尾(迟到工具事件会被丢)
      else if (s.stage === 'plan-done') setPS('装配中…')
    } else if (ev.type === 'done') {
      planId = ev.planId; loadAndRender()
    } else if (ev.type === 'error') {
      showErr(ev.error)
    }
  })

  function evChip(path, line) {
    if (!path) return ''
    const lbl = base(path) + (line ? ':' + line : '')
    return '<button class="ev" data-file="' + esc(path) + '" data-line="' + (line || '') + '" title="' + esc(path) + '">' + esc(lbl) + '</button>'
  }
  function cardHtml(c, i) {
    let h = '<div class="item"><div class="ihd"><span class="num">' + (i + 1) + '</span>'
      + '<span class="rp">' + esc(c.reqPoint) + '</span>'
      + (c.system ? '<span class="sys">' + esc(c.system) + '</span>' : '') + '</div>'
    if (c.quote) h += '<div class="quote">❝ ' + esc(c.quote) + '</div>'
    if (c.change) h += '<div class="chg">' + esc(c.change) + '</div>'
    if (c.files && c.files.length) {
      h += '<div class="sec"><div class="sct">影响文件</div>'
      for (const f of c.files) h += '<div class="row">' + evChip(f.path, f.line) + '<span>' + (f.symbol ? esc(f.symbol) + ' ' : '') + esc(f.change || '') + '</span></div>'
      h += '</div>'
    }
    if (c.tables && c.tables.length) {
      h += '<div class="sec"><div class="sct">影响数据</div>'
      for (const t of c.tables) h += '<div class="row"><button class="ev" disabled>' + esc(t.table + (t.column ? '.' + t.column : '')) + '</button><span>' + esc(t.change || '') + '</span></div>'
      h += '</div>'
    }
    if (c.interfaces && c.interfaces.length) {
      h += '<div class="sec"><div class="sct">影响接口</div>'
      for (const it of c.interfaces) h += '<div class="row"><button class="ev" disabled>' + esc((it.method ? it.method + ' ' : '') + it.path) + '</button><span>' + (it.caller ? '（' + esc(it.caller) + '）' : '') + esc(it.change || '') + '</span></div>'
      h += '</div>'
    }
    if (c.steps && c.steps.length) {
      h += '<div class="sec"><div class="sct">实施步骤</div><ol class="ol">'
      for (const s of c.steps) h += '<li>' + esc(s) + '</li>'
      h += '</ol></div>'
    }
    if (c.opens && c.opens.length) {
      h += '<div class="opens"><div class="sct">⛑ 未决（待人工确认，未替人拍板）</div>'
      for (const o of c.opens) h += '<div class="o">· ' + esc(o) + '</div>'
      h += '</div>'
    }
    return h + '</div>'
  }
  async function loadAndRender() {
    const plan = await H.getReqPlan(planId)
    const cards = (plan && plan.cards) || []
    document.getElementById('cnt').textContent = cards.length + ' 个需求点'
    if (!cards.length) { listEl.innerHTML = '<div class="err">没有可出方案的需求点（可能都被忽略了）</div>'; return }
    listEl.innerHTML = cards.map(cardHtml).join('')
    listEl.addEventListener('click', (e) => {
      const ev = e.target.closest('.ev[data-file]'); if (ev && ev.dataset.file) H.openLoc(ev.dataset.file, ev.dataset.line)
    })
    const ex = document.getElementById('export'); ex.disabled = false
    ex.addEventListener('click', async () => {
      ex.textContent = '导出中…'
      const r = await H.exportReqPlan(planId)
      ex.textContent = (r && r.ok) ? '已导出 ✓' : (r && r.canceled) ? '导出实施方案' : '导出失败'
    })
  }

  // 进入即开跑（决策已在落档时暂存，req-plan 复用）
  renderProgress()
  // ── 详设过程实时监控（共享组件 agentmon.js）：card-stream 带 tag{scope:'reqplan',kind,id=需求点} → 组=需求点×阶段 ──
  // 出结果后 loadAndRender 会覆盖 listEl.innerHTML,组随之消失,无需清理
  const mon = AgentMon.create({ host: document.getElementById('agentmon') })
  AgentMon.bindStream(mon, (p) => {
    const t = p.tag || {}; if (t.scope !== 'reqplan') return null
    const base = String(t.id || t.kind || '详设')
    const nm = (t.kind === 'plan-kw' ? '🔎 关键词 · ' : '🛠 详设 · ') + base.slice(0, 30)
    return p.sub ? { key: base + '/' + (p.agentId || '_'), name: nm + ' ▸ ' + (p.agentName || '子agent') } : { key: base + ':' + t.kind, name: nm }
  })
  H.reqPlan(reportId).catch((e) => showErr(e && e.message || e))
</script>
  <script src="carddrag.js"></script>
</body>
</html>
