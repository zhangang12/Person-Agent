<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>待办事项 · BocomHermes</title>
<script>try { document.documentElement.dataset.theme = window.BocomHermes.getTheme() || 'light' } catch (e) { document.documentElement.dataset.theme = 'light' }</script>
<script>(function(){try{var p=new URLSearchParams(location.search),d=document.documentElement.style;['gox','goy','gfx','gfy'].forEach(function(k){var v=p.get(k);if(v)d.setProperty('--'+k,v)})}catch(e){}})()</script>
<link rel="stylesheet" href="glass.css" />
<style>
  .panel { display: flex; flex-direction: column; height: 100%; padding: 11px 13px 12px; gap: 9px; }
  .hd { display: flex; align-items: center; gap: 7px; flex: none; }
  .ttl { flex: 1; font-size: 13px; font-weight: 600; }
  .hbtn { border: none; background: transparent; color: var(--txt3); cursor: pointer; padding: 3px 7px; border-radius: 6px; font-size: 11px; display: flex; align-items: center; gap: 4px; }
  .hbtn:hover { color: var(--txt); background: var(--composer-bg); }
  .body { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; padding-right: 2px; }
  .body::-webkit-scrollbar { width: 5px; } .body::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 3px; }
  .empty { color: var(--txt3); font-size: 12px; text-align: center; margin-top: 40px; }

  .section-label { font-size: 10.5px; font-weight: 600; color: var(--txt3); letter-spacing: .04em; padding: 4px 2px 2px; }

  .todo { display: flex; align-items: flex-start; gap: 8px; background: var(--composer-bg); border: .5px solid var(--composer-border); border-radius: 10px; padding: 8px 10px; }
  .todo.done { opacity: .5; }
  .todo input[type=checkbox] { margin-top: 2px; flex: none; accent-color: var(--brand); cursor: pointer; width: 15px; height: 15px; }
  .todo-body { flex: 1; min-width: 0; }
  .todo-text { font-size: 12.5px; line-height: 1.45; color: var(--txt); }
  .todo.done .todo-text { text-decoration: line-through; color: var(--txt3); }
  .todo-meta { font-size: 11px; color: var(--txt3); margin-top: 3px; }
  .urg { display: inline-block; font-size: 10px; font-weight: 600; padding: 0 6px; border-radius: 999px; margin-right: 5px; border: 1px solid; }
  .urg-高 { color: var(--diff-del); border-color: var(--diff-del); background: var(--diff-del-bg); }
  .urg-中 { color: var(--warn-txt); border-color: var(--warn-border); background: var(--warn-bg); }
  .urg-低 { color: var(--txt3); border-color: var(--composer-border); background: transparent; }
  .del-btn { border: none; background: transparent; color: var(--txt3); cursor: pointer; padding: 2px 4px; border-radius: 5px; font-size: 13px; line-height: 1; flex: none; opacity: 0; transition: opacity .12s; }
  .todo:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: var(--diff-del); background: var(--diff-del-bg); }

  .ft { flex: none; display: flex; gap: 8px; align-items: center; }
  .ft-count { flex: 1; font-size: 11px; color: var(--txt3); }
  .btn-ghost { font-size: 11.5px; color: var(--txt2); background: transparent; border: .5px solid var(--composer-border); border-radius: 8px; padding: 5px 12px; cursor: pointer; }
  .btn-ghost:hover { color: var(--txt); }
  /* 邮件待办的动作（看原邮件 / 起草回复）*/
  .mail-acts { display: flex; gap: 6px; margin-top: 6px; }
  .mail-act { border: .5px solid var(--composer-border); background: var(--composer-bg); color: var(--txt2); font-size: 11px; padding: 3px 9px; border-radius: 7px; cursor: pointer; }
  .mail-act:hover { color: var(--txt); border-color: var(--accent); }
  .mail-act:disabled { opacity: .6; cursor: default; }
  .mail-full { white-space: pre-wrap; background: rgba(255,255,255,.04); border-left: 2px solid var(--accent); padding: 7px 10px; margin-top: 5px; border-radius: 0 6px 6px 0; font-size: 11.5px; color: var(--txt2); line-height: 1.55; max-height: 240px; overflow: auto; }
  /* 邮件摘要的就地反馈（未配置/无新邮件/失败），不再静默关窗 */
  .status { flex: none; display: none; align-items: center; gap: 8px; font-size: 11.5px; padding: 7px 10px; border-radius: 8px; line-height: 1.5; }
  .status.show { display: flex; }
  .status.info { color: var(--txt2); background: var(--composer-bg); border: .5px solid var(--composer-border); }
  .status.err  { color: var(--diff-del); background: var(--diff-del-bg); border: .5px solid var(--diff-del); }
  .status-text { flex: 1; min-width: 0; }
  .status-act { flex: none; border: .5px solid currentColor; background: transparent; color: inherit; font-size: 11px; padding: 2px 9px; border-radius: 7px; cursor: pointer; opacity: .9; }
  .status-act:hover { opacity: 1; }
</style>
</head>
<body>
<div class="glass">
  <span class="hl"></span>
  <div class="panel">
    <div class="hd">
      <span class="ttl">📋 待办事项</span>
      <button id="clr" class="hbtn nodrag" title="清除已完成">清除已完成</button>
      <button id="x" class="hbtn nodrag" title="关闭"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </div>
    <div id="body" class="body nodrag"></div>
    <div id="status" class="status"></div>
    <div class="ft nodrag">
      <span id="count" class="ft-count"></span>
      <button id="email-btn" class="btn-ghost" title="立即拉取邮件摘要">📧 邮件摘要</button>
    </div>
  </div>
</div>
<script>
  window.BocomHermes.onTheme((t) => { document.documentElement.dataset.theme = t })
  document.getElementById('x').addEventListener('click', () => window.BocomHermes.closeSelf())

  const bodyEl = document.getElementById('body')
  const countEl = document.getElementById('count')

  const URG_ORDER = { '高': 0, '中': 1, '低': 2, '': 3 }

  async function render() {
    const list = await window.BocomHermes.todoList()
    bodyEl.innerHTML = ''
    if (!list.length) { bodyEl.innerHTML = '<div class="empty">暂无待办，邮件摘要后自动生成</div>'; countEl.textContent = ''; return }

    const pending = list.filter(t => !t.done).sort((a, b) => (URG_ORDER[a.urgency] ?? 3) - (URG_ORDER[b.urgency] ?? 3))
    const done    = list.filter(t => t.done)
    countEl.textContent = `${pending.length} 项待处理 · ${done.length} 项已完成`

    function makeTodo(t) {
      const d = document.createElement('div'); d.className = 'todo' + (t.done ? ' done' : '')
      const cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = t.done
      cb.addEventListener('change', async () => { await window.BocomHermes.todoToggle(t.id); render() })
      const body = document.createElement('div'); body.className = 'todo-body'
      const urg = t.urgency ? `<span class="urg urg-${t.urgency}">${t.urgency}</span>` : ''
      body.innerHTML = `<div class="todo-text">${urg}${escHtml(t.text)}</div>`
      if (t.from || t.source) {
        const meta = document.createElement('div'); meta.className = 'todo-meta'
        const parts = []
        if (t.from) parts.push('来自：' + t.from)
        if (t.source === 'email') parts.push('📧 邮件')
        if (t.mailSubject) parts.push('「' + t.mailSubject.slice(0, 40) + (t.mailSubject.length > 40 ? '…' : '') + '」')
        if (t.mailDate) parts.push(t.mailDate.slice(0, 16))
        meta.textContent = parts.join(' · ')
        body.appendChild(meta)
        // 有 mailBody → 点 meta 展开原邮件正文
        if (t.mailBody) {
          meta.style.cursor = 'pointer'
          meta.title = '点击展开原邮件正文'
          const det = document.createElement('div')
          det.className = 'mail-body'
          det.style.cssText = 'display:none;white-space:pre-wrap;background:rgba(255,255,255,.04);border-left:2px solid var(--accent);padding:7px 10px;margin-top:5px;border-radius:0 6px 6px 0;font-size:11.5px;color:var(--txt2);line-height:1.55;max-height:200px;overflow:auto'
          det.textContent = t.mailBody
          body.appendChild(det)
          meta.addEventListener('click', () => { det.style.display = det.style.display === 'none' ? 'block' : 'none' })
        }
      }
      // 邮件待办：看原邮件 / 起草回复（闭环 —— 从"知道"到"处理"）
      if (t.mailMsgId) {
        const acts = document.createElement('div'); acts.className = 'mail-acts'
        const bView = document.createElement('button'); bView.className = 'mail-act'; bView.textContent = '📄 原邮件'
        const bWeb = document.createElement('button'); bWeb.className = 'mail-act'; bWeb.textContent = '🌐 网页视图'
        const bReply = document.createElement('button'); bReply.className = 'mail-act'; bReply.textContent = '✉️ 起草回复'
        bWeb.addEventListener('click', () => { try { window.BocomHermes.openMailView(t.mailMsgId) } catch (e) {} })
        let full = null
        bView.addEventListener('click', async () => {
          if (full) { full.style.display = full.style.display === 'none' ? 'block' : 'none'; return }
          bView.disabled = true; const o = bView.textContent; bView.textContent = '加载中…'
          const r = await window.BocomHermes.mailGetFull(t.mailMsgId)
          bView.disabled = false; bView.textContent = o
          full = document.createElement('div'); full.className = 'mail-full'
          full.textContent = (r && r.ok) ? (r.from + ' · ' + (r.date || '') + '\n主题：' + (r.subject || '') + '\n\n' + (r.text || '')) : ('✗ ' + ((r && r.error) || '加载失败'))
          body.appendChild(full)
        })
        bReply.addEventListener('click', async () => {
          bReply.disabled = true; bReply.textContent = '打开中…'
          const r = await window.BocomHermes.mailReplyCard(t.mailMsgId)
          if (r && r.ok) window.BocomHermes.closeSelf()
          else { bReply.disabled = false; bReply.textContent = '✉️ 起草回复'; const e = document.createElement('div'); e.className = 'mail-full'; e.textContent = '✗ ' + ((r && r.error) || '打开失败'); body.appendChild(e) }
        })
        acts.append(bView, bWeb, bReply); body.appendChild(acts)
      }
      const del = document.createElement('button'); del.className = 'del-btn'; del.title = '删除'; del.textContent = '×'
      del.addEventListener('click', async () => { await window.BocomHermes.todoDelete(t.id); render() })
      d.append(cb, body, del)
      return d
    }

    if (pending.length) {
      const lbl = document.createElement('div'); lbl.className = 'section-label'; lbl.textContent = '待处理'
      bodyEl.appendChild(lbl)
      pending.forEach(t => bodyEl.appendChild(makeTodo(t)))
    }
    if (done.length) {
      const lbl = document.createElement('div'); lbl.className = 'section-label'; lbl.textContent = '已完成'
      bodyEl.appendChild(lbl)
      done.forEach(t => bodyEl.appendChild(makeTodo(t)))
    }
  }

  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

  document.getElementById('clr').addEventListener('click', async () => { await window.BocomHermes.todoClearDone(); render() })

  const statusEl = document.getElementById('status')
  function showStatus(text, kind, action) {
    statusEl.className = 'status show ' + (kind || 'info')
    statusEl.innerHTML = ''
    const t = document.createElement('span'); t.className = 'status-text'; t.textContent = text; statusEl.appendChild(t)
    if (action) { const b = document.createElement('button'); b.className = 'status-act'; b.textContent = action.label; b.addEventListener('click', action.onClick); statusEl.appendChild(b) }
  }
  function hideStatus() { statusEl.className = 'status' }

  const emailBtn = document.getElementById('email-btn')
  emailBtn.addEventListener('click', async () => {
    hideStatus()
    emailBtn.disabled = true; const orig = emailBtn.textContent; emailBtn.textContent = '拉取中…'
    let r
    try { r = await window.BocomHermes.triggerEmailSummary() } catch (e) { r = { ok: false, reason: 'error', message: String((e && e.message) || e) } }
    emailBtn.disabled = false; emailBtn.textContent = orig
    if (r && r.ok) { window.BocomHermes.closeSelf(); return }   // 成功 → 摘要卡已弹出,关掉待办窗
    const msg = (r && r.message) || '拉取失败'
    if (r && r.reason === 'unconfigured') {
      showStatus(msg, 'info', { label: '去设置', onClick: () => { try { window.BocomHermes.openSettings() } catch {} } })
    } else {
      showStatus(msg, r && r.reason === 'empty' ? 'info' : 'err')
    }
  })

  // 监听待办更新广播（邮件卡保存新待办时刷新）
  window.BocomHermes.onTodosUpdated(() => render())

  render()
</script>
</body>
</html>
