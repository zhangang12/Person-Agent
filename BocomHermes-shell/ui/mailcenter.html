<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>邮件中心 · BocomHermes</title>
<script>try { document.documentElement.dataset.theme = window.BocomHermes.getTheme() || 'light' } catch (e) { document.documentElement.dataset.theme = 'light' }</script>
<script>(function(){try{var p=new URLSearchParams(location.search),d=document.documentElement.style;['gox','goy','gfx','gfy'].forEach(function(k){var v=p.get(k);if(v)d.setProperty('--'+k,v)})}catch(e){}})()</script>
<link rel="stylesheet" href="glass.css" />
<style>
  .mc { display: flex; flex-direction: column; height: 100%; padding: 11px 13px 12px; gap: 10px; }
  .hd { display: flex; align-items: center; gap: 9px; flex: none; }
  .hd .ttl { font-size: 14px; font-weight: 600; flex: none; }
  .tabs { display: flex; background: var(--composer-bg); border: 1px solid var(--composer-border); border-radius: 9px; padding: 2px; gap: 2px; }
  .tabs button { border: none; background: transparent; color: var(--txt2); font-size: 12px; padding: 5px 13px; border-radius: 7px; cursor: pointer; font-family: var(--font); }
  .tabs button.on { background: var(--brand); color: var(--send-fg); font-weight: 600; }
  .sp { flex: 1; }
  .hbtn { border: none; background: transparent; color: var(--txt3); cursor: pointer; padding: 4px; border-radius: 7px; display: flex; }
  .hbtn:hover { color: var(--txt); background: var(--composer-bg); }
  .tbtn { font-size: 11.5px; color: var(--txt2); background: var(--composer-bg); border: .5px solid var(--composer-border); border-radius: 8px; padding: 5px 11px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; font-family: var(--font); }
  .tbtn:hover { color: var(--txt); border-color: var(--accent); }
  .tbtn.primary { background: var(--brand); color: var(--send-fg); border-color: transparent; font-weight: 600; }
  [hidden] { display: none !important; }

  /* ── 收件箱视图：左列表 + 右阅读 ── */
  #viewInbox { display: flex; flex: 1; min-height: 0; gap: 10px; }
  .col-list { width: 300px; flex: none; display: flex; flex-direction: column; border: .5px solid var(--composer-border); border-radius: 11px; overflow: hidden; }
  .lbar { display: flex; align-items: center; gap: 6px; padding: 7px 9px; border-bottom: .5px solid var(--composer-border); }
  .lbar input { flex: 1; min-width: 0; border: none; outline: none; background: transparent; color: var(--txt); font-size: 12px; }
  .lbar input::placeholder { color: var(--txt3); }
  .lbar .chip { flex: none; font-size: 10.5px; color: var(--txt2); background: var(--composer-bg); border: .5px solid var(--composer-border); border-radius: 999px; padding: 3px 9px; cursor: pointer; }
  .lbar .chip.on { color: var(--send-fg); background: var(--brand); border-color: transparent; }
  .lbar .ic { flex: none; border: none; background: transparent; color: var(--txt3); cursor: pointer; padding: 2px; display: flex; }
  .lbar .ic:hover { color: var(--txt); }
  #mlist { flex: 1; overflow-y: auto; }
  #mlist::-webkit-scrollbar { width: 6px; } #mlist::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 3px; }
  .mrow { display: flex; gap: 8px; align-items: flex-start; padding: 8px 10px; border-bottom: .5px solid var(--composer-border); cursor: pointer; border-left: 2px solid transparent; }
  .mrow:hover { background: var(--composer-bg); }
  .mrow.on { background: var(--composer-bg); border-left-color: var(--accent); }
  .mrow.sel { background: var(--me-bg); }
  .mrow .msel { margin-top: 2px; flex: none; accent-color: var(--brand); cursor: pointer; width: 14px; height: 14px; }
  .mrow .mbody { flex: 1; min-width: 0; }
  .selbar { display: none; align-items: center; gap: 8px; padding: 6px 9px; border-bottom: .5px solid var(--composer-border); background: var(--me-bg); font-size: 11.5px; color: var(--me-txt); }
  .selbar.on { display: flex; }
  .selbar .lnk { color: var(--accent); cursor: pointer; }
  .mrow .r1 { display: flex; align-items: baseline; gap: 8px; }
  .mrow .from { flex: 1; min-width: 0; font-size: 12px; font-weight: 600; color: var(--txt); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mrow .date { flex: none; font-size: 10px; color: var(--txt3); }
  .mrow .subj { font-size: 11.5px; color: var(--txt2); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mrow .att { color: var(--accent); font-size: 10px; }

  .col-read { flex: 1; min-width: 0; display: flex; flex-direction: column; border: .5px solid var(--composer-border); border-radius: 11px; overflow: hidden; }
  .rhead { flex: none; padding: 10px 12px; border-bottom: .5px solid var(--composer-border); }
  .rsubj { font-size: 13.5px; font-weight: 600; color: var(--txt); }
  .rmeta { font-size: 11px; color: var(--txt3); margin-top: 3px; }
  .racts { display: flex; gap: 6px; margin-top: 9px; flex-wrap: wrap; }
  .rscroll { flex: 1; overflow-y: auto; padding: 11px 12px; }
  .rscroll::-webkit-scrollbar { width: 6px; } .rscroll::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 3px; }
  .rbody { font-size: 12.5px; color: var(--txt); line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .aiPanel { margin-top: 12px; border: .5px solid var(--composer-border); border-radius: 10px; overflow: hidden; }
  .aiHd { display: flex; align-items: center; gap: 7px; padding: 7px 11px; background: var(--composer-bg); font-size: 11.5px; color: var(--txt2); border-bottom: .5px solid var(--composer-border); }
  .aiHd .gp { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  .aiBody { padding: 9px 11px; font-size: 12.5px; color: var(--txt); line-height: 1.55; overflow-wrap: anywhere; }
  .empty { margin: auto; text-align: center; color: var(--txt3); font-size: 12.5px; line-height: 1.7; padding: 24px; }
  .empty .big { font-size: 30px; opacity: .5; }
  .spin { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--composer-border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: -1px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* markdown(复用 card 的极简一套) */
  .aiBody h1,.aiBody h2,.aiBody h3 { font-size: 13px; font-weight: 600; margin: 8px 0 4px; }
  .aiBody p { margin: 5px 0; } .aiBody ul,.aiBody ol { margin: 5px 0; padding-left: 18px; } .aiBody li { margin: 2px 0; }
  .aiBody code { font-family: var(--mono); font-size: 12px; background: var(--composer-bg); padding: 1px 5px; border-radius: 4px; }
  .aiBody pre.code { background: var(--composer-bg); border: .5px solid var(--composer-border); border-radius: 8px; padding: 9px 11px; overflow-x: auto; margin: 7px 0; }
  .aiBody pre.code code { background: none; padding: 0; }
  .rblk { margin: 8px 0; background: var(--composer-bg); border: .5px solid var(--composer-border); border-radius: 10px; overflow: hidden; }
  .rbhd { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 5px 8px; border-bottom: .5px solid var(--composer-border); }
  .rfile { font-size: 11px; color: var(--accent); font-family: var(--mono); }
  .racts2 { display: flex; gap: 6px; } .rbtn-primary { font-size: 11px; font-weight: 600; color: var(--send-fg); background: var(--brand); border: none; border-radius: 7px; padding: 3px 11px; cursor: pointer; } .rbtn-ghost { font-size: 11px; color: var(--txt2); background: transparent; border: .5px solid var(--composer-border); border-radius: 7px; padding: 3px 9px; cursor: pointer; } .rbtn-primary.done,.rbtn-ghost.done { color: var(--green); }
  .rbody2 { margin: 0; padding: 8px 10px; overflow-x: auto; } .rbody2 code { font-family: var(--mono); font-size: 12px; white-space: pre; }
  .todo-blk { display: flex; align-items: center; gap: 8px; background: var(--composer-bg); border: .5px solid var(--composer-border); border-radius: 10px; padding: 7px 10px; margin: 4px 0; flex-wrap: wrap; }

  /* ── 发件箱 / 设置 复用 ── */
  .panel { flex: 1; min-height: 0; overflow-y: auto; padding-right: 2px; }
  .panel::-webkit-scrollbar { width: 6px; } .panel::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 3px; }
  .fld { display: flex; flex-direction: column; gap: 6px; margin-bottom: 15px; }
  .lbl { font-size: 12px; font-weight: 600; color: var(--txt); }
  .hint { font-size: 11px; color: var(--txt3); line-height: 1.45; }
  .in { width: 100%; background: var(--composer-bg); border: 1px solid var(--composer-border); border-radius: 9px; padding: 7px 10px; color: var(--txt); font-size: 12.5px; font-family: var(--mono); outline: none; }
  .in:focus { border-color: var(--accent); }
  .in:disabled { opacity: .6; }
  .row { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
  .ck { display: flex; align-items: center; gap: 5px; font-size: 12px; cursor: pointer; } .ck input { accent-color: var(--brand); }
  .chip2 { font-size: 11px; color: var(--txt2); background: var(--composer-bg); border: 1px solid var(--composer-border); border-radius: 999px; padding: 4px 11px; cursor: pointer; }
  .warn { display: none; font-size: 11px; color: var(--warn-txt); background: var(--warn-bg); border: .5px solid var(--warn-border); border-radius: 8px; padding: 7px 10px; margin-bottom: 12px; line-height: 1.5; }
  .ft { flex: none; display: flex; align-items: center; gap: 9px; padding-top: 4px; } .ft .msg { flex: 1; font-size: 11.5px; color: var(--green); }
  .btn-primary { font-size: 12.5px; font-weight: 600; color: var(--send-fg); background: var(--brand); border: none; border-radius: 9px; padding: 7px 18px; cursor: pointer; }
  .obrow { display: flex; align-items: center; gap: 9px; padding: 9px 11px; border: .5px solid var(--composer-border); border-radius: 10px; margin-bottom: 7px; }
  .obrow .info { flex: 1; min-width: 0; } .obrow .t1 { font-size: 12px; color: var(--txt); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; } .obrow .t2 { font-size: 10.5px; color: var(--txt3); margin-top: 2px; }

  /* ── 待办 ── */
  .todos-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
  .section-label { font-size: 10.5px; font-weight: 600; color: var(--txt3); letter-spacing: .04em; padding: 6px 2px 3px; }
  .todo { display: flex; align-items: flex-start; gap: 8px; background: var(--composer-bg); border: .5px solid var(--composer-border); border-radius: 10px; padding: 8px 10px; margin-bottom: 6px; }
  .todo.done { opacity: .5; }
  .todo input[type=checkbox] { margin-top: 2px; flex: none; accent-color: var(--brand); cursor: pointer; width: 15px; height: 15px; }
  .todo-body { flex: 1; min-width: 0; }
  .todo-text { font-size: 12.5px; line-height: 1.45; color: var(--txt); }
  .todo.done .todo-text { text-decoration: line-through; color: var(--txt3); }
  .todo-meta { font-size: 11px; color: var(--txt3); margin-top: 3px; }
  .urg { display: inline-block; font-size: 10px; font-weight: 600; padding: 0 6px; border-radius: 999px; margin-right: 5px; border: 1px solid; }
  .urg-高 { color: var(--diff-del); border-color: var(--diff-del); background: var(--diff-del-bg); }
  .urg-中 { color: var(--warn-txt); border-color: var(--warn-border); background: var(--warn-bg); }
  .urg-低 { color: var(--txt3); border-color: var(--composer-border); background: transparent; }
  .del-btn { border: none; background: transparent; color: var(--txt3); cursor: pointer; padding: 2px 4px; border-radius: 5px; font-size: 13px; line-height: 1; flex: none; opacity: 0; transition: opacity .12s; }
  .todo:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: var(--diff-del); background: var(--diff-del-bg); }
  .mail-acts { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .mail-act { border: .5px solid var(--composer-border); background: var(--composer-bg); color: var(--txt2); font-size: 11px; padding: 3px 9px; border-radius: 7px; cursor: pointer; }
  .mail-act:hover { color: var(--txt); border-color: var(--accent); }
  .mail-act:disabled { opacity: .6; cursor: default; }
  .mail-full { white-space: pre-wrap; background: var(--composer-bg); border-left: 2px solid var(--accent); padding: 7px 10px; margin-top: 5px; border-radius: 0 6px 6px 0; font-size: 11.5px; color: var(--txt2); line-height: 1.55; max-height: 240px; overflow: auto; }
</style>
</head>
<body>
<div class="glass">
  <span class="hl"></span>
  <div class="mc">
    <div class="hd">
      <span class="ttl">📧 邮件中心</span>
      <div class="tabs nodrag">
        <button id="tabInbox" class="on">收件箱</button>
        <button id="tabOutbox">发件箱</button>
        <button id="tabTodos">待办</button>
        <button id="tabSettings">设置</button>
      </div>
      <span class="sp"></span>
      <button id="btnSummary" class="tbtn primary nodrag" title="让 AI 整理今天的邮件">✨ 今日摘要</button>
      <button id="x" class="hbtn nodrag" title="关闭"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </div>

    <!-- ── 收件箱 ── -->
    <div id="viewInbox" class="nodrag">
      <div class="col-list">
        <div class="lbar">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--txt3);flex:none"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
          <input id="search" placeholder="搜索发件人/主题" spellcheck="false" />
          <button id="chipUnread" class="chip">仅未读</button>
          <button id="btnRefresh" class="ic" title="刷新"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.5 15a9 9 0 1 1-2.4-9.2L23 10"/></svg></button>
        </div>
        <div id="selbar" class="selbar">
          <span id="selCount">已选 0</span>
          <span class="sp" style="flex:1"></span>
          <span id="selAll" class="lnk">全选</span>
          <span id="selClear" class="lnk">清空</span>
        </div>
        <div id="mlist"><div class="empty">加载中… <span class="spin"></span></div></div>
      </div>
      <div class="col-read">
        <div id="reader" style="display:flex;flex-direction:column;flex:1;min-height:0">
          <div class="empty" id="readEmpty"><div class="big">✉️</div>从左侧选一封邮件阅读<br>读信、AI 摘要、起草回复都在这里完成</div>
        </div>
      </div>
    </div>

    <!-- ── 发件箱 ── -->
    <div id="viewOutbox" class="panel nodrag" hidden>
      <div id="oblist"><div class="empty">发件箱为空</div></div>
    </div>

    <!-- ── 待办 ── -->
    <div id="viewTodos" class="panel nodrag" hidden>
      <div class="todos-hd"><span id="tcount" class="hint"></span><span class="sp"></span><button id="tclr" class="chip2">清除已完成</button></div>
      <div id="tlist"><div class="empty">加载中… <span class="spin"></span></div></div>
    </div>

    <!-- ── 设置 ── -->
    <div id="viewSettings" class="panel nodrag" hidden>
      <div class="warn" id="encWarn">⚠️ 系统密钥库不可用，邮箱密码将以明文落盘。请仅在受信任的本机使用。</div>
      <div class="fld">
        <span class="lbl">收件 IMAP <span class="hint" style="font-weight:400">(收件箱 / 晨间摘要 / agent 读邮件)</span></span>
        <div class="row"><input id="imapHost" class="in" style="flex:3" placeholder="imap.company.com" spellcheck="false" /><input id="imapPort" class="in" style="width:64px;flex:none" placeholder="993" spellcheck="false" /></div>
        <div class="row" style="gap:12px"><label class="ck"><input type="checkbox" id="imapSecure" /> TLS</label><label class="ck"><input type="checkbox" id="imapSelf" /> 允许自签证书</label></div>
        <input id="imapUser" class="in" placeholder="用户名 / 邮箱" spellcheck="false" autocomplete="username" />
        <input id="imapPass" class="in" type="password" placeholder="密码（加密存储，留空=不修改）" autocomplete="current-password" />
        <div class="row" style="align-items:center;gap:8px"><span class="hint" style="flex:none">晨间提醒时间</span><input id="imapHour" class="in" style="width:52px;flex:none" placeholder="9" /><span class="hint">时（工作日）</span></div>
        <div class="row" style="align-items:center;gap:8px"><span class="hint" style="flex:none">Sent 文件夹</span><input id="imapSentFolder" class="in" style="flex:1" placeholder="Sent" spellcheck="false" /><span class="hint" style="flex:none">归档</span><input id="imapArchiveFolder" class="in" style="flex:1" placeholder="Archive" spellcheck="false" /></div>
        <label class="ck" style="margin-top:2px"><input type="checkbox" id="imapIdle" /> 实时新邮件提醒(IMAP IDLE)<span class="hint" style="font-weight:400">— 到达即通知，点击进邮件中心</span></label>
        <div class="row"><button id="testImap" class="chip2">测试 IMAP</button><span id="imapMsg" class="hint" style="color:var(--green)"></span></div>
      </div>
      <div class="fld">
        <span class="lbl">发件 SMTP <span class="hint" style="font-weight:400">(agent 调 mail_send/mail_reply — 你让它发它才发)</span></span>
        <div class="row"><input id="smtpHost" class="in" style="flex:3" placeholder="smtp.company.com" spellcheck="false" /><input id="smtpPort" class="in" style="width:64px;flex:none" placeholder="587" spellcheck="false" /></div>
        <div class="row" style="gap:12px"><label class="ck"><input type="checkbox" id="smtpSecure" /> implicit TLS (465)</label><label class="ck"><input type="checkbox" id="smtpSelf" /> 允许自签</label><label class="ck"><input type="checkbox" id="smtpSameAsImap" /> 同 IMAP</label></div>
        <input id="smtpUser" class="in" placeholder="发件用户名 (同 IMAP 时可空)" spellcheck="false" autocomplete="username" />
        <input id="smtpPass" class="in" type="password" placeholder="密码 (留空=不修改 / 用 IMAP 密码)" autocomplete="current-password" />
        <input id="smtpFrom" class="in" placeholder="From 显示地址 (留空=用上面用户名)" spellcheck="false" />
        <div class="row"><button id="testSmtp" class="chip2">测试 SMTP (发到自己)</button><span id="smtpMsg" class="hint" style="color:var(--green)"></span></div>
        <div class="row" style="align-items:center;gap:8px;margin-top:6px"><span style="font-size:12px;color:var(--txt2)">发送延迟(软撤回)</span><input id="outboxHold" class="in" style="width:60px;flex:none" placeholder="15" /><span style="font-size:12px;color:var(--txt2)">秒</span></div>
        <span class="hint">Agent 发信先进发件箱，延迟内可撤销/立即发。设 0 = 立即发。</span>
      </div>
      <div class="ft"><span class="msg" id="saveMsg"></span><button id="save" class="btn-primary">保存</button></div>
    </div>
  </div>
</div>
<script src="rich.js"></script>
<script>
  const H = window.BocomHermes
  const $ = (id) => document.getElementById(id)
  H.onTheme && H.onTheme((t) => { document.documentElement.dataset.theme = t })
  const esc = (s) => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
  const fromName = (raw) => { const s = String(raw || ''); const m = s.match(/^\s*"?([^"<]+?)"?\s*</); return (m ? m[1] : s).trim() || s }
  function fmtDate(d) { const t = Date.parse(d); if (isNaN(t)) return String(d || '').slice(0, 16); const dt = new Date(t), now = new Date(), pad = (n) => String(n).padStart(2, '0'); return dt.toDateString() === now.toDateString() ? `${pad(dt.getHours())}:${pad(dt.getMinutes())}` : `${dt.getMonth() + 1}/${dt.getDate()} ${pad(dt.getHours())}:${pad(dt.getMinutes())}` }

  $('x').addEventListener('click', () => H.closeSelf())
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') H.closeSelf() })

  // ── Tab ──
  function showTab(which) {
    $('viewInbox').hidden = which !== 'inbox'
    $('viewOutbox').hidden = which !== 'outbox'
    $('viewTodos').hidden = which !== 'todos'
    $('viewSettings').hidden = which !== 'settings'
    $('btnSummary').style.display = which === 'inbox' ? '' : 'none'
    $('tabInbox').classList.toggle('on', which === 'inbox')
    $('tabOutbox').classList.toggle('on', which === 'outbox')
    $('tabTodos').classList.toggle('on', which === 'todos')
    $('tabSettings').classList.toggle('on', which === 'settings')
    if (which === 'inbox' && !inboxLoaded) loadInbox()
    if (which === 'outbox') loadOutbox()
    if (which === 'todos') loadTodos()
  }
  $('tabInbox').addEventListener('click', () => showTab('inbox'))
  $('tabOutbox').addEventListener('click', () => showTab('outbox'))
  $('tabTodos').addEventListener('click', () => showTab('todos'))
  $('tabSettings').addEventListener('click', () => showTab('settings'))

  // ── 收件箱列表（默认拉最近 30 天全部邮件，支持多选后批量 AI 摘要）──
  let inboxLoaded = false, onlyUnread = false, loading = false, emails = [], curMsgId = null
  const selected = new Set()   // 多选的 messageId
  async function loadInbox() {
    if (loading) return
    loading = true; inboxLoaded = true
    $('mlist').innerHTML = '<div class="empty">加载中… <span class="spin"></span></div>'
    try {
      const r = await H.mailList({ onlyUnseen: onlyUnread, days: onlyUnread ? 7 : 30, limit: 60 })
      if (!r || r.ok === false) throw new Error((r && r.error) || '拉取失败')
      emails = r.emails || []
      renderList(); updateSelBar()
    } catch (err) {
      $('mlist').innerHTML = '<div class="empty">✗ ' + esc((err && err.message) || '拉取失败') + '<br><a id="goCfg" style="color:var(--accent);cursor:pointer">去设置检查 IMAP</a></div>'
      const g = $('goCfg'); if (g) g.addEventListener('click', () => showTab('settings'))
    } finally { loading = false }
  }
  function visibleEmails() {
    const q = $('search').value.trim().toLowerCase()
    return emails.filter((e) => !q || (e.from + ' ' + e.subject).toLowerCase().includes(q))
  }
  function renderList() {
    const list = visibleEmails()
    if (!list.length) { $('mlist').innerHTML = '<div class="empty">' + (onlyUnread ? '没有未读邮件 📭' : '近 30 天没有邮件 📭') + '</div>'; return }
    $('mlist').innerHTML = list.map((e) => {
      const att = (e.attachments || 0) > 0 ? ' <span class="att">📎' + e.attachments + '</span>' : ''
      const mid = esc(e.messageId)
      const on = selected.has(e.messageId)
      return '<div class="mrow' + (e.messageId === curMsgId ? ' on' : '') + (on ? ' sel' : '') + '" data-mid="' + mid + '">'
        + '<input type="checkbox" class="msel" data-mid="' + mid + '"' + (on ? ' checked' : '') + ' title="选中用于批量摘要">'
        + '<div class="mbody"><div class="r1"><span class="from">' + esc(fromName(e.from)) + '</span><span class="date">' + esc(fmtDate(e.date)) + '</span></div>'
        + '<div class="subj">' + esc(e.subject || '(无主题)') + att + '</div></div></div>'
    }).join('')
  }
  function updateSelBar() {
    const n = selected.size
    $('selbar').classList.toggle('on', n > 0)
    $('selCount').textContent = '已选 ' + n
    const b = $('btnSummary')
    if (n > 0) { b.textContent = '✨ 摘要选中 (' + n + ')'; b.title = '对选中的 ' + n + ' 封邮件做 AI 摘要分析' }
    else { b.textContent = '✨ 今日摘要'; b.title = '让 AI 整理最近的邮件' }
  }
  $('mlist').addEventListener('click', (e) => {
    const cb = e.target.closest('.msel')
    if (cb) {   // 勾选用于批量摘要，不打开邮件
      const mid = cb.dataset.mid
      if (cb.checked) selected.add(mid); else selected.delete(mid)
      const row = cb.closest('.mrow'); if (row) row.classList.toggle('sel', cb.checked)
      updateSelBar(); return
    }
    const row = e.target.closest('.mrow'); if (row) openEmail(row.dataset.mid)
  })
  $('selAll').addEventListener('click', () => { visibleEmails().forEach((e) => selected.add(e.messageId)); renderList(); updateSelBar() })
  $('selClear').addEventListener('click', () => { selected.clear(); renderList(); updateSelBar() })
  $('btnRefresh').addEventListener('click', () => loadInbox())
  $('search').addEventListener('input', renderList)
  $('chipUnread').addEventListener('click', () => { onlyUnread = !onlyUnread; $('chipUnread').classList.toggle('on', onlyUnread); loadInbox() })

  // ── 读信(内联) ──
  let curEmail = null
  async function openEmail(mid) {
    curMsgId = mid; renderList()
    const reader = $('reader')
    reader.innerHTML = '<div class="empty">打开中… <span class="spin"></span></div>'
    try {
      const r = await H.mailViewData(mid)
      if (!r || r.ok === false) throw new Error((r && r.error) || '读取失败')
      curEmail = { messageId: mid, from: r.from, subject: r.subject, date: r.date, text: r.text || '' }
      reader.innerHTML =
        '<div class="rhead">'
        + '<div class="rsubj">' + esc(r.subject || '(无主题)') + '</div>'
        + '<div class="rmeta">' + esc(r.from) + ' · ' + esc(fmtDate(r.date)) + '</div>'
        + '<div class="racts">'
        + '<button class="tbtn primary" id="aReply">✉️ AI 起草回复</button>'
        + '<button class="tbtn" id="aSum">✨ 摘要这封</button>'
        + '<button class="tbtn" id="aArchive">📥 归档</button>'
        + '<button class="tbtn" id="aRead">✓ 标记已读</button>'
        + '</div></div>'
        + '<div class="rscroll"><div class="rbody">' + esc(r.text || '(无正文)') + '</div><div id="aiSlot"></div></div>'
      $('aReply').addEventListener('click', () => runReply())
      $('aSum').addEventListener('click', () => runSummarizeOne())
      $('aArchive').addEventListener('click', (ev) => doArchive(ev.target))
      $('aRead').addEventListener('click', (ev) => doMarkRead(ev.target))
    } catch (err) {
      reader.innerHTML = '<div class="empty">✗ ' + esc((err && err.message) || '读取失败') + '</div>'
    }
  }
  async function doArchive(btn) {
    btn.disabled = true; btn.textContent = '归档中…'
    try { await H.mailArchive(curMsgId); btn.textContent = '已归档 ✓'; emails = emails.filter((e) => e.messageId !== curMsgId); renderList() }
    catch (e) { btn.disabled = false; btn.textContent = '📥 归档'; }
  }
  async function doMarkRead(btn) {
    btn.disabled = true; btn.textContent = '标记中…'
    try { await H.mailMarkRead(curMsgId); btn.textContent = '已读 ✓'; if (onlyUnread) { emails = emails.filter((e) => e.messageId !== curMsgId); renderList() } }
    catch (e) { btn.disabled = false; btn.textContent = '✓ 标记已读' }
  }

  // ── 内联 AI（复用 card↔opencode 流式管线 + rich.js）──
  let aiBusy = false, curAiBody = null, aiParts = null
  H.onStream(({ kind, text, partID }) => {
    if (!curAiBody || kind === 'reasoning') return
    aiParts.set(partID || '_', text)
    curAiBody.innerHTML = window.Rich.renderMarkdown(Array.from(aiParts.values()).join('\n'))
    curAiBody.scrollIntoView({ block: 'nearest' })
  })
  function aiPanel(slot, label) {
    const p = document.createElement('div'); p.className = 'aiPanel'
    p.innerHTML = '<div class="aiHd"><span class="gp"></span>' + label + ' <span class="spin" id="aiSpin"></span></div><div class="aiBody" id="aiBody">思考中…</div>'
    slot.innerHTML = ''; slot.appendChild(p)
    return p.querySelector('.aiBody')
  }
  function wireRich(root) {
    window.Rich.wireActions(root, {
      open: (file, line) => H.openLoc(file, line),
      todo: async ({ urgency, from, text }, btn) => {
        const o = btn.textContent; btn.disabled = true; btn.textContent = '保存中…'
        try { const ok = await H.todoAdd({ urgency, from, text, source: 'email' }); btn.textContent = ok ? '已加入 ✓' : '已存在'; btn.classList.add('done'); H.notifyTodosUpdated() }
        catch { btn.textContent = o; btn.disabled = false }
      },
      apply: async ({ raw }, btn) => {
        const o = btn.innerHTML; btn.textContent = '应用中…'; btn.disabled = true
        try { const rs = await H.applyDiff(raw); const bad = rs.filter((x) => !x.ok); btn.textContent = bad.length ? '部分失败' : '已写入 ✓'; if (!bad.length) btn.classList.add('done') }
        catch (e) { btn.innerHTML = o; btn.disabled = false }
      },
      run: () => {},
    })
  }
  async function runAI(prompt, label, slotId) {
    if (aiBusy) return
    aiBusy = true; try { H.reportBusy(true) } catch {}
    const slot = $(slotId) || $('aiSlot')
    const body = aiPanel(slot, label)
    curAiBody = body; aiParts = new Map()
    try { await H.cardReinit() } catch {}
    try {
      const reply = await H.cardSend(prompt)
      if (reply) body.innerHTML = window.Rich.renderMarkdown(reply)
      else if (!body.textContent.trim() || body.textContent === '思考中…') body.textContent = '(无文本输出)'
      wireRich(slot)
    } catch (e) { body.textContent = '⚠ ' + ((e && e.message) || e) }
    finally { curAiBody = null; aiBusy = false; try { H.reportBusy(false) } catch {}; const sp = document.getElementById('aiSpin'); if (sp) sp.remove() }
  }
  function runSummarizeOne() {
    if (!curEmail) return
    runAI('请用中文简洁摘要这封邮件(2-4 句话讲清核心)，再列出需要我跟进的事项(若有，用 TODO: 开头)。\n\n发件人：' + curEmail.from + '\n主题：' + curEmail.subject + '\n时间：' + curEmail.date + '\n正文：\n' + curEmail.text.slice(0, 6000), '✨ 摘要这封', 'aiSlot')
  }
  function runReply() {
    if (!curEmail) return
    runAI('请帮我起草这封邮件的回复，中文、礼貌专业、简洁。**先给草稿让我确认，我说"发"之前不要真的发送。**\n\n原邮件：\n发件人：' + curEmail.from + '\n主题：' + curEmail.subject + '\n正文：\n' + curEmail.text.slice(0, 6000), '✉️ 起草回复', 'aiSlot')
  }

  // ── 今日摘要(批量，渲染进右侧阅读区) ──
  async function runDailySummary() {
    if (aiBusy) return
    curMsgId = null; renderList()
    const reader = $('reader')
    reader.innerHTML = '<div class="rhead"><div class="rsubj">✨ 今日邮件摘要</div><div class="rmeta">' + new Date().toLocaleDateString('zh-CN') + '</div></div><div class="rscroll"><div id="aiSlot"></div></div>'
    let list = []
    try {
      const r = await H.mailList({ onlyUnseen: false, days: 2, limit: 30 })
      list = (r && r.emails) || []
    } catch (e) {}
    if (!list.length) { $('aiSlot').innerHTML = '<div class="empty">近 2 天没有邮件</div>'; return }
    const lines = list.map((e, i) => (i + 1) + '. ' + fromName(e.from) + ' · ' + (e.subject || '(无主题)') + '\n   ' + (e.preview || '')).join('\n')
    const prompt = '下面是我最近的邮件列表(共 ' + list.length + ' 封)。请用中文：\n1. 整体摘要今天的邮件重点；\n2. 逐条用一句话点出每封的核心；\n3. 提取需要我跟进的事项，每条用 `TODO: [高/中/低] 具体事项` 格式输出。\n\n' + lines
    runAI(prompt, '✨ 今日摘要', 'aiSlot')
  }
  // ── 摘要"选中的"邮件(人工多选 → AI 批量摘要分析) ──
  function summarizeSelected() {
    if (aiBusy) return
    const picked = emails.filter((e) => selected.has(e.messageId))
    if (!picked.length) return runDailySummary()
    curMsgId = null; renderList()
    const reader = $('reader')
    reader.innerHTML = '<div class="rhead"><div class="rsubj">✨ 选中邮件摘要（' + picked.length + ' 封）</div><div class="rmeta">' + new Date().toLocaleString('zh-CN') + '</div></div><div class="rscroll"><div id="aiSlot"></div></div>'
    const lines = picked.map((e, i) => (i + 1) + '. ' + fromName(e.from) + ' · ' + (e.subject || '(无主题)') + ' · ' + fmtDate(e.date) + '\n   ' + (e.preview || '')).join('\n')
    const prompt = '下面是我挑选的 ' + picked.length + ' 封邮件。请用中文：\n1. 先做整体摘要，点出这批邮件的共同主题/重点；\n2. 逐封用一句话点出核心；\n3. 提取需要我跟进的事项，每条用 `TODO: [高/中/低] 具体事项` 格式输出。\n\n' + lines
    runAI(prompt, '✨ 选中邮件摘要', 'aiSlot')
  }
  $('btnSummary').addEventListener('click', () => { showTab('inbox'); if (selected.size > 0) summarizeSelected(); else runDailySummary() })

  // ── 发件箱 ──
  async function loadOutbox() {
    let items = []
    try { items = await H.outboxList() } catch (e) {}
    const el = $('oblist')
    if (!items || !items.length) { el.innerHTML = '<div class="empty">发件箱为空 📭<br>Agent 发信会先进这里，延迟内可撤销</div>'; return }
    el.innerHTML = items.map((it) => {
      const to = (it.msg && (it.msg.to || []).join(', ')) || ''
      const subj = (it.msg && it.msg.subject) || '(无主题)'
      const st = it.status === 'pending' ? ('待发 · ' + (it.secondsLeft != null ? it.secondsLeft + 's 后' : '')) : it.status
      return '<div class="obrow"><div class="info"><div class="t1">' + esc(subj) + '</div><div class="t2">→ ' + esc(to) + ' · ' + esc(st) + '</div></div>'
        + (it.status === 'pending' ? '<button class="chip2" data-now="' + esc(it.id) + '">立即发</button><button class="chip2" data-cancel="' + esc(it.id) + '">撤销</button>' : '') + '</div>'
    }).join('')
  }
  $('oblist').addEventListener('click', async (e) => {
    const now = e.target.closest('[data-now]'), cancel = e.target.closest('[data-cancel]')
    if (now) { try { await H.outboxSendNow(now.dataset.now) } catch (x) {} loadOutbox() }
    if (cancel) { try { await H.outboxCancel(cancel.dataset.cancel) } catch (x) {} loadOutbox() }
  })
  H.onOutboxUpdated && H.onOutboxUpdated(() => { if (!$('viewOutbox').hidden) loadOutbox() })

  // ── 待办(从独立窗口归并进邮件中心)──
  const URG_ORDER = { '高': 0, '中': 1, '低': 2, '': 3 }
  async function loadTodos() {
    let list = []
    try { list = await H.todoList() } catch (e) {}
    const el = $('tlist')
    if (!list || !list.length) { el.innerHTML = '<div class="empty">暂无待办 📭<br>读信时点「记为待办」，或邮件摘要后自动生成</div>'; $('tcount').textContent = ''; return }
    const pending = list.filter((t) => !t.done).sort((a, b) => (URG_ORDER[a.urgency] ?? 3) - (URG_ORDER[b.urgency] ?? 3))
    const done = list.filter((t) => t.done)
    $('tcount').textContent = `${pending.length} 项待处理 · ${done.length} 项已完成`
    el.innerHTML = ''
    if (pending.length) { const l = document.createElement('div'); l.className = 'section-label'; l.textContent = '待处理'; el.appendChild(l); pending.forEach((t) => el.appendChild(makeTodo(t))) }
    if (done.length) { const l = document.createElement('div'); l.className = 'section-label'; l.textContent = '已完成'; el.appendChild(l); done.forEach((t) => el.appendChild(makeTodo(t))) }
  }
  function makeTodo(t) {
    const d = document.createElement('div'); d.className = 'todo' + (t.done ? ' done' : '')
    const cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = t.done
    cb.addEventListener('change', async () => { await H.todoToggle(t.id); loadTodos() })
    const body = document.createElement('div'); body.className = 'todo-body'
    const urg = t.urgency ? `<span class="urg urg-${t.urgency}">${t.urgency}</span>` : ''
    body.innerHTML = `<div class="todo-text">${urg}${esc(t.text)}</div>`
    if (t.from || t.source) {
      const meta = document.createElement('div'); meta.className = 'todo-meta'
      const parts = []
      if (t.from) parts.push('来自：' + t.from)
      if (t.source === 'email') parts.push('📧 邮件')
      if (t.mailSubject) parts.push('「' + t.mailSubject.slice(0, 40) + (t.mailSubject.length > 40 ? '…' : '') + '」')
      if (t.mailDate) parts.push(t.mailDate.slice(0, 16))
      meta.textContent = parts.join(' · ')
      body.appendChild(meta)
      if (t.mailBody) {
        meta.style.cursor = 'pointer'; meta.title = '点击展开原邮件正文'
        const det = document.createElement('div'); det.className = 'mail-full'; det.style.display = 'none'; det.textContent = t.mailBody
        body.appendChild(det)
        meta.addEventListener('click', () => { det.style.display = det.style.display === 'none' ? 'block' : 'none' })
      }
    }
    if (t.mailMsgId) {
      const acts = document.createElement('div'); acts.className = 'mail-acts'
      const bView = document.createElement('button'); bView.className = 'mail-act'; bView.textContent = '📄 原邮件'
      const bWeb = document.createElement('button'); bWeb.className = 'mail-act'; bWeb.textContent = '🌐 网页视图'
      const bReply = document.createElement('button'); bReply.className = 'mail-act'; bReply.textContent = '✉️ 起草回复'
      bWeb.addEventListener('click', () => { try { H.openMailView(t.mailMsgId) } catch (e) {} })
      let full = null
      bView.addEventListener('click', async () => {
        if (full) { full.style.display = full.style.display === 'none' ? 'block' : 'none'; return }
        bView.disabled = true; const o = bView.textContent; bView.textContent = '加载中…'
        const r = await H.mailGetFull(t.mailMsgId)
        bView.disabled = false; bView.textContent = o
        full = document.createElement('div'); full.className = 'mail-full'
        full.textContent = (r && r.ok) ? (r.from + ' · ' + (r.date || '') + '\n主题：' + (r.subject || '') + '\n\n' + (r.text || '')) : ('✗ ' + ((r && r.error) || '加载失败'))
        body.appendChild(full)
      })
      bReply.addEventListener('click', async () => {
        bReply.disabled = true; const o = bReply.textContent; bReply.textContent = '打开中…'
        const r = await H.mailReplyCard(t.mailMsgId)
        bReply.disabled = false; bReply.textContent = o
        if (!(r && r.ok)) { const e = document.createElement('div'); e.className = 'mail-full'; e.textContent = '✗ ' + ((r && r.error) || '打开失败'); body.appendChild(e) }
      })
      acts.append(bView, bWeb, bReply); body.appendChild(acts)
    }
    const del = document.createElement('button'); del.className = 'del-btn'; del.title = '删除'; del.textContent = '×'
    del.addEventListener('click', async () => { await H.todoDelete(t.id); loadTodos() })
    d.append(cb, body, del)
    return d
  }
  $('tclr').addEventListener('click', async () => { await H.todoClearDone(); loadTodos() })
  H.onTodosUpdated && H.onTodosUpdated(() => { if (!$('viewTodos').hidden) loadTodos() })

  // ── 设置(读写沿用全局口径) ──
  const cur = (function () { try { return H.getSettings() || {} } catch (e) { return {} } })()
  try { $('encWarn').style.display = (cur.encryptionAvailable === false) ? 'block' : 'none' } catch (e) {}
  const im = cur.imap || {}
  $('imapHost').value = im.host || ''; $('imapPort').value = im.port || 993
  $('imapSecure').checked = im.secure !== false; $('imapSelf').checked = !!im.allowSelf
  $('imapUser').value = im.user || ''; $('imapPass').placeholder = im.hasPass ? '密码已保存（留空=不修改）' : '密码（加密存储）'
  $('imapHour').value = im.scheduleHour ?? 9; $('imapIdle').checked = cur.imapIdleEnabled !== false
  $('imapSentFolder').value = im.sentFolder || 'Sent'; $('imapArchiveFolder').value = im.archiveFolder || 'Archive'
  const sm = cur.smtp || {}
  $('smtpHost').value = sm.host || ''; $('smtpPort').value = sm.port || 587
  $('smtpSecure').checked = !!sm.secure; $('smtpSelf').checked = !!sm.allowSelf; $('smtpSameAsImap').checked = sm.sameAsImap !== false
  $('smtpUser').value = sm.user || ''; $('smtpPass').placeholder = sm.hasPass ? '密码已保存（留空=不修改）' : '密码（留空=用 IMAP 密码）'
  $('smtpFrom').value = sm.from || ''; $('outboxHold').value = (cur.outboxHoldSeconds == null ? 15 : cur.outboxHoldSeconds)
  function syncSame() { const on = $('smtpSameAsImap').checked;['smtpUser', 'smtpPass'].forEach((k) => { $(k).disabled = on; $(k).style.opacity = on ? .55 : 1 }) }
  syncSame(); $('smtpSameAsImap').addEventListener('change', syncSame)
  async function save(silent) {
    const patch = {}
    patch.imap = { host: $('imapHost').value.trim(), port: $('imapPort').value.trim(), secure: $('imapSecure').checked, allowSelf: $('imapSelf').checked, user: $('imapUser').value.trim(), pass: $('imapPass').value, scheduleHour: $('imapHour').value.trim(), sentFolder: $('imapSentFolder').value.trim() || 'Sent', archiveFolder: $('imapArchiveFolder').value.trim() || 'Archive' }
    patch.smtp = { host: $('smtpHost').value.trim(), port: $('smtpPort').value.trim(), secure: $('smtpSecure').checked, allowSelf: $('smtpSelf').checked, sameAsImap: $('smtpSameAsImap').checked, user: $('smtpUser').value.trim(), pass: $('smtpPass').value, from: $('smtpFrom').value.trim() }
    { const v = $('outboxHold').value.trim(); if (v !== '') patch.outboxHoldSeconds = parseInt(v) || 0 }
    patch.imapIdleEnabled = $('imapIdle').checked
    try { await H.setSettings(patch); if (!silent) { const m = $('saveMsg'); m.style.color = 'var(--green)'; m.textContent = '已保存 ✓'; setTimeout(() => { m.textContent = '' }, 1800) } }
    catch (e) { const m = $('saveMsg'); m.style.color = 'var(--diff-del)'; m.textContent = '保存失败' }
  }
  $('save').addEventListener('click', () => save(false))
  $('testImap').addEventListener('click', async () => { const m = $('imapMsg'); m.style.color = 'var(--txt3)'; m.textContent = '连接中…'; await save(true); try { const r = await H.emailTest(); m.style.color = 'var(--green)'; m.textContent = `✓ 连通，${r.count} 封未读` } catch (e) { m.style.color = 'var(--diff-del)'; m.textContent = '✗ ' + (e.message || '连接失败') } })
  $('testSmtp').addEventListener('click', async () => { const m = $('smtpMsg'); m.style.color = 'var(--txt3)'; m.textContent = '发送中…'; await save(true); try { const r = await H.smtpTest(); if (r && r.ok) { m.style.color = 'var(--green)'; m.textContent = '✓ 已发送到 ' + r.to } else { m.style.color = 'var(--diff-del)'; m.textContent = '✗ ' + ((r && r.error) || '发送失败') } } catch (e) { m.style.color = 'var(--diff-del)'; m.textContent = '✗ ' + (e.message || '发送失败') } })

  // 启动：建立 AI 会话 + 默认进收件箱
  H.cardInit({ title: '邮件助手' }).catch(() => {})
  const initTab = new URLSearchParams(location.search).get('tab')
  showTab(['settings', 'outbox', 'todos'].includes(initTab) ? initTab : 'inbox')
  if (initTab === 'summary') { showTab('inbox'); setTimeout(runDailySummary, 200) }
</script>
  <script src="carddrag.js"></script>
</body>
</html>
