<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>BocomHermes · 浏览器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0c16; --bg2:#0f1120; --line:rgba(255,255,255,.08);
  --txt:rgba(255,255,255,.88); --txt2:rgba(255,255,255,.55); --txt3:rgba(255,255,255,.32);
  --accent:#4aa8ff; --accent-dim:rgba(74,168,255,.15);
  --err:#ff6b6b; --warn:#ffb340; --ok:#3ddc84; --purple:#9d7bff;
}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  user-select:none;display:flex;flex-direction:column;color:var(--txt)}

svg{fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── 标签栏 ── */
#tabbar{
  height:38px;flex:none;display:flex;align-items:flex-end;gap:2px;
  padding:0 8px;background:var(--bg);border-bottom:1px solid var(--line);
  -webkit-app-region:drag;
}
.mac #tabbar{padding-left:78px}
/* Windows: 系统三键(titleBarOverlay)在右上角，约 138px，留出来 */
.win #tabbar{padding-right:148px}
.tab{
  -webkit-app-region:no-drag;
  display:flex;align-items:center;gap:7px;
  height:30px;min-width:120px;max-width:220px;padding:0 8px 0 12px;
  background:transparent;border-radius:9px 9px 0 0;
  font-size:12.5px;color:var(--txt2);cursor:pointer;position:relative;
  transition:background .12s,color .12s;
}
.tab:hover{background:rgba(255,255,255,.045);color:var(--txt)}
.tab.active{background:var(--bg2);color:var(--txt)}
.tab.active::after{content:'';position:absolute;left:8px;right:8px;bottom:0;height:2px;background:var(--accent);border-radius:2px}
.tab .fav{width:14px;height:14px;flex:none;border-radius:3px;background-size:cover;background-position:center;opacity:.9}
.tab .fav.blank{background:rgba(255,255,255,.1)}
.tab .spin{width:13px;height:13px;flex:none;border:1.6px solid rgba(255,255,255,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tab .tt{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tab .cl{width:17px;height:17px;flex:none;border-radius:5px;display:flex;align-items:center;justify-content:center;color:var(--txt3);opacity:0;transition:opacity .12s,background .12s}
.tab:hover .cl,.tab.active .cl{opacity:1}
.tab .cl:hover{background:rgba(255,255,255,.12);color:var(--txt)}
.tab .cl svg{width:10px;height:10px;stroke-width:2.4}
#newtab{
  -webkit-app-region:no-drag;
  width:28px;height:28px;flex:none;margin-bottom:1px;
  border-radius:7px;background:transparent;border:none;color:var(--txt3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s;
}
#newtab:hover{background:rgba(255,255,255,.08);color:var(--txt)}
#newtab svg{width:15px;height:15px}

/* ── 工具栏 ── */
#toolbar{
  height:44px;flex:none;display:flex;align-items:center;gap:7px;
  padding:0 11px;background:var(--bg2);border-bottom:1px solid var(--line);
}
.nb{width:30px;height:30px;flex:none;border:none;border-radius:8px;background:transparent;
  color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s}
.nb:hover:not(:disabled){background:rgba(255,255,255,.08);color:var(--txt)}
.nb:disabled{opacity:.25;cursor:default}
.nb svg{width:15px;height:15px}

.urlwrap{flex:1;min-width:0;height:32px;background:rgba(255,255,255,.05);
  border:1px solid var(--line);border-radius:9px;display:flex;align-items:center;
  padding:0 11px;gap:7px;transition:border-color .15s,background .15s}
.urlwrap:focus-within{border-color:var(--accent);background:rgba(255,255,255,.07)}
.lock{flex:none;color:var(--txt3);display:flex}.lock svg{width:12px;height:12px}
#url{flex:1;min-width:0;border:none;outline:none;background:transparent;color:var(--txt);
  font-size:13px;font-family:-apple-system,'SF Mono',monospace}
#url::placeholder{color:var(--txt3)}

.seg{display:flex;flex:none;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:8px;overflow:hidden;height:30px}
.seg button{border:none;background:transparent;color:var(--txt2);cursor:pointer;font-size:12px;padding:0 9px;display:flex;align-items:center;gap:4px;transition:background .12s,color .12s}
.seg button:hover{background:rgba(255,255,255,.06);color:var(--txt)}
.seg button.on{background:var(--accent-dim);color:var(--accent)}
.seg button svg{width:13px;height:13px}
.seg .div{width:1px;background:var(--line)}

.zoom{display:flex;flex:none;align-items:center;gap:1px}
.zoom .zv{font-size:11px;color:var(--txt2);min-width:38px;text-align:center;cursor:pointer;font-variant-numeric:tabular-nums}
.zoom .zv:hover{color:var(--txt)}

.tb{flex:none;height:30px;padding:0 11px;border:1px solid var(--line);border-radius:8px;position:relative;
  background:rgba(255,255,255,.04);color:var(--txt2);font-size:12px;cursor:pointer;
  display:flex;align-items:center;gap:5px;transition:background .12s,color .12s,border-color .12s}
.tb:hover{background:rgba(255,255,255,.08);color:var(--txt)}
.tb svg{width:13px;height:13px}
.tb.ico{padding:0 9px}
.tb.ai{background:linear-gradient(135deg,rgba(157,123,255,.2),rgba(74,168,255,.18));border-color:rgba(157,123,255,.35);color:#c9b6ff}
.tb.ai:hover{background:linear-gradient(135deg,rgba(157,123,255,.3),rgba(74,168,255,.26))}
#brec.on{background:rgba(255,80,80,.2);border-color:rgba(255,80,80,.55);color:#ff8b8b}
#brec.on #brecdot{display:inline;animation:recpulse 1.1s ease-in-out infinite;color:#ff5555;margin-right:3px}
@keyframes recpulse{0%,100%{opacity:.35}50%{opacity:1}}
.tb.on{background:var(--accent-dim);border-color:rgba(74,168,255,.3);color:var(--accent)}
.bdg{position:absolute;top:-5px;right:-5px;display:none;min-width:15px;height:15px;padding:0 4px;border-radius:8px;font-size:10px;font-weight:700;
  line-height:15px;text-align:center}
.bdg.e{background:rgba(255,80,80,.9);color:#fff}
.bdg.w{background:rgba(255,170,0,.9);color:#241500}
.bdg.i{background:rgba(74,168,255,.85);color:#04203f}
#bcl .bdg.e{right:9px}

/* ── 进度条 ── */
#prog{height:2px;flex:none;background:transparent;overflow:hidden;position:relative}
#prog.go::after{content:'';position:absolute;left:0;top:0;height:100%;width:40%;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  animation:prog 1.1s ease-in-out infinite}
@keyframes prog{0%{left:-40%}100%{left:100%}}

/* ── 中部（WebContentsView 覆盖区）── */
#mid{flex:1;position:relative;background:var(--bg)}

/* 查找条 */
#find{position:absolute;top:10px;right:18px;z-index:50;display:none;align-items:center;gap:6px;
  background:#1a1c2e;border:1px solid var(--line);border-radius:10px;padding:5px 7px 5px 11px;
  box-shadow:0 8px 28px rgba(0,0,0,.5)}
#find.show{display:flex}
#find input{border:none;outline:none;background:transparent;color:var(--txt);font-size:12.5px;width:160px}
#find .cnt{font-size:11px;color:var(--txt3);min-width:42px;text-align:center;font-variant-numeric:tabular-nums}
#find .fb{width:24px;height:24px;border:none;border-radius:6px;background:transparent;color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center}
#find .fb:hover{background:rgba(255,255,255,.1);color:var(--txt)}
#find .fb svg{width:12px;height:12px}

/* 元素拾取结果卡 */
#pickcard{position:absolute;top:12px;left:14px;z-index:55;width:312px;background:#10131f;border:1px solid var(--line);
  border-radius:12px;box-shadow:0 14px 44px rgba(0,0,0,.62);display:none;overflow:hidden}
#pickcard.show{display:block}
.pk-hd{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--line);font-size:12px;color:var(--txt2)}
.pk-hd .tag{color:var(--accent);font-family:'SF Mono',monospace;font-weight:600}
.pk-hd .x{margin-left:auto;width:20px;height:20px;border:none;background:transparent;color:var(--txt3);cursor:pointer;border-radius:5px;display:flex;align-items:center;justify-content:center}
.pk-hd .x:hover{background:rgba(255,255,255,.1);color:var(--txt)}.pk-hd .x svg{width:11px;height:11px}
.pk-sel{padding:9px 12px;font-family:'SF Mono',Menlo,monospace;font-size:11.5px;color:#cfe3ff;word-break:break-all;cursor:pointer;border-bottom:1px solid var(--line);background:rgba(74,168,255,.06)}
.pk-sel:hover{background:rgba(74,168,255,.12)}
.pk-grid{padding:9px 12px;display:flex;flex-wrap:wrap;gap:5px 14px;font-size:11px;color:var(--txt2)}
.pk-grid b{color:var(--txt);font-weight:600;font-variant-numeric:tabular-nums}
.pk-box{margin:2px 12px 10px;border:1px dashed rgba(255,170,64,.4);border-radius:6px;padding:6px;font-family:'SF Mono',monospace;font-size:10px;color:var(--warn);text-align:center}
.pk-box .inner{border:1px dashed rgba(61,220,132,.45);border-radius:4px;padding:5px;color:var(--ok);margin-top:3px}
.pk-box .core{border:1px solid rgba(74,168,255,.5);border-radius:3px;padding:5px;color:var(--accent);margin-top:3px;font-variant-numeric:tabular-nums}
.pk-act{display:flex;gap:6px;padding:9px 12px;border-top:1px solid var(--line)}

/* toast */
#toast{position:absolute;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);z-index:60;
  background:#1a1c2e;border:1px solid var(--line);border-radius:10px;padding:9px 16px;font-size:12.5px;color:var(--txt);
  box-shadow:0 8px 28px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;display:flex;align-items:center;gap:8px}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast .ok{color:var(--ok)}

/* ── 底部面板（控制台 / 网络）── */
#console{height:0;flex:none;overflow:hidden;display:flex;flex-direction:column;
  background:#080910;border-top:1px solid var(--line);transition:height .14s ease}
#console.open{height:248px}
#chdr{height:34px;flex:none;display:flex;align-items:center;gap:8px;padding:0 11px;
  border-bottom:1px solid var(--line)}
.dtabs{display:flex;gap:2px;flex:none}
.dtab{border:none;background:transparent;color:var(--txt3);font-size:12px;cursor:pointer;padding:4px 10px;border-radius:7px;
  display:flex;align-items:center;gap:6px;transition:background .12s,color .12s}
.dtab:hover{color:var(--txt2)}
.dtab.on{background:rgba(255,255,255,.08);color:var(--txt)}
.tbadge{min-width:16px;height:15px;padding:0 4px;border-radius:8px;font-size:10px;line-height:15px;text-align:center;
  background:rgba(255,255,255,.1);color:var(--txt2);font-variant-numeric:tabular-nums;display:none}
.tbadge.show{display:inline-block}
.dsep{width:1px;height:16px;background:var(--line);flex:none}
.cfilter,.nfilter{display:flex;gap:3px}
.cfilter button,.nfilter button{border:none;background:transparent;color:var(--txt3);font-size:11px;cursor:pointer;
  padding:3px 8px;border-radius:6px;display:flex;align-items:center;gap:4px;transition:background .12s,color .12s}
.cfilter button:hover,.nfilter button:hover{background:rgba(255,255,255,.06);color:var(--txt2)}
.cfilter button.on,.nfilter button.on{background:rgba(255,255,255,.08);color:var(--txt)}
.cfilter .dot{width:6px;height:6px;border-radius:50%}
.cfilter .dot.e{background:var(--err)}.cfilter .dot.w{background:var(--warn)}.cfilter .dot.l{background:var(--txt3)}
#nsearch{height:22px;width:150px;border:1px solid var(--line);border-radius:6px;background:rgba(255,255,255,.05);
  color:var(--txt);font-size:11px;padding:0 8px;outline:none}
#nsearch:focus{border-color:var(--accent)}
.preserve{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--txt3);cursor:pointer}
.preserve input{cursor:pointer}
.csp{flex:1}
.hb{border:none;background:rgba(255,255,255,.05);border-radius:6px;color:var(--txt3);font-size:11px;
  cursor:pointer;padding:3px 9px;transition:background .12s,color .12s}
.hb:hover{background:rgba(255,255,255,.1);color:var(--txt2)}

#cbody,#nbody{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
#nbody{position:relative}
#clist{flex:1;overflow-y:auto;padding:2px 0;font-family:'SF Mono',Menlo,monospace;font-size:11.5px}
#clist::-webkit-scrollbar,#nlist::-webkit-scrollbar,.nd-body::-webkit-scrollbar{width:8px}
#clist::-webkit-scrollbar-thumb,#nlist::-webkit-scrollbar-thumb,.nd-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
.ce{display:flex;align-items:baseline;gap:8px;padding:3px 12px;border-left:2px solid transparent;line-height:1.5}
.ce:hover{background:rgba(255,255,255,.025)}
.ce.l3{border-left-color:var(--err);color:#ff9b9b;background:rgba(255,80,80,.04)}
.ce.l2{border-left-color:var(--warn);color:#ffcf6b}
.ce.l1,.ce.l0{color:var(--txt2)}
.ce .ic{flex:none;width:12px;font-size:10px;opacity:.8}
.ce .ms{flex:1;min-width:0;word-break:break-all;white-space:pre-wrap}
.ce .sr{flex:none;color:var(--txt3);font-size:10px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cempty{color:var(--txt3);font-size:12px;text-align:center;padding:28px;font-family:-apple-system,sans-serif}

/* 控制台 REPL 输入 + 求值回显 */
#cevalrow{flex:none;display:flex;align-items:center;gap:7px;padding:5px 12px;border-top:1px solid var(--line);background:rgba(255,255,255,.02)}
.cevp{color:var(--accent);font-family:'SF Mono',monospace;font-weight:700;font-size:12px;flex:none}
#ceval{flex:1;min-width:0;border:none;outline:none;background:transparent;color:var(--txt);font-family:'SF Mono',Menlo,monospace;font-size:11.5px}
#ceval::placeholder{color:var(--txt3)}
.ce.evin{color:var(--accent)}.ce.evin .ic{color:var(--accent)}
.ce.evout{color:var(--txt)}.ce.evout .ic{color:var(--ok)}
.ce.everr{color:#ff9b9b;background:rgba(255,80,80,.05);border-left-color:var(--err)}.ce.everr .ic{color:var(--err)}

/* 网络列表 */
#nhead,.nrow{display:grid;grid-template-columns:62px 56px 1fr 88px 70px 62px;gap:8px;align-items:center}
#nhead{flex:none;padding:4px 12px;font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--line)}
#nhead .r{text-align:right}
#nlist{flex:1;overflow-y:auto;font-family:'SF Mono',Menlo,monospace;font-size:11.5px}
.nrow{padding:3px 12px;cursor:pointer;border-left:2px solid transparent}
.nrow:hover{background:rgba(255,255,255,.04)}
.nrow.sel{background:var(--accent-dim);border-left-color:var(--accent)}
.nrow .st{font-variant-numeric:tabular-nums}
.nrow .st.ok{color:var(--ok)}.nrow .st.redir{color:var(--txt2)}.nrow .st.err{color:var(--err)}.nrow .st.pend{color:var(--txt3)}
.nrow .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--txt)}
.nrow .mt,.nrow .ty{color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nrow .sz,.nrow .tm{color:var(--txt2);text-align:right;font-variant-numeric:tabular-nums}

/* 网络详情抽屉 */
#ndetail{position:absolute;top:0;right:0;bottom:0;width:56%;min-width:330px;background:#0c0e18;border-left:1px solid var(--line);
  transform:translateX(101%);transition:transform .16s ease;display:flex;flex-direction:column;z-index:10}
#ndetail.open{transform:none}
.nd-hd{display:flex;align-items:center;gap:8px;padding:8px 11px;border-bottom:1px solid var(--line)}
#ndtitle{flex:1;min-width:0;font-size:12px;font-family:'SF Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--txt)}
.nd-hd .x{width:22px;height:22px;border:none;background:transparent;color:var(--txt3);cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;flex:none}
.nd-hd .x:hover{background:rgba(255,255,255,.1);color:var(--txt)}.nd-hd .x svg{width:12px;height:12px}
.nd-tabs{display:flex;gap:2px;padding:6px 11px 0;flex:none}
.nd-tabs button{border:none;background:transparent;color:var(--txt3);font-size:11.5px;cursor:pointer;padding:4px 9px;border-radius:6px 6px 0 0}
.nd-tabs button:hover{color:var(--txt2)}
.nd-tabs button.on{background:rgba(255,255,255,.06);color:var(--txt)}
.nd-body{flex:1;overflow:auto;padding:9px 12px}
.nd-row{display:flex;gap:10px;padding:2px 0;font-size:11px;font-family:'SF Mono',monospace;align-items:baseline}
.nd-k{color:var(--txt3);flex:none;min-width:120px;max-width:160px;word-break:break-all}
.nd-v{color:var(--txt);flex:1;word-break:break-all}
.nd-sub{margin:10px 0 5px;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--txt3)}
.nd-pre{font-family:'SF Mono',monospace;font-size:11px;white-space:pre-wrap;word-break:break-all;color:var(--txt);line-height:1.55}
.nd-empty{color:var(--txt3);font-size:11.5px;padding:10px 0;font-family:-apple-system,sans-serif}
.nd-act{display:flex;gap:6px;padding:8px 11px;border-top:1px solid var(--line);flex:none}

/* ── 工作台模式（左 Agent 会话 + 右浏览器并排，整个 chrome 右移给 cardView 让位）── */
:root{--wsleftw:460px}
body.ws{padding-left:calc(var(--wsleftw) + 6px)}
body.ws #tabbar{padding-left:8px}
#wssplit{position:fixed;top:0;bottom:0;left:var(--wsleftw);width:6px;cursor:col-resize;background:var(--line);z-index:200;display:none}
body.ws #wssplit{display:block}
#wssplit:hover,body.wsdrag #wssplit{background:var(--accent)}
body.wsdrag{cursor:col-resize}
</style>
</head>
<body>
<div id="wssplit" title="拖动调整左右宽度"></div>
<div id="tabbar">
  <button id="newtab" title="新标签页 (⌘T)"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
</div>

<div id="toolbar">
  <button class="nb" id="bb" disabled title="后退 (⌘[)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
  <button class="nb" id="bf" disabled title="前进 (⌘])"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
  <button class="nb" id="br" title="刷新 (⌘R)"><svg id="brsvg" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.5 15a9 9 0 1 1-2.4-9.2L23 10"/></svg></button>

  <div class="urlwrap">
    <span class="lock" id="lock"><svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></span>
    <input id="url" placeholder="输入网址，回车访问  ·  http://localhost:5173" spellcheck="false" autocomplete="off" list="urlhist">
    <datalist id="urlhist"></datalist>
  </div>

  <div class="seg" id="devseg">
    <button data-dev="desktop" class="on" title="桌面"><svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="13" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></button>
    <div class="div"></div>
    <button data-dev="mobile" title="手机 390×844"><svg viewBox="0 0 24 24"><rect x="7" y="2" width="10" height="20" rx="2"/><line x1="11" y1="18" x2="13" y2="18"/></svg></button>
    <div class="div"></div>
    <button data-dev="tablet" title="平板 834×1112"><svg viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="11" y1="18" x2="13" y2="18"/></svg></button>
    <div class="div" id="rotdiv" style="display:none"></div>
    <button data-rot id="rotbtn" title="旋转" style="display:none"><svg viewBox="0 0 24 24"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg></button>
  </div>

  <div class="zoom">
    <button class="nb" id="zo" title="缩小 (⌘-)"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
    <span class="zv" id="zv" title="重置 (⌘0)">100%</span>
    <button class="nb" id="zi" title="放大 (⌘+)"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
  </div>

  <button class="tb ico" id="bpick" title="拾取元素（点选页面元素看选择器/尺寸/盒模型）"><svg viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><circle cx="12" cy="12" r="3.4"/></svg></button>
  <button class="tb ico" id="bshot" title="整页截图（含视口外内容，存到下载目录）"><svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></button>
  <button class="tb ico" id="bdt" title="开发者工具"><svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></button>
  <button class="tb ico" id="bnc" title="禁用缓存（每次导航前清一次缓存，调样式/JS 必开）"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="4.5" y1="4.5" x2="19.5" y2="19.5"/></svg></button>
  <button class="tb ico" id="bcl" title="控制台"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/></svg><span class="bdg e" id="eb"></span><span class="bdg w" id="wb"></span></button>
  <button class="tb ico" id="bnet" title="网络请求面板"><svg viewBox="0 0 24 24"><path d="M3 12h4l2.5 7 5-14 2.5 7H21"/></svg><span class="bdg i" id="nbb"></span></button>
  <button class="tb" id="brec" title="开始录制复现路径(click/input/key 全记下来,供 Agent 修完后自动回放验证)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/></svg><span id="brecdot" style="display:none">●</span><span id="brectxt">录制</span></button>
  <button class="tb ico" id="brecmgr" title="录制管理(列表/⭐/重命名/回放/删除)"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="3" rx="1"/><rect x="3" y="10.5" width="18" height="3" rx="1"/><rect x="3" y="17" width="18" height="3" rx="1"/></svg></button>
  <button class="tb" id="bverify" style="display:none" title="重载复现页，把修复后的状态交给 Agent 确认是否真的修好"><svg viewBox="0 0 24 24"><path d="M20.5 15a9 9 0 1 1-2.4-9.2L23 10"/><polyline points="23 4 23 10 17 10"/><polyline points="8.5 12.5 11 15 15.5 10"/></svg>验证</button>
  <button class="tb ai" id="bai" title="把当前页面报错 + DOM 交给 AI 分析"><svg viewBox="0 0 24 24"><path d="M12 2l2.4 5.6L20 9l-4 4 1 6-5-3-5 3 1-6-4-4 5.6-1.4z"/></svg>AI 分析</button>
</div>

<div id="prog"></div>

<div id="mid">
  <div id="find">
    <input id="findin" placeholder="在页面中查找" spellcheck="false">
    <span class="cnt" id="findcnt"></span>
    <button class="fb" id="findprev" title="上一个"><svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg></button>
    <button class="fb" id="findnext" title="下一个"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></button>
    <button class="fb" id="findx" title="关闭 (Esc)"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>

  <div id="pickcard">
    <div class="pk-hd"><span class="tag" id="pktag"></span><span id="pkmeta"></span><button class="x" id="pkx"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="pk-sel" id="pksel" title="点击复制选择器"></div>
    <div class="pk-grid" id="pkgrid"></div>
    <div class="pk-box" id="pkbox"></div>
    <div class="pk-act"><button class="hb" id="pkcopy">复制选择器</button><button class="hb" id="pkagain">再拾取</button></div>
  </div>

  <div id="toast"></div>
</div>

<div id="console">
  <div id="chdr">
    <div class="dtabs">
      <button class="dtab on" data-d="console">控制台 <span class="tbadge" id="ccount"></span></button>
      <button class="dtab" data-d="net">网络 <span class="tbadge" id="ncount"></span></button>
    </div>
    <div class="dsep"></div>
    <div class="cfilter" id="cfilter">
      <button data-f="all" class="on">全部</button>
      <button data-f="3"><span class="dot e"></span>错误</button>
      <button data-f="2"><span class="dot w"></span>警告</button>
      <button data-f="log"><span class="dot l"></span>日志</button>
    </div>
    <div class="nfilter" id="nfilter" style="display:none">
      <button data-nf="all" class="on">全部</button>
      <button data-nf="xhr">Fetch/XHR</button>
      <button data-nf="js">JS</button>
      <button data-nf="css">CSS</button>
      <button data-nf="img">图片</button>
      <button data-nf="doc">文档</button>
      <button data-nf="other">其他</button>
    </div>
    <input id="nsearch" placeholder="过滤 URL" spellcheck="false" style="display:none">
    <div class="csp"></div>
    <label class="preserve" id="preservewrap" style="display:none"><input type="checkbox" id="preserve">保留日志</label>
    <button class="hb" id="cclear">清除</button>
    <button class="hb" id="cclose">收起</button>
  </div>

  <div id="cbody">
    <div id="clist"><div class="cempty">控制台输出会显示在这里</div></div>
    <div id="cevalrow"><span class="cevp">›</span><input id="ceval" placeholder="在页面里执行 JS（Enter 运行 · ↑↓ 历史 · 支持 $ $$ $x copy / $el=已拾取元素）" spellcheck="false" autocomplete="off"></div>
  </div>

  <div id="nbody" style="display:none">
    <div id="nhead">
      <span>状态</span><span>方法</span><span>名称</span><span>类型</span><span class="r">大小</span><span class="r">耗时</span>
    </div>
    <div id="nlist"><div class="cempty">刷新页面后，网络请求会显示在这里</div></div>
    <div id="ndetail">
      <div class="nd-hd"><span id="ndtitle"></span><button class="x" id="ndx"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
      <div class="nd-tabs" id="ndtabs">
        <button data-t="general" class="on">概览</button>
        <button data-t="reqh">请求头</button>
        <button data-t="resh">响应头</button>
        <button data-t="body">响应</button>
      </div>
      <div class="nd-body" id="ndbody"></div>
      <div class="nd-act"><button class="hb" id="ndurl">复制 URL</button><button class="hb" id="ndcurl">复制 cURL</button></div>
    </div>
  </div>
</div>

<script>
const H = window.BocomHermes
const $ = id => document.getElementById(id)
if (navigator.platform.toLowerCase().includes('mac')) document.body.classList.add('mac')
else if (navigator.platform.toLowerCase().includes('win')) document.body.classList.add('win')

const RELOAD = '<polyline points="23 4 23 10 17 10"/><path d="M20.5 15a9 9 0 1 1-2.4-9.2L23 10"/>'
const STOP = '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>'
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')

let loading = false, conOpen = false, conFilter = 'all', findOpen = false, activeTabId = null, dockTab = 'console'

/* ── 标签栏渲染 ── */
H.onBrowserTabs(({ tabs, activeId }) => {
  activeTabId = activeId
  window._lastTabs = tabs   // Ctrl+Tab / Ctrl+1..9 / Ctrl+Shift+T 用
  const bar = $('tabbar')
  bar.querySelectorAll('.tab').forEach(e => e.remove())
  const addBtn = $('newtab')
  for (const t of tabs) {
    const el = document.createElement('div')
    el.className = 'tab' + (t.id === activeId ? ' active' : '')
    const fav = t.loading
      ? '<span class="spin"></span>'
      : (t.favicon ? `<span class="fav" style="background-image:url('${esc(t.favicon)}')"></span>` : '<span class="fav blank"></span>')
    el.innerHTML = `${fav}<span class="tt">${esc(t.title || '新标签页')}</span><span class="cl" title="关闭"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>`
    el.title = t.title || ''
    el.draggable = true
    el.dataset.tid = String(t.id)
    el.addEventListener('click', e => { if (e.target.closest('.cl')) return; H.browserActivateTab(t.id) })
    el.addEventListener('auxclick', e => { if (e.button === 1) { e.preventDefault(); H.browserCloseTab(t.id) } })   // 中键关闭
    el.querySelector('.cl').addEventListener('click', e => { e.stopPropagation(); H.browserCloseTab(t.id) })
    el.addEventListener('dragstart', e => { e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', String(t.id)); el.style.opacity = '.4' })
    el.addEventListener('dragend',   () => { el.style.opacity = '' })
    el.addEventListener('dragover',  e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move' })
    el.addEventListener('drop',      e => {
      e.preventDefault()
      const fromId = Number(e.dataTransfer.getData('text/plain')); if (!fromId || fromId === t.id) return
      const ids = Array.from(bar.querySelectorAll('.tab')).map(x => Number(x.dataset.tid))
      const fi = ids.indexOf(fromId); if (fi < 0) return
      ids.splice(fi, 1)
      const ti = ids.indexOf(t.id); ids.splice(ti < 0 ? ids.length : ti, 0, fromId)
      H.browserReorderTabs(ids)
    })
    bar.insertBefore(el, addBtn)
  }
})

/* ── 导航状态 ── */
H.onBrowserNav(({ url, canBack, canForward, loading: ld, zoom, device, errN, warnN }) => {
  if (document.activeElement !== $('url')) $('url').value = (url && url !== 'about:blank' && !url.endsWith('newtab.html')) ? url : ''
  $('bb').disabled = !canBack
  $('bf').disabled = !canForward
  loading = ld
  $('brsvg').innerHTML = ld ? STOP : RELOAD
  $('br').title = ld ? '停止' : '刷新 (⌘R)'
  $('prog').classList.toggle('go', ld)
  $('lock').style.color = (url || '').startsWith('https://') ? 'var(--ok)' : 'var(--txt3)'
  $('zv').textContent = (zoom || 100) + '%'
  document.querySelectorAll('#devseg button[data-dev]').forEach(b => b.classList.toggle('on', b.dataset.dev === (device || 'desktop')))
  const showRot = device && device !== 'desktop'
  $('rotbtn').style.display = showRot ? '' : 'none'
  $('rotdiv').style.display = showRot ? '' : 'none'
  setBadges(errN, warnN)
})

/* ── 控制台 ── */
let conEntries = []
function setBadges(e, w) {
  $('eb').textContent = e || ''; $('eb').style.display = e ? '' : 'none'
  $('wb').textContent = w || ''; $('wb').style.display = w ? '' : 'none'
  const cc = $('ccount'); cc.textContent = conEntries.length || ''; cc.classList.toggle('show', conEntries.length > 0)
}
function levelCls(l){ return 'l' + l }
function levelIcon(l){ return l === 3 ? '✕' : l === 2 ? '⚠' : l === 1 ? 'ℹ' : '›' }
function matchFilter(l){ if (conFilter==='all') return true; if (conFilter==='log') return l<2; return String(l)===conFilter }
function consoleVisible(c){ return c.kind ? true : matchFilter(c.level) }   // REPL 回显不受等级筛选影响
function ceLine(c){
  if (c.kind === 'evin')  return `<div class="ce evin"><span class="ic">›</span><span class="ms">${esc(c.message)}</span></div>`
  if (c.kind === 'evout') return `<div class="ce evout"><span class="ic">⮐</span><span class="ms">${esc(c.message)}</span></div>`
  if (c.kind === 'everr') return `<div class="ce everr"><span class="ic">⮐</span><span class="ms">${esc(c.message)}</span></div>`
  const sr = c.source ? esc(String(c.source).split('/').pop() + (c.line ? ':' + c.line : '')) : ''
  return `<div class="ce ${levelCls(c.level)}"><span class="ic">${levelIcon(c.level)}</span><span class="ms">${esc(c.message)}</span><span class="sr">${sr}</span></div>`
}
function renderConsole() {
  const list = $('clist')
  const vis = conEntries.filter(consoleVisible)
  if (!vis.length) { list.innerHTML = '<div class="cempty">' + (conEntries.length ? '当前筛选下无输出' : '控制台输出会显示在这里') + '</div>'; return }
  list.innerHTML = vis.map(ceLine).join('')
  list.scrollTop = list.scrollHeight
}
function appendConsole(c){
  conEntries.push(c)
  const cc = $('ccount'); cc.textContent = conEntries.length; cc.classList.add('show')
  if (conOpen && dockTab==='console' && consoleVisible(c)) {
    const list = $('clist'); const empty = list.querySelector('.cempty'); if (empty) list.innerHTML = ''
    const near = list.scrollTop + list.clientHeight > list.scrollHeight - 30
    list.insertAdjacentHTML('beforeend', ceLine(c))
    if (near || c.kind) list.scrollTop = list.scrollHeight
  }
}
H.onBrowserConsoleSnapshot(({ entries, errN, warnN }) => { conEntries = entries.slice(); if (dockTab==='console') renderConsole(); setBadges(errN, warnN) })
H.onBrowserConsoleAdd(entry => appendConsole(entry))
H.onBrowserBadge(({ errN, warnN }) => setBadges(errN, warnN))

$('cfilter').addEventListener('click', e => {
  const b = e.target.closest('button[data-f]'); if (!b) return
  conFilter = b.dataset.f
  document.querySelectorAll('#cfilter button').forEach(x => x.classList.toggle('on', x === b))
  renderConsole()
})

/* ── 网络面板 ── */
let netMap = new Map(), netOrder = [], nfilter = 'all', nsearch = '', netSel = null, netRAF = 0
function fmtSize(n){ if(!n) return '—'; if(n<1024) return n+' B'; if(n<1048576) return (n/1024).toFixed(1)+' KB'; return (n/1048576).toFixed(2)+' MB' }
function fmtMs(n){ if(!n) return '—'; if(n<1000) return Math.round(n)+' ms'; return (n/1000).toFixed(2)+' s' }
function nameOf(u){ try{ const x=new URL(u); const last=x.pathname.split('/').filter(Boolean).pop(); return (last||x.hostname)+(x.search||'') }catch{ return u } }
function netGroup(t){ t=(t||'').toLowerCase()
  if(t==='xhr'||t==='fetch') return 'xhr'
  if(t==='script') return 'js'
  if(t==='stylesheet') return 'css'
  if(t==='image'||t==='media'||t==='font') return 'img'
  if(t==='document') return 'doc'
  return 'other' }
function stClass(r){ if(r.state==='failed') return 'err'; if(r.state==='canceled') return 'pend'; if(!r.status) return 'pend'; if(r.status>=400) return 'err'; if(r.status>=300) return 'redir'; return 'ok' }
function stText(r){ if(r.state==='failed') return '失败'; if(r.state==='canceled') return '取消'; if(!r.status) return r.state==='pending'?'…':'—'; return String(r.status) }
function netMatch(r){ if(nfilter!=='all' && netGroup(r.type)!==nfilter) return false; if(nsearch && !r.url.toLowerCase().includes(nsearch)) return false; return true }
function updateNetCount(){
  const n = netOrder.length
  const nc = $('ncount'); nc.textContent = n || ''; nc.classList.toggle('show', n>0)
  const bb = $('nbb'); bb.textContent = n > 999 ? '999+' : (n||''); bb.style.display = n ? '' : 'none'
}
function renderNet(){
  const list = $('nlist')
  const rows = netOrder.map(id => netMap.get(id)).filter(r => r && netMatch(r))
  if(!rows.length){ list.innerHTML = '<div class="cempty">'+(netOrder.length?'当前筛选下无请求':'刷新页面后，网络请求会显示在这里')+'</div>'; return }
  const near = list.scrollTop + list.clientHeight > list.scrollHeight - 40
  list.innerHTML = rows.map(r => `<div class="nrow ${r.id===netSel?'sel':''}" data-id="${esc(r.id)}">`
    + `<span class="st ${stClass(r)}">${esc(stText(r))}</span>`
    + `<span class="mt">${esc(r.method)}</span>`
    + `<span class="nm" title="${esc(r.url)}">${esc(nameOf(r.url))}</span>`
    + `<span class="ty">${esc(r.type)}</span>`
    + `<span class="sz">${r.fromCache?'缓存':fmtSize(r.size)}</span>`
    + `<span class="tm">${fmtMs(r.ms)}</span></div>`).join('')
  if(near) list.scrollTop = list.scrollHeight
}
function scheduleNet(){ if(netRAF) return; netRAF = requestAnimationFrame(() => { netRAF = 0; if(conOpen && dockTab==='net') renderNet(); updateNetCount() }) }
H.onBrowserNetSnapshot(({ items }) => {
  netMap = new Map(); netOrder = []
  for(const r of items){ netMap.set(r.id, r); netOrder.push(r.id) }
  closeDetail()
  if(conOpen && dockTab==='net') renderNet()
  updateNetCount()
})
H.onBrowserNetAdd(({ kind, rec }) => {
  if(!netMap.has(rec.id)) netOrder.push(rec.id)
  netMap.set(rec.id, Object.assign(netMap.get(rec.id) || {}, rec))
  scheduleNet()
})
$('nfilter').addEventListener('click', e => {
  const b = e.target.closest('button[data-nf]'); if(!b) return
  nfilter = b.dataset.nf
  document.querySelectorAll('#nfilter button').forEach(x => x.classList.toggle('on', x===b))
  renderNet()
})
$('nsearch').addEventListener('input', e => { nsearch = e.target.value.trim().toLowerCase(); renderNet() })
$('preserve').addEventListener('change', e => H.browserNetPreserve(e.target.checked))
$('nlist').addEventListener('click', e => { const row = e.target.closest('.nrow'); if(row) openDetail(row.dataset.id) })

/* 网络详情抽屉 */
let curDetail = null, detailTab = 'general'
function kvRows(obj){ const ks = Object.keys(obj||{}); if(!ks.length) return '<div class="nd-empty">（无）</div>'
  return ks.map(k => `<div class="nd-row"><span class="nd-k">${esc(k)}</span><span class="nd-v">${esc(String(obj[k]))}</span></div>`).join('') }
function renderDetail(){
  const d = curDetail; if(!d) return; const body = $('ndbody')
  if(detailTab==='general'){
    const g = { '请求 URL': d.url, '方法': d.method, '状态': (d.status||'—') + (d.statusText?' '+d.statusText:'') + (d.state==='failed'?'（失败）':''),
      '类型': d.type, 'MIME': d.mime||'—', '远端 IP': d.remoteIP||'—', '大小': fmtSize(d.size), '耗时': fmtMs(d.ms) }
    body.innerHTML = kvRows(g)
  } else if(detailTab==='reqh'){
    body.innerHTML = kvRows(d.reqHeaders) + (d.postData ? '<div class="nd-sub">请求体</div><div class="nd-pre">'+esc(d.postData)+'</div>' : '')
  } else if(detailTab==='resh'){
    body.innerHTML = kvRows(d.respHeaders)
  } else {
    if(d.base64) body.innerHTML = '<div class="nd-empty">二进制响应（base64，'+fmtSize(d.size)+'），此处不预览</div>'
    else if(d.body==null) body.innerHTML = '<div class="nd-empty">（无响应体，或请求尚未完成）</div>'
    else body.innerHTML = '<div class="nd-pre">'+esc(d.body)+'</div>'
  }
  document.querySelectorAll('#ndtabs button').forEach(b => b.classList.toggle('on', b.dataset.t===detailTab))
}
async function openDetail(id){
  netSel = id; renderNet()
  const d = await H.browserNetGet(id); if(!d) return
  curDetail = d; detailTab = 'general'; $('ndtitle').textContent = nameOf(d.url)
  renderDetail(); $('ndetail').classList.add('open')
}
function closeDetail(){ $('ndetail').classList.remove('open'); if(netSel!=null){ netSel = null; if(conOpen && dockTab==='net') renderNet() } }
$('ndtabs').addEventListener('click', e => { const b = e.target.closest('button[data-t]'); if(!b) return; detailTab = b.dataset.t; renderDetail() })
$('ndx').addEventListener('click', closeDetail)
function curlOf(d){
  let s = "curl '" + d.url + "'"
  if(d.method && d.method!=='GET') s += ' -X ' + d.method
  for(const k in (d.reqHeaders||{})){ if(k.startsWith(':')) continue; s += " \\\n  -H '" + k + ': ' + String(d.reqHeaders[k]).replace(/'/g,"'\\''") + "'" }
  if(d.postData) s += " \\\n  --data-raw '" + String(d.postData).replace(/'/g,"'\\''") + "'"
  return s
}
$('ndurl').addEventListener('click', () => { if(curDetail){ H.browserCopy(curDetail.url); showToast('<span class="ok">✓</span> 已复制 URL') } })
$('ndcurl').addEventListener('click', () => { if(curDetail){ H.browserCopy(curlOf(curDetail)); showToast('<span class="ok">✓</span> 已复制 cURL 命令') } })

/* ── 底部面板开合 / 切换 ── */
function setDock(o){
  conOpen = o; $('console').classList.toggle('open', o); H.browserConsoleResize(o ? 248 : 0)
  $('bcl').classList.toggle('on', o && dockTab==='console')
  $('bnet').classList.toggle('on', o && dockTab==='net')
  if(o){ dockTab==='net' ? renderNet() : renderConsole() }
}
function switchDock(t){
  dockTab = t; const con = t==='console'
  $('cbody').style.display = con ? '' : 'none'
  $('nbody').style.display = con ? 'none' : ''
  $('cfilter').style.display = con ? '' : 'none'
  $('nfilter').style.display = con ? 'none' : ''
  $('nsearch').style.display = con ? 'none' : ''
  $('preservewrap').style.display = con ? 'none' : ''
  document.querySelectorAll('.dtab').forEach(b => b.classList.toggle('on', b.dataset.d===t))
  $('bcl').classList.toggle('on', conOpen && con)
  $('bnet').classList.toggle('on', conOpen && !con)
  if(conOpen){ con ? renderConsole() : renderNet() }
}
$('chdr').querySelector('.dtabs').addEventListener('click', e => { const b = e.target.closest('.dtab'); if(b) switchDock(b.dataset.d) })

/* ── 控制台 REPL：在页面里执行 JS ── */
const ceval = $('ceval'); let evalHist = [], evalIdx = 0
ceval.addEventListener('keydown', async e => {
  if (e.key === 'Enter') {
    const expr = ceval.value.trim(); if (!expr) return
    ceval.value = ''; evalHist.push(expr); evalIdx = evalHist.length
    appendConsole({ kind: 'evin', message: expr })
    try {
      const r = await H.browserEval(expr)
      if (r && r.isErr) appendConsole({ kind: 'everr', message: r.error || '(错误)' })
      else appendConsole({ kind: 'evout', message: (r && r.result != null) ? r.result : 'undefined' })
    } catch (err) { appendConsole({ kind: 'everr', message: String(err && err.message || err) }) }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault()
    if (evalIdx > 0) { evalIdx--; ceval.value = evalHist[evalIdx] || ''; requestAnimationFrame(() => ceval.setSelectionRange(ceval.value.length, ceval.value.length)) }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault()
    if (evalIdx < evalHist.length - 1) { evalIdx++; ceval.value = evalHist[evalIdx] || '' } else { evalIdx = evalHist.length; ceval.value = '' }
  }
})

/* ── 下载提示:开始/进度/完成,完成可点"在文件夹打开" ── */
const dlState = new Map()   // id → {el, total}
H.onBrowserDownload && H.onBrowserDownload(({ id, name, total, savePath, kind, received, state }) => {
  if (kind === 'start') {
    const el = document.createElement('div')
    el.style.cssText = 'display:flex;align-items:center;gap:8px;background:rgba(20,30,50,.92);border:1px solid var(--line);border-radius:9px;padding:7px 11px;color:var(--txt);font-size:12px;margin-top:6px;max-width:320px'
    el.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><polyline points="6 11 12 17 18 11"/><path d="M4 21h16"/></svg><span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</span><span class="pct" style="color:var(--txt2);font-family:monospace">…</span>`
    ;($('toaststack') || document.body).appendChild(el)
    dlState.set(id, { el, total, savePath, name })
  } else if (kind === 'progress') {
    const st = dlState.get(id); if (!st) return
    const pct = st.total ? Math.round((received / st.total) * 100) + '%' : Math.round(received / 1024) + ' KB'
    st.el.querySelector('.pct').textContent = pct
  } else if (kind === 'done' || kind === 'fail') {
    const st = dlState.get(id); if (!st) return
    if (kind === 'done') {
      st.el.querySelector('.pct').textContent = '✓'
      st.el.style.cursor = 'pointer'
      st.el.title = '点击在文件夹中显示\n' + st.savePath
      st.el.addEventListener('click', () => H.browserReveal(st.savePath))
    } else {
      st.el.querySelector('.pct').textContent = '✗ ' + (state || '失败')
      st.el.style.borderColor = 'var(--err)'
    }
    setTimeout(() => { try { st.el.remove() } catch {} ; dlState.delete(id) }, 8000)
  }
})

// 录制管理面板:抽屉式,从右滑入,列出所有录制 + 操作
async function openRecMgr() {
  const prev = document.getElementById('recmgr'); if (prev) { prev.remove(); return }
  const items = await H.browserRecList()
  const panel = document.createElement('div'); panel.id = 'recmgr'
  panel.style.cssText = 'position:fixed;top:0;right:0;bottom:0;width:480px;z-index:10000;background:rgba(13,15,28,.97);border-left:1px solid var(--accent);display:flex;flex-direction:column;box-shadow:-10px 0 40px rgba(0,0,0,.55);font-family:inherit'
  panel.innerHTML = `
    <div style="padding:12px 14px 9px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line)">
      <span style="font-weight:700;color:var(--txt);font-size:13.5px">📼 录制管理</span>
      <span style="flex:1;color:var(--txt3);font-size:11px">${items.length} 条;⭐ 收藏置顶</span>
      <button id="rm-folder" title="打开录制文件夹" style="background:transparent;border:1px solid var(--line);color:var(--txt2);border-radius:6px;padding:3px 9px;cursor:pointer;font-size:11px">系统</button>
      <button id="rm-x" style="background:transparent;border:none;color:var(--txt3);cursor:pointer;font-size:18px;line-height:1">×</button>
    </div>
    <div id="rm-list" style="flex:1;overflow:auto;padding:8px 10px"></div>`
  document.body.appendChild(panel)
  panel.querySelector('#rm-x').addEventListener('click', () => panel.remove())
  panel.querySelector('#rm-folder').addEventListener('click', () => H.browserOpenRecDir())
  const list = panel.querySelector('#rm-list')
  if (!items.length) { list.innerHTML = '<div style="color:var(--txt3);font-size:12px;padding:20px;text-align:center">还没有录制 — 在浏览器里点 ● 开始录制吧</div>'; return }
  const fmtMs = (ms) => ms < 60000 ? Math.round(ms / 1000) + 's' : Math.round(ms / 60000) + 'min'
  const fmtTime = (ts) => { const d = new Date(ts); return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) }
  const esc2 = (s) => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
  for (const it of items) {
    const row = document.createElement('div')
    row.style.cssText = 'background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-bottom:8px;display:flex;flex-direction:column;gap:5px'
    row.innerHTML = `
      <div style="display:flex;align-items:center;gap:6px">
        <button data-act="star" style="background:transparent;border:none;color:${it.starred ? '#ffd55a' : 'var(--txt3)'};cursor:pointer;font-size:14px;padding:0">${it.starred ? '⭐' : '☆'}</button>
        <input data-act="title" value="${esc2(it.title || it.id)}" style="flex:1;background:transparent;border:none;outline:none;color:var(--txt);font-size:12.5px;font-weight:600;font-family:inherit;padding:1px 0" />
        <span style="color:var(--txt3);font-size:10.5px;font-family:ui-monospace,Consolas,monospace">${fmtTime(it.mtime)}</span>
      </div>
      <div style="color:var(--txt3);font-size:10.5px;font-family:ui-monospace,Consolas,monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc2(it.startUrl) || '(无 URL)'}</div>
      ${it.expectation ? `<div style="color:var(--txt2);font-size:11px;background:rgba(74,168,255,.07);border-left:2px solid var(--accent);padding:4px 8px;border-radius:0 6px 6px 0">📝 ${esc2(it.expectation)}</div>` : ''}
      <div style="display:flex;align-items:center;gap:7px">
        <span style="color:var(--txt3);font-size:10.5px">${it.eventCount} 步 · ${fmtMs(it.durationMs)}</span>
        <span style="flex:1"></span>
        <button data-act="replay" style="background:rgba(26,168,110,.15);border:1px solid #1aa86e;color:#5dcf95;border-radius:6px;padding:3px 10px;cursor:pointer;font-size:11px">▶ 回放</button>
        <button data-act="del" style="background:transparent;border:1px solid var(--line);color:var(--txt3);border-radius:6px;padding:3px 8px;cursor:pointer;font-size:11px">删除</button>
      </div>`
    list.appendChild(row)
    // 收藏 toggle
    row.querySelector('[data-act="star"]').addEventListener('click', async () => {
      const nv = !it.starred; await H.browserRecUpdate(it.id, { starred: nv }); it.starred = nv
      row.querySelector('[data-act="star"]').textContent = nv ? '⭐' : '☆'
      row.querySelector('[data-act="star"]').style.color = nv ? '#ffd55a' : 'var(--txt3)'
    })
    // 标题改名 (blur 保存)
    row.querySelector('[data-act="title"]').addEventListener('blur', async (e) => {
      const nv = e.target.value.trim(); if (nv && nv !== (it.title || it.id)) { await H.browserRecUpdate(it.id, { title: nv }); it.title = nv; showToast('<span class="ok">✓</span> 已重命名') }
    })
    // 回放
    row.querySelector('[data-act="replay"]').addEventListener('click', async () => {
      panel.remove()
      showToast('<span class="ok">▶</span> 回放中…')
      try { const r = await H.browserRecReplayStored(it.id); showToast(r && r.ok ? '<span class="ok">✓</span> 回放完成,共 ' + r.stepReport.length + ' 步' : '<span class="err">⚠</span> 回放失败') } catch (e) { showToast('<span class="err">⚠</span> ' + e.message) }
    })
    // 删除
    row.querySelector('[data-act="del"]').addEventListener('click', async () => {
      if (!confirm('删除录制 "' + (it.title || it.id) + '"?')) return
      if (await H.browserRecDelete(it.id)) { row.remove(); showToast('已删除') }
    })
  }
}

// 验证结果浮卡:点 "验证" 后,除了发给 agent,也在右下角浮一张 PASS/SUSPICIOUS/FAIL 卡,

  const bg = kind === 'pass' ? 'rgba(26,168,110,.12)' : (kind === 'suspicious' ? 'rgba(214,163,45,.13)' : 'rgba(226,66,74,.13)')

  c.style.cssText = `position:fixed;bottom:18px;right:18px;z-index:9999;background:${bg};border:1.5px solid ${color};border-radius:12px;padding:11px 13px;color:var(--txt);font-size:12.5px;max-width:480px;box-shadow:0 14px 40px rgba(0,0,0,.45);font-family:inherit`

      <button id="vfy-close" style="background:transparent;border:none;color:var(--txt3);cursor:pointer;font-size:16px;line-height:1">×</button>
    </div>
    <div style="font-size:11.5px;color:var(--txt2);margin-bottom:7px;line-height:1.5">${(verdict || '').replace(/</g, '&lt;')}</div>
    <div style="font-size:11px;color:var(--txt3);margin-bottom:9px;line-height:1.45">${(summary || '').replace(/</g, '&lt;')}</div>
    <div style="display:flex;gap:6px">
      <button id="vfy-full" style="background:transparent;border:1px solid var(--line);color:var(--txt2);border-radius:6px;padding:4px 9px;cursor:pointer;font-size:11px">展开完整报告</button>
      <button id="vfy-copy" style="background:transparent;border:1px solid var(--line);color:var(--txt2);border-radius:6px;padding:4px 9px;cursor:pointer;font-size:11px">复制</button>
      ${kind !== 'pass' ? `<button id="vfy-rollback" style="background:transparent;border:1px solid ${color};color:${color};border-radius:6px;padding:4px 9px;cursor:pointer;font-size:11px">回滚改动</button>` : ''}
    </div>
    <pre id="vfy-fullarea" style="display:none;max-height:360px;overflow:auto;background:rgba(0,0,0,.2);border-radius:6px;padding:8px 10px;margin-top:8px;font-size:11px;line-height:1.45;white-space:pre-wrap;color:var(--txt2);font-family:ui-monospace,Consolas,monospace"></pre>`
  document.body.appendChild(c)
  c.querySelector('#vfy-close').addEventListener('click', () => c.remove())
  c.querySelector('#vfy-full').addEventListener('click', () => { const a = c.querySelector('#vfy-fullarea'); a.textContent = fullText || ''; a.style.display = a.style.display === 'none' ? 'block' : 'none' })
  c.querySelector('#vfy-copy').addEventListener('click', () => { H.browserCopy(fullText || verdict || ''); showToast('<span class="ok">✓</span> 已复制报告') })
  const rb = c.querySelector('#vfy-rollback')
  if (rb) rb.addEventListener('click', async () => {
    const dry = await H.browserRollback({ dryRun: true })
    if (!dry || !dry.ok) { showToast('<span class="err">⚠</span> 检查失败:' + (dry && dry.error || '')); return }
    const all = (dry.result || []).flatMap((d) => [...d.tracked, ...d.untracked])
    if (!all.length) { showToast('(没有可回滚的改动)'); return }
    if (!confirm('将回滚 ' + all.length + ' 个文件:\n\n' + all.slice(0, 20).join('\n') + (all.length > 20 ? '\n…' : '') + '\n\n确认?')) return
    const r = await H.browserRollback({})
    showToast(r && r.ok ? '<span class="ok">✓</span> 已回滚 ' + all.length + ' 个文件' : '<span class="err">⚠</span> 回滚部分失败')
    rb.disabled = true; rb.style.opacity = '.5'
  })
  // 8 秒后自动半透明(不挡浏览器),hover 恢复
  setTimeout(() => { if (c.isConnected) c.style.opacity = '.55' }, 8000)
  c.addEventListener('mouseenter', () => c.style.opacity = '1')
})

// 录制结束 → 让用户一句话说清"应该发生什么"。这是 agent 修对方向的关键信号。
function askExpectation(recId) {
  if (document.getElementById('exp-overlay')) return
  const ov = document.createElement('div'); ov.id = 'exp-overlay'
  ov.style.cssText = 'position:fixed;top:48px;left:50%;transform:translateX(-50%);z-index:9999;background:rgba(15,17,32,.96);border:1px solid var(--accent);border-radius:11px;padding:13px 15px;box-shadow:0 10px 40px rgba(0,0,0,.45);min-width:460px;max-width:560px;color:var(--txt);font-size:13px;line-height:1.55'
  ov.innerHTML = `
    <div style="font-weight:600;margin-bottom:7px">📝 一句话说清"应该发生什么"</div>
    <div style="font-size:11.5px;color:var(--txt2);margin-bottom:9px">告诉 Agent 你期望的正确结果 — 它会优先围绕这个目标修。可跳过,但有期望修复正确率高很多。</div>
    <textarea id="exp-input" rows="2" placeholder="例:点提交后应跳到结果页;额度计算应返回有效值;.error-banner 不应出现…" style="width:100%;background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:8px;padding:7px 9px;color:var(--txt);font-size:12.5px;font-family:inherit;outline:none;resize:vertical"></textarea>
    <div style="display:flex;gap:7px;justify-content:flex-end;margin-top:9px">
      <button id="exp-skip" style="background:transparent;border:1px solid var(--line);color:var(--txt2);border-radius:7px;padding:5px 12px;cursor:pointer;font-size:12px">跳过</button>
      <button id="exp-save" style="background:var(--accent);border:none;color:#fff;border-radius:7px;padding:5px 13px;cursor:pointer;font-size:12px;font-weight:600">保存</button>
    </div>`
  document.body.appendChild(ov)
  const input = ov.querySelector('#exp-input'); input.focus()
  const close = () => ov.remove()
  ov.querySelector('#exp-skip').addEventListener('click', close)
  ov.querySelector('#exp-save').addEventListener('click', async () => {
    const txt = input.value.trim()
    if (txt) { try { await H.browserRecSetExpectation(recId, txt) } catch {} ; showToast('<span class="ok">✓</span> 已记录期望') }
    close()
  })
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) ov.querySelector('#exp-save').click()
    else if (e.key === 'Escape') close()
  })
}

function openFind(){ findOpen = true; $('find').classList.add('show'); findin.focus(); findin.select(); if (findin.value) H.browserFind(findin.value, false) }
function closeFind(){ findOpen = false; $('find').classList.remove('show'); findcnt.textContent = ''; H.browserFindStop() }
findin.addEventListener('input', () => { if (findin.value) H.browserFind(findin.value, false); else { findcnt.textContent=''; H.browserFindStop() } })
findin.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); H.browserFind(findin.value, true, !e.shiftKey) }
  if (e.key === 'Escape') closeFind()
})
$('findnext').addEventListener('click', () => H.browserFind(findin.value, true, true))
$('findprev').addEventListener('click', () => H.browserFind(findin.value, true, false))
$('findx').addEventListener('click', closeFind)
H.onBrowserFindResult(({ active, matches }) => { findcnt.textContent = matches ? `${active}/${matches}` : '无结果' })

/* ── 来自主进程（页面有焦点时）的快捷键 ── */
H.onBrowserFocusUrl(() => { url.focus(); url.select() })
H.onBrowserOpenFind(() => openFind())

/* ── chrome 有焦点时的快捷键 ── */
// 最近关掉的标签 URL,Ctrl+Shift+T 恢复
const recentlyClosed = []
document.addEventListener('keydown', e => {
  const mod = e.ctrlKey || e.metaKey
  if (!mod) { if (e.key === 'Escape') { if (findOpen) closeFind(); else if ($('pickcard').classList.contains('show')) $('pickcard').classList.remove('show') } return }
  const k = e.key.toLowerCase()
  // 标签循环 / 跳转 / 恢复
  if (e.key === 'Tab') {
    const tabs = (window._lastTabs || []); if (!tabs.length) return
    e.preventDefault()
    const idx = tabs.findIndex(t => t.id === activeTabId)
    const nx = e.shiftKey ? (idx - 1 + tabs.length) % tabs.length : (idx + 1) % tabs.length
    H.browserActivateTab(tabs[nx].id); return
  }
  if (e.shiftKey && k === 't') { e.preventDefault(); const u = recentlyClosed.pop(); if (u) H.browserNewTab(u); return }
  if (/^[1-9]$/.test(e.key)) {
    const tabs = (window._lastTabs || []); if (!tabs.length) return
    e.preventDefault()
    const n = Number(e.key); const t = n === 9 ? tabs[tabs.length - 1] : tabs[n - 1]
    if (t) H.browserActivateTab(t.id); return
  }
  if (k === 't') { e.preventDefault(); H.browserNewTab('') }
  else if (k === 'w') { e.preventDefault(); if (activeTabId != null) { const t = (window._lastTabs || []).find(x => x.id === activeTabId); if (t && t.url) recentlyClosed.push(t.url); H.browserCloseTab(activeTabId) } }
  else if (k === 'r') { e.preventDefault(); H.browserReload() }
  else if (k === 'l') { e.preventDefault(); url.focus(); url.select() }
  else if (k === 'f') { e.preventDefault(); openFind() }
  else if (k === '=' || k === '+') { e.preventDefault(); H.browserZoom('in') }
  else if (k === '-') { e.preventDefault(); H.browserZoom('out') }
  else if (k === '0') { e.preventDefault(); H.browserZoom('reset') }
  else if (k === '[') { e.preventDefault(); H.browserBack() }
  else if (k === ']') { e.preventDefault(); H.browserForward() }
})

/* ── 工作台模式：左 Agent 会话 + 右浏览器，可拖分隔条；「AI 分析」→「发给 Agent」── */
const WS = new URLSearchParams(location.search).get('workspace') === '1'
if (WS) {
  document.body.classList.add('ws')
  const bai = $('bai'); if (bai.lastChild) bai.lastChild.nodeValue = '发给 Agent'
  bai.title = '把当前页面的控制台报错 + 网络异常 + DOM 发给左侧 Agent 分析'
  // 闭环验证按钮（仅工作台）：重载复现页 → 把修复后状态交给左侧 Agent 确认
  const bverify = $('bverify'); bverify.style.display = ''
  bverify.addEventListener('click', async () => {
    bverify.style.pointerEvents = 'none'; showToast('正在重载页面验证修复…')
    try { await H.browserVerify() } catch {}
    setTimeout(() => { bverify.style.pointerEvents = '' }, 1500)
  })
  H.onBrowserSplitSet(w => document.documentElement.style.setProperty('--wsleftw', w + 'px'))
  const sp = $('wssplit'); let wsDrag = false
  const clampW = x => Math.max(320, Math.min(window.innerWidth - 440, x))
  sp.addEventListener('mousedown', e => { wsDrag = true; document.body.classList.add('wsdrag'); H.browserSplit({ phase: 'start' }); e.preventDefault() })
  window.addEventListener('mousemove', e => { if (!wsDrag) return; document.documentElement.style.setProperty('--wsleftw', clampW(e.clientX) + 'px') })
  window.addEventListener('mouseup', e => { if (!wsDrag) return; wsDrag = false; document.body.classList.remove('wsdrag'); const w = clampW(e.clientX); document.documentElement.style.setProperty('--wsleftw', w + 'px'); H.browserSplit({ phase: 'end', leftW: w }) })
}
</script>
