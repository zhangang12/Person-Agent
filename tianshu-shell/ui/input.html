<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>个人桌面智能体</title>
<script>try { document.documentElement.dataset.theme = window.BocomHermes.getTheme() || 'light' } catch (e) { document.documentElement.dataset.theme = 'light' }</script>
<link rel="stylesheet" href="glass.css" />
<style>
  .bar { display: flex; align-items: center; gap: 9px; height: 100%; padding: 0 10px; }
  .orb { width: 36px; height: 36px; flex: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--orb-bg); border: 1px solid var(--orb-border); cursor: grab; }
  .orb:active { cursor: grabbing; }
  .tw { animation: tw 2.6s ease-in-out infinite; }
  #q { flex: 1; min-width: 0; border: none; outline: none; background: transparent; font-size: 16px; color: var(--txt); font-family: var(--font); cursor: text; }
  #q::placeholder { color: var(--txt3); }
  .tbtn { display: flex; align-items: center; gap: 5px; background: transparent; border: none; cursor: pointer; color: var(--txt3); padding: 5px 7px; border-radius: 8px; }
  .tbtn:hover { color: var(--txt); background: var(--composer-bg); }
  .projname { font-size: 11px; font-family: var(--mono); max-width: 82px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .kbd { font-size: 11px; color: var(--txt3); font-family: var(--mono); border: 1px solid var(--kbd-border); border-radius: 7px; padding: 3px 8px; white-space: nowrap; }

  /* 角色选择面板 */
  #role-panel { position: fixed; bottom: 116px; left: 10px; right: 10px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 14px; padding: 10px 12px; display: none; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 100; box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  #role-panel.show { display: block; }
  .rp-title { font-size: 11px; color: var(--txt2); margin-bottom: 8px; }
  .rp-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .rchip { font-size: 12px; color: var(--txt2); background: var(--composer-bg); border: .5px solid var(--composer-border); border-radius: 999px; padding: 4px 12px; cursor: pointer; user-select: none; transition: all .12s; }
  .rchip:hover { color: var(--txt); border-color: var(--accent); }
  .rchip.sel { color: var(--send-fg); background: var(--brand); border-color: var(--brand); }
  .rp-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .rp-go { font-size: 12px; font-weight: 600; color: var(--send-fg); background: var(--brand); border: none; border-radius: 8px; padding: 5px 16px; cursor: pointer; }
  .rp-cancel { font-size: 12px; color: var(--txt2); background: transparent; border: .5px solid var(--composer-border); border-radius: 8px; padding: 5px 12px; cursor: pointer; }
</style>
</head>
<body>
<!-- 角色选择面板（Ctrl+Enter 触发） -->
<div id="role-panel">
  <div class="rp-title">选择并行评审角色（可多选，默认：安全 · 性能 · 业务）</div>
  <div id="rp-chips" class="rp-chips"></div>
  <div class="rp-actions">
    <button class="rp-cancel" id="rp-cancel">取消</button>
    <button class="rp-go" id="rp-go">开始并行评审 →</button>
  </div>
</div>
<div class="glass">
  <div class="bar">
    <span class="orb" title="拖动我移动位置">
      <svg class="tw" width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
        <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#9b8cff"/><stop offset="1" stop-color="#46e0ff"/></linearGradient></defs>
        <path fill="url(#g)" d="M12 2l1.7 6.1L20 10l-6.3 1.9L12 18l-1.7-6.1L4 10l6.3-1.9z"/>
      </svg>
    </span>
    <input id="q" class="nodrag" placeholder="回车 → 新对话   Ctrl+回车 → 选角色并行评审   Ctrl+V → 粘贴代码即问" autofocus />
    <button id="proj" class="tbtn nodrag" title="选择代码仓库（卡片对它说话）">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span id="projname" class="projname">未选目录</span>
    </button>
    <button id="workflow" class="tbtn nodrag" title="把这句话作为目标，跑动态编排工作流（多 agent 并行）" aria-label="工作流">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2.2"/><circle cx="18" cy="6" r="2.2"/><circle cx="12" cy="18" r="2.2"/><path d="M6 8.2v2.3a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V8.2M12 12.5v3.3"/></svg>
    </button>
    <button id="dock" class="tbtn nodrag" title="卡坞 · 历史对话" aria-label="卡坞">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l9 5-9 5-9-5 9-5z"/><path d="M3 13l9 5 9-5"/></svg>
    </button>
    <button id="theme" class="tbtn nodrag" title="切换深/浅主题" aria-label="切换主题">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 0 0 18z" fill="currentColor" stroke="none"/></svg>
    </button>
    <button id="settings" class="tbtn nodrag" title="设置" aria-label="设置">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <span class="kbd">Ctrl ⇧ Space</span>
  </div>
</div>
<script>
  const q = document.getElementById('q')
  q.focus()

  // ── 角色面板 ──────────────────────────────────────────────────────────────
  const panel = document.getElementById('role-panel')
  const chipsEl = document.getElementById('rp-chips')
  let allRoles = [], selectedRoles = new Set(['security', 'perf', 'biz'])
  let pendingGoal = ''

  async function initRoles() {
    try {
      allRoles = await window.BocomHermes.getFanoutRoles()
      chipsEl.innerHTML = ''
      allRoles.forEach(({ key, label }) => {
        const c = document.createElement('span'); c.className = 'rchip' + (selectedRoles.has(key) ? ' sel' : '')
        c.textContent = label; c.dataset.key = key
        c.addEventListener('click', () => {
          if (selectedRoles.has(key)) { if (selectedRoles.size > 1) { selectedRoles.delete(key); c.classList.remove('sel') } }
          else { selectedRoles.add(key); c.classList.add('sel') }
        })
        chipsEl.appendChild(c)
      })
    } catch {}
  }
  initRoles()

  function showRolePanel(goal) {
    pendingGoal = goal
    panel.classList.add('show')
  }
  function hideRolePanel() { panel.classList.remove('show') }

  document.getElementById('rp-cancel').addEventListener('click', hideRolePanel)
  document.getElementById('rp-go').addEventListener('click', async () => {
    hideRolePanel()
    if (!pendingGoal) return
    const roles = [...selectedRoles]
    q.value = ''
    try { await window.BocomHermes.spawnFanoutRoles(pendingGoal, roles) } catch (err) { console.error(err) }
  })

  q.addEventListener('keydown', async (e) => {
    if (e.key === 'Escape') { if (panel.classList.contains('show')) { hideRolePanel(); return } window.BocomHermes.hideSelf(); return }
    if (e.key === 'Enter' && q.value.trim()) {
      const v = q.value.trim()
      if (e.ctrlKey) {
        // Ctrl+Enter → 弹出角色选择面板
        showRolePanel(v)
      } else {
        q.value = ''
        try { await window.BocomHermes.spawnCard(v) } catch (err) { console.error(err) }
      }
    }
  })
  window.addEventListener('focus', () => q.focus())

  // 主题
  document.getElementById('theme').addEventListener('click', () => {
    const cur = document.documentElement.dataset.theme
    window.BocomHermes.setTheme(cur === 'dark' ? 'light' : 'dark')
  })
  window.BocomHermes.onTheme((t) => { document.documentElement.dataset.theme = t })

  // 工作流：把当前输入作为目标跑动态编排
  document.getElementById('workflow').addEventListener('click', async () => {
    const v = q.value.trim(); if (!v) { q.focus(); return }
    try { await window.BocomHermes.spawnWorkflow(v); q.value = '' } catch (e) { console.error(e) }
  })
  // 卡坞 + 设置
  document.getElementById('dock').addEventListener('click', () => { try { window.BocomHermes.openDock() } catch (e) {} })
  document.getElementById('settings').addEventListener('click', () => { try { window.BocomHermes.openSettings() } catch (e) {} })

  // 项目目录
  const projName = document.getElementById('projname')
  try { projName.textContent = window.BocomHermes.getProject() || '未选目录' } catch (e) {}
  document.getElementById('proj').addEventListener('click', async () => {
    try { projName.textContent = await window.BocomHermes.pickProject() } catch (e) {}
  })
  window.BocomHermes.onProject((p) => { projName.textContent = p })

  // 主进程推送剪贴板内容（Ctrl+Shift+V 全局热键）
  window.BocomHermes.onFillInput((text) => {
    q.value = text.slice(0, 500)   // 截断避免过长
    q.focus(); q.select()
  })

  // 粘贴即问按钮：读剪贴板填入输入框
  document.getElementById('paste-btn') && document.getElementById('paste-btn').addEventListener('click', async () => {
    try { const t = await window.BocomHermes.readClipboard(); if (t.trim()) { q.value = t.slice(0, 500); q.focus() } } catch {}
  })
</script>
</body>
</html>
