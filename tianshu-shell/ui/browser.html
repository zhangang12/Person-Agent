<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>BocomHermes · 浏览器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100vh;overflow:hidden;
  background:#0d0e1a;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  user-select:none;
  display:flex;flex-direction:column;
}

/* ── 工具栏 ── */
#toolbar{
  height:48px;flex:none;
  display:flex;align-items:center;gap:6px;padding:0 12px;
  background:#0d0e1a;
  border-bottom:1px solid rgba(255,255,255,.07);
  -webkit-app-region:drag;
}
.tl{width:76px;flex:none} /* macOS traffic lights */

.nav-btn{
  -webkit-app-region:no-drag;
  width:28px;height:28px;flex:none;
  border:none;border-radius:7px;
  background:transparent;color:rgba(255,255,255,.5);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,color .12s;
}
.nav-btn:hover:not(:disabled){background:rgba(255,255,255,.09);color:rgba(255,255,255,.9)}
.nav-btn:disabled{opacity:.28;cursor:default}
.nav-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

.url-wrap{
  flex:1;min-width:0;height:30px;
  -webkit-app-region:no-drag;
  background:rgba(255,255,255,.06);border:.5px solid rgba(255,255,255,.11);
  border-radius:8px;display:flex;align-items:center;padding:0 10px;gap:6px;
  transition:background .15s,border-color .15s;
}
.url-wrap:focus-within{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.2)}
.url-scheme{font-size:11px;color:rgba(255,255,255,.22);flex:none}
#url-bar{
  flex:1;min-width:0;border:none;outline:none;background:transparent;
  font-size:12.5px;color:rgba(255,255,255,.82);
  font-family:-apple-system,'SF Mono',monospace;
}
#url-bar::placeholder{color:rgba(255,255,255,.26)}

.tool-btn{
  -webkit-app-region:no-drag;
  height:28px;padding:0 9px;flex:none;
  border:.5px solid rgba(255,255,255,.1);border-radius:7px;
  background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);
  font-size:11px;cursor:pointer;
  display:flex;align-items:center;gap:4px;
  transition:background .12s,color .12s,border-color .12s;
}
.tool-btn:hover{background:rgba(255,255,255,.09);color:rgba(255,255,255,.85);border-color:rgba(255,255,255,.18)}
.tool-btn.on{background:rgba(80,160,255,.14);border-color:rgba(80,160,255,.28);color:rgba(140,200,255,.9)}
.tool-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.bdg{
  display:none;border-radius:4px;padding:1px 4px;
  font-size:10px;font-weight:600;line-height:14px;
}
.bdg.err{background:rgba(255,70,70,.25);color:rgba(255,130,130,.95)}
.bdg.warn{background:rgba(255,170,0,.2);color:rgba(255,195,60,.95)}

/* ── 中间区域（被 WebContentsView 覆盖） ── */
#mid{flex:1;background:#0d0e1a}

/* ── 控制台面板 ── */
#console{
  height:0;flex:none;overflow:hidden;
  display:flex;flex-direction:column;
  background:#080a14;border-top:1px solid rgba(255,255,255,.07);
  transition:height .15s ease;
}
#console.open{height:180px}
#chdr{
  height:32px;flex:none;
  display:flex;align-items:center;gap:6px;padding:0 12px;
  background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.06);
}
.ctitle{font-size:11px;color:rgba(255,255,255,.4);flex:1}
.hbtn{
  border:none;background:rgba(255,255,255,.06);border-radius:5px;
  color:rgba(255,255,255,.4);font-size:10.5px;cursor:pointer;padding:2px 7px;
  transition:background .12s,color .12s;
}
.hbtn:hover{background:rgba(255,255,255,.11);color:rgba(255,255,255,.72)}

#clist{
  flex:1;overflow-y:auto;padding:3px 0;
}
#clist::-webkit-scrollbar{width:4px}
#clist::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.ce{
  display:flex;align-items:baseline;gap:8px;padding:3px 12px;
  font-size:11.5px;font-family:'SF Mono',Menlo,monospace;
  border-left:2px solid transparent;
}
.ce:hover{background:rgba(255,255,255,.025)}
.ce.err{border-left-color:rgba(255,80,80,.55);color:rgba(255,155,155,.8)}
.ce.warn{border-left-color:rgba(255,170,0,.45);color:rgba(255,205,100,.75)}
.ci{flex:none;width:12px;font-size:10px;opacity:.7}
.cm{flex:1;min-width:0;word-break:break-all}
.cs{flex:none;color:rgba(255,255,255,.22);font-size:10px}
</style>
</head>
<body>
<div id="toolbar">
  <div class="tl"></div>

  <button class="nav-btn" id="bb" disabled title="后退">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button class="nav-btn" id="bf" disabled title="前进">
    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
  <button class="nav-btn" id="br" title="刷新">
    <svg id="br-svg" viewBox="0 0 24 24">
      <polyline points="23 4 23 10 17 10"/>
      <path d="M20.5 15a9 9 0 1 1-2.4-9.2L23 10"/>
    </svg>
  </button>

  <div class="url-wrap">
    <span class="url-scheme" id="scheme">http://</span>
    <input id="url-bar" placeholder="输入地址，回车导航…" spellcheck="false" autocomplete="off">
  </div>

  <button class="tool-btn" id="bdt" title="开发者工具">
    <svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
    DevTools
  </button>
  <button class="tool-btn" id="bcl" title="控制台">
    <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    控制台
    <span class="bdg err" id="eb"></span>
    <span class="bdg warn" id="wb"></span>
  </button>
</div>

<div id="mid"></div>

<div id="console">
  <div id="chdr">
    <span class="ctitle">控制台输出 (warning / error)</span>
    <button class="hbtn" id="bclr">清除</button>
    <button class="hbtn" id="bcc">收起</button>
  </div>
  <div id="clist"></div>
</div>

<script>
const H = window.BocomHermes
const bb = document.getElementById('bb')
const bf = document.getElementById('bf')
const br = document.getElementById('br')
const brSvg = document.getElementById('br-svg')
const urlBar = document.getElementById('url-bar')
const scheme = document.getElementById('scheme')
const bdt = document.getElementById('bdt')
const bcl = document.getElementById('bcl')
const eb = document.getElementById('eb')
const wb = document.getElementById('wb')
const conPan = document.getElementById('console')
const clist = document.getElementById('clist')

const RELOAD_SVG = '<polyline points="23 4 23 10 17 10"/><path d="M20.5 15a9 9 0 1 1-2.4-9.2L23 10"/>'
const STOP_SVG   = '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>'
const CONSOLE_H  = 180

let errN = 0, warnN = 0, consoleOpen = false, isLoading = false

// ── 导航状态 ──
H.onBrowserNav(({ url, canBack, canForward, loading }) => {
  if (document.activeElement !== urlBar) {
    const clean = url === 'about:blank' ? '' : url
    // 拆分 scheme 显示
    const m = clean.match(/^(https?:\/\/)(.*)$/)
    if (m) { scheme.textContent = m[1]; urlBar.value = m[2] }
    else { scheme.textContent = ''; urlBar.value = clean }
  }
  bb.disabled = !canBack
  bf.disabled = !canForward
  isLoading = loading
  brSvg.innerHTML = loading ? STOP_SVG : RELOAD_SVG
  br.title = loading ? '停止' : '刷新'
})

// ── 控制台消息 ──
H.onBrowserConsole(({ level, message, line, source }) => {
  const isErr = level === 3
  if (isErr) { errN++; eb.textContent = errN; eb.style.display = '' }
  else        { warnN++; wb.textContent = warnN; wb.style.display = '' }
  const ce = document.createElement('div')
  ce.className = 'ce ' + (isErr ? 'err' : 'warn')
  const srcName = source ? source.split('/').pop() + (line ? ':' + line : '') : ''
  ce.innerHTML = `<span class="ci">${isErr ? '✕' : '⚠'}</span><span class="cm">${esc(message)}</span><span class="cs">${esc(srcName)}</span>`
  clist.appendChild(ce)
  clist.scrollTop = clist.scrollHeight
})

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

// ── URL 输入 ──
urlBar.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const raw = (scheme.textContent + urlBar.value).trim()
    H.browserNavigate(raw)
    urlBar.blur()
  }
  if (e.key === 'Escape') urlBar.blur()
})
urlBar.addEventListener('focus', () => {
  // 聚焦时把 scheme 合并进输入框，方便编辑完整 URL
  const full = scheme.textContent + urlBar.value
  scheme.textContent = ''
  urlBar.value = full
  requestAnimationFrame(() => urlBar.select())
})
urlBar.addEventListener('blur', () => {
  // 失焦时重新拆分（如果还没有导航，从当前值重新拆）
  const v = urlBar.value
  const m = v.match(/^(https?:\/\/)(.*)$/)
  if (m) { scheme.textContent = m[1]; urlBar.value = m[2] }
  else    { scheme.textContent = ''; urlBar.value = v }
})

// ── 按钮 ──
bb.addEventListener('click', () => H.browserBack())
bf.addEventListener('click', () => H.browserForward())
br.addEventListener('click', () => H.browserReload())     // stop when loading
bdt.addEventListener('click', () => { bdt.classList.toggle('on'); H.browserDevTools() })

// ── 控制台面板 ──
function setConsole(open) {
  consoleOpen = open
  conPan.classList.toggle('open', open)
  bcl.classList.toggle('on', open)
  H.browserConsoleResize(open ? CONSOLE_H : 0)
}
bcl.addEventListener('click', () => setConsole(!consoleOpen))
document.getElementById('bcc').addEventListener('click', () => setConsole(false))
document.getElementById('bclr').addEventListener('click', () => {
  clist.innerHTML = ''
  errN = 0; warnN = 0
  eb.style.display = 'none'; wb.style.display = 'none'
})
</script>
</body>
</html>
